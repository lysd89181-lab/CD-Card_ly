<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>تحت الصيانة | CD-CARD</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p: #39ff14;
            --bg: #050505;
            --text: #ffffff;
            --muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-circle {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.08;
            pointer-events: none;
        }

        .bg-circle:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--p);
            top: -100px;
            left: -100px;
            animation: float1 15s infinite ease-in-out;
        }

        .bg-circle:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--p);
            bottom: -50px;
            right: -50px;
            animation: float2 12s infinite ease-in-out;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 60px) scale(1.3); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-60px, -40px) scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            z-index: 10;
            animation: fadeIn 0.8s ease;
            max-width: 500px;
        }

        .logo {
            font-size: 52px;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .logo-subtitle {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .maintenance-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border: 3px solid var(--p);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 3s infinite ease-in-out;
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.2);
        }

        .maintenance-icon i {
            font-size: 50px;
            color: var(--p);
        }

        .maintenance-icon .gear-small {
            position: absolute;
            font-size: 22px;
            color: var(--p);
            animation: spin 4s linear infinite;
            margin-top: -50px;
            margin-right: -60px;
        }

        .maintenance-icon .gear-tiny {
            position: absolute;
            font-size: 16px;
            color: var(--p);
            animation: spin 3s linear infinite reverse;
            margin-top: 40px;
            margin-left: -70px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--p);
            margin-bottom: 15px;
        }

        .message {
            font-size: 15px;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .feature-item {
            text-align: center;
        }

        .feature-item i {
            font-size: 28px;
            color: var(--p);
            margin-bottom: 8px;
            display: block;
        }

        .feature-item span {
            font-size: 11px;
            color: var(--muted);
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--p);
            color: var(--p);
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s;
        }

        .contact-link:hover {
            background: rgba(57, 255, 20, 0.2);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }

        .contact-link:active {
            transform: scale(0.95);
        }

        .contact-link i {
            font-size: 18px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .maintenance-icon { width: 100px; height: 100px; }
            .maintenance-icon i { font-size: 40px; }
            .features { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-circle"></div>
    <div class="bg-circle"></div>

    <div class="container">
        
        <div class="logo">CD-CARD</div>
        <div class="logo-subtitle">Premium Digital Services</div>

        <div style="position: relative; display: inline-block;">
            <div class="maintenance-icon">
                <i class="fas fa-gear gear-main"></i>
            </div>
            <i class="fas fa-gear gear-small" style="position: absolute;"></i>
            <i class="fas fa-gear gear-tiny" style="position: absolute;"></i>
        </div>

        <h1>الموقع تحت الصيانة</h1>

        <p class="message">
            نعمل حالياً على تطوير الموقع وإضافة تحسينات جديدة<br>
            لتقديم أفضل تجربة ممكنة لعملائنا الكرام
        </p>

        <div class="features">
            <div class="feature-item">
                <i class="fas fa-rocket"></i>
                <span>تحديثات جديدة</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-shield-halved"></i>
                <span>حماية أقوى</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-bolt"></i>
                <span>أداء أسرع</span>
            </div>
        </div>

        <a href="https://wa.me/2181923772910" target="_blank" class="contact-link">
            <i class="fab fa-whatsapp"></i>
            تواصل مع الدعم
        </a>

        <p style="margin-top: 30px; font-size: 11px; color: var(--muted);">
            © جميع الحقوق محفوظة CD-CARD 2026
        </p>

    </div>

</body>
</html>
