<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري التحويل... | CD-Card</title>
    <script>
        // دالة لاستخراج كود الإحالة من الرابط
        function getReferral() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');

            if (refCode) {
                // حفظ كود الإحالة في ذاكرة المتصفح (localStorage) ليبقى معه حتى يسجل
                localStorage.setItem('referrerCode', refCode);
                console.log("تم حفظ كود الإحالة: " + refCode);
            }

            // تحويل المستخدم تلقائياً لصفحة التسجيل الأصلية عندك
            // تأكد أن اسم الملف هو login.html أو غيره حسب ما عندك
            setTimeout(() => {
                window.location.href = "login.html"; 
            }, 500); 
        }

        window.onload = getReferral;
    </script>
    <style>
        body { background: #0d1117; color: #00ff88; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .loader { border: 4px solid #161b22; border-top: 4px solid #00ff88; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: auto;"></div>
        <p>جاري التحقق من الرابط...</p>
    </div>
</body>
</html>
