<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البوت | CD-CARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p: #39ff14;
            --bg: #050505;
            --card: #0d0d0d;
            --border: #1a1a1a;
            --text: #ffffff;
            --muted: #888888;
            --danger: #ff3131;
            --gold: #ffd700;
            --blue: #0088ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: var(--p);
            font-size: 24px;
            font-weight: 900;
        }

        .header .bot-info {
            color: var(--muted);
            font-size: 12px;
        }

        .header .bot-info span {
            color: var(--p);
            font-weight: 700;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card i {
            font-size: 30px;
            color: var(--p);
            margin-bottom: 10px;
        }

        .stat-card .stat-number {
            font-size: 32px;
            font-weight: 900;
            color: var(--p);
        }

        .stat-card .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 5px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--p);
            color: #000;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-danger {
            background: rgba(255,49,49,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .btn-accent {
            background: rgba(0,136,255,0.1);
            border: 1px solid var(--blue);
            color: var(--blue);
        }

        /* Search */
        .search-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box i {
            color: var(--muted);
            font-size: 18px;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }

        .search-box input::placeholder {
            color: var(--muted);
        }

        /* Messages List */
        .message-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            transition: 0.3s;
            animation: fadeIn 0.3s ease;
        }

        .message-card:hover {
            border-color: var(--p);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .message-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--p), #00ff88);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            font-size: 16px;
            flex-shrink: 0;
        }

        .user-info h4 {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }

        .user-info small {
            color: var(--muted);
            font-size: 10px;
        }

        .message-time {
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
        }

        .message-body {
            background: #0a0a0a;
            border: 1px solid #111;
            border-radius: 12px;
            padding: 14px;
            color: #ddd;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-all;
            margin-bottom: 12px;
        }

        .message-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 10px;
            color: var(--muted);
        }

        .message-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .message-meta i {
            color: var(--p);
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #111;
            border-top: 3px solid var(--p);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Raw Data Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--p);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: var(--p);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .modal-content pre {
            background: #000;
            border: 1px solid #111;
            border-radius: 12px;
            padding: 15px;
            color: var(--p);
            font-size: 11px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--danger);
            color: #fff;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 18px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .message-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <div>
                <h1><i class="fas fa-robot"></i> لوحة تحكم البوت</h1>
                <div class="bot-info">
                    البوت: <span>@CDCardNotifBot</span> | 
                    Chat ID: <span id="chat-id-display">7737867483</span>
                </div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="loadMessages()">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
                <button class="btn btn-danger" onclick="clearAllMessages()">
                    <i class="fas fa-trash-alt"></i> مسح الكل
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-envelope"></i>
                <div class="stat-number" id="total-messages">0</div>
                <div class="stat-label">إجمالي الرسائل</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-user"></i>
                <div class="stat-number" id="unique-users">0</div>
                <div class="stat-label">مستخدمين فريدين</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="stat-number" id="last-message-time">—</div>
                <div class="stat-label">آخر رسالة</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-robot"></i>
                <div class="stat-number" id="bot-status">✅ نشط</div>
                <div class="stat-label">حالة البوت</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="🔍 بحث في الرسائل..." oninput="filterMessages()">
            <i class="fas fa-filter" style="color:var(--p);"></i>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
            <button class="btn btn-outline" onclick="filterByType('all')" id="filter-all">
                <i class="fas fa-list"></i> الكل
            </button>
            <button class="btn btn-outline" onclick="filterByType('user')" id="filter-user">
                <i class="fas fa-user"></i> مستخدمين
            </button>
            <button class="btn btn-outline" onclick="filterByType('system')" id="filter-system">
                <i class="fas fa-robot"></i> إشعارات النظام
            </button>
            <button class="btn btn-accent" onclick="showRawData()">
                <i class="fas fa-code"></i> بيانات خام (JSON)
            </button>
        </div>

        <!-- Messages List -->
        <div id="messages-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p style="color:var(--muted);">جاري تحميل الرسائل...</p>
            </div>
        </div>

    </div>

    <!-- Raw Data Modal -->
    <div class="modal-overlay" id="raw-data-modal">
        <div class="modal-content" style="position:relative;">
            <button class="modal-close" onclick="closeRawData()">
                <i class="fas fa-times"></i>
            </button>
            <h3><i class="fas fa-code"></i> البيانات الخام (JSON)</h3>
            <pre id="raw-data-content">جاري التحميل...</pre>
        </div>
    </div>

    <script>
        // Bot Config
        const BOT_TOKEN = "8505632393:AAEQwA5RzNI50HVv3ZHz-rKHEzFMMmDlLJE";
        const CHAT_ID = "7737867483";
        
        let allMessages = [];
        let currentFilter = "all";

        document.getElementById('chat-id-display').innerText = CHAT_ID;

        // Load messages
        async function loadMessages() {
            const list = document.getElementById('messages-list');
            list.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p style="color:var(--muted);">جاري تحميل الرسائل...</p></div>';

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const data = await response.json();

                if (data.ok && data.result) {
                    allMessages = data.result.map(update => {
                        const msg = update.message || update.edited_message || {};
                        return {
                            update_id: update.update_id,
                            message_id: msg.message_id,
                            from_id: msg.from?.id || "—",
                            from_name: msg.from?.first_name || "—",
                            from_last: msg.from?.last_name || "",
                            from_username: msg.from?.username || "—",
                            from_is_bot: msg.from?.is_bot || false,
                            chat_id: msg.chat?.id || "—",
                            chat_type: msg.chat?.type || "—",
                            text: msg.text || msg.caption || "[غير نصية]",
                            date: msg.date ? new Date(msg.date * 1000) : null,
                            entities: msg.entities || [],
                            raw: msg
                        };
                    });

                    // Sort by date (newest first)
                    allMessages.sort((a, b) => (b.date || 0) - (a.date || 0));

                    updateStats();
                    renderMessages();
                } else {
                    list.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>فشل جلب الرسائل: ${data.description || "خطأ غير معروف"}</p></div>`;
                }
            } catch (error) {
                list.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>فشل الاتصال: ${error.message}</p></div>`;
            }
        }

        // Update stats
        function updateStats() {
            document.getElementById('total-messages').innerText = allMessages.length;
            
            const uniqueUsers = new Set(allMessages.map(m => m.from_id));
            document.getElementById('unique-users').innerText = uniqueUsers.size;
            
            if (allMessages.length > 0) {
                const lastMsg = allMessages[0];
                document.getElementById('last-message-time').innerText = lastMsg.date ? 
                    lastMsg.date.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}) : "—";
            } else {
                document.getElementById('last-message-time').innerText = "—";
            }
        }

        // Render messages
        function renderMessages(filter = "all", searchTerm = "") {
            const list = document.getElementById('messages-list');
            
            let filtered = [...allMessages];

            // Filter by type
            if (filter === "user") {
                filtered = filtered.filter(m => !m.from_is_bot);
            } else if (filter === "system") {
                filtered = filtered.filter(m => m.from_is_bot || m.text.includes("🔔") || m.text.includes("💰") || m.text.includes("🎫") || m.text.includes("✅"));
            }

            // Filter by search
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(m => 
                    (m.text || "").toLowerCase().includes(term) ||
                    (m.from_name || "").toLowerCase().includes(term) ||
                    (m.from_username || "").toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>لا توجد رسائل</p>
                        <small style="color:var(--muted);">${allMessages.length === 0 ? 'لم يستقبل البوت أي رسائل بعد' : 'لا توجد نتائج للبحث'}</small>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(msg => {
                const initial = (msg.from_name || "?")[0].toUpperCase();
                const fullName = msg.from_name + (msg.from_last ? " " + msg.from_last : "");
                const dateStr = msg.date ? 
                    msg.date.toLocaleDateString('ar-SA', {year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit'}) : 
                    "—";
                const isBot = msg.from_is_bot;
                const chatTypeLabel = msg.chat_type === "private" ? "خاص" : msg.chat_type === "group" ? "مجموعة" : msg.chat_type;

                return `
                    <div class="message-card">
                        <div class="message-header">
                            <div class="message-user">
                                <div class="user-avatar" style="background: ${isBot ? 'linear-gradient(135deg, #0088ff, #00e5ff)' : 'linear-gradient(135deg, var(--p), #00ff88)'}">
                                    ${isBot ? '<i class="fas fa-robot" style="color:#fff;font-size:14px;"></i>' : initial}
                                </div>
                                <div class="user-info">
                                    <h4>
                                        ${fullName}
                                        <span style="font-size:10px;color:var(--muted);">
                                            @${msg.from_username || "—"}
                                        </span>
                                        ${isBot ? '<span style="background:rgba(0,136,255,0.2);color:var(--blue);padding:2px 8px;border-radius:10px;font-size:9px;margin-right:5px;">بوت</span>' : ''}
                                    </h4>
                                    <small>
                                        <i class="fas fa-id-card"></i> ID: ${msg.from_id} | 
                                        <i class="fas fa-comment"></i> ${chatTypeLabel} | 
                                        <i class="fas fa-hashtag"></i> Msg#${msg.message_id}
                                    </small>
                                </div>
                            </div>
                            <div class="message-time">
                                <i class="fas fa-clock"></i> ${dateStr}
                            </div>
                        </div>
                        <div class="message-body">${escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span><i class="fas fa-qrcode"></i> Update ID: ${msg.update_id}</span>
                            <span><i class="fas fa-envelope"></i> Message ID: ${msg.message_id}</span>
                            <span><i class="fas fa-users"></i> Chat ID: ${msg.chat_id}</span>
                            ${msg.entities && msg.entities.length > 0 ? `<span><i class="fas fa-tags"></i> Entities: ${msg.entities.length}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Filter functions
        function filterMessages() {
            const searchTerm = document.getElementById('search-input').value;
            renderMessages(currentFilter, searchTerm);
        }

        function filterByType(type) {
            currentFilter = type;
            document.querySelectorAll('.btn-group .btn-outline').forEach(b => b.style.borderColor = 'var(--border)');
            document.getElementById('filter-' + type).style.borderColor = 'var(--p)';
            const searchTerm = document.getElementById('search-input').value;
            renderMessages(type, searchTerm);
        }

        // Clear all messages
        async function clearAllMessages() {
            if (!confirm('هل أنت متأكد من مسح جميع الرسائل؟')) return;

            try {
                // Get last update_id and clear
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                const data = await response.json();
                
                if (data.ok) {
                    allMessages = [];
                    updateStats();
                    renderMessages();
                    alert('✅ تم مسح جميع الرسائل من الذاكرة');
                }
            } catch (error) {
                alert('❌ فشل مسح الرسائل: ' + error.message);
            }
        }

        // Show raw data
        async function showRawData() {
            const modal = document.getElementById('raw-data-modal');
            const content = document.getElementById('raw-data-content');
            
            modal.classList.add('active');
            content.innerHTML = 'جاري التحميل...';

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const data = await response.json();
                content.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                content.textContent = 'فشل جلب البيانات: ' + error.message;
            }
        }

        function closeRawData() {
            document.getElementById('raw-data-modal').classList.remove('active');
        }

        // Close modal on overlay click
        document.getElementById('raw-data-modal').addEventListener('click', function(e) {
            if (e.target === this) closeRawData();
        });

        // Auto-load on page load
        window.onload = function() {
            loadMessages();
            // Auto-refresh every 30 seconds
            setInterval(loadMessages, 30000);
        };

        console.log('🤖 لوحة تحكم البوت جاهزة | CD-CARD');
    </script>
</body>
</html>
