<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | CD-CARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        input { display: block; margin: 10px auto; padding: 10px; width: 80%; max-width: 300px; border-radius: 5px; border: 1px solid #30363d; background: #161b22; color: white; }
        button { padding: 10px 20px; background: #00ff88; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>تسجيل الدخول لمتجر CD-CARD</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p id="msg"></p>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
            authDomain: "cd-card-87365.firebaseapp.com", 
            projectId: "cd-card-87365", 
            storageBucket: "cd-card-87365.firebasestorage.app", 
            messagingSenderId: "397926299412", 
            appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => { window.location.href = "index.html"; })
                .catch(err => { document.getElementById('msg').innerText = "خطأ: " + err.message; });
        }
    </script>
</body>
</html>
