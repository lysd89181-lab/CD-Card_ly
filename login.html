<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | CD-CARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #39ff14;
            --bg-dark: #080808;
            --card-bg: #121212;
            --input-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #888888;
            --shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #080808 100%);
        }

        /* حاوية النموذج الرئيسية */
        .auth-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            perspective: 1000px;
        }

        .auth-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 25px;
            border: 1px solid #222;
            box-shadow: var(--shadow);
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        /* تأثيرات النيون الخلفية */
        .auth-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, #222, var(--neon-green), transparent);
            border-radius: 25px; z-index: -1; opacity: 0.3;
        }

        .logo-area { margin-bottom: 30px; }
        .logo-area img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 2px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green);
            transition: 0.5s;
        }
        .logo-area img:hover { transform: rotate(360deg); }

        h2 { font-size: 24px; margin-bottom: 10px; color: var(--neon-green); }
        p.subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        /* ستايل المدخلات */
        .input-group { position: relative; margin-bottom: 20px; text-align: right; }
        .input-group i {
            position: absolute; right: 15px; top: 43px; color: var(--neon-green); font-size: 18px;
        }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-dim); margin-right: 5px; }
        
        input {
            width: 100%; padding: 14px 45px 14px 15px; background: var(--input-bg);
            border: 1px solid #222; border-radius: 12px; color: #fff; font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(57,255,20,0.1); outline: none; }

        /* الأزرار */
        .btn-submit {
            width: 100%; padding: 15px; background: transparent;
            color: var(--neon-green); border: 2px solid var(--neon-green);
            border-radius: 12px; font-size: 17px; font-weight: bold;
            cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-submit:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }

        .toggle-btn {
            margin-top: 25px; font-size: 14px; color: var(--text-dim); cursor: pointer;
        }
        .toggle-btn span { color: var(--neon-green); font-weight: bold; text-decoration: underline; }

        /* رسائل الخطأ والنجاح */
        #msg { margin-top: 15px; font-size: 13px; min-height: 20px; }
        .error { color: #ff4444; }
        .success { color: var(--neon-green); }

        /* شاشة التحميل المصغرة */
        .loader {
            display: none; width: 20px; height: 20px; border: 2px solid #111;
            border-top-color: var(--neon-green); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* آية الكرسي في الأسفل بشكل جمالي */
        .bottom-quran {
            position: fixed; bottom: 10px; width: 100%; text-align: center;
            font-size: 11px; color: #333; padding: 0 20px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card" id="main-card">
            
            <div class="logo-area">
                <img src="cd.jpg" alt="CD-CARD">
            </div>

            <div id="login-form">
                <h2>مرحباً بك مجدداً</h2>
                <p class="subtitle">سجل دخولك للوصول إلى خدماتك</p>
                
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="l-email" placeholder="example@mail.com">
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <i class="fa fa-lock"></i>
                    <input type="password" id="l-pass" placeholder="••••••••">
                </div>

                <button class="btn-submit" onclick="login()">
                    <span id="l-text">دخول</span>
                    <div class="loader" id="l-loader"></div>
                </button>

                <div class="toggle-btn" onclick="toggleForm('reg')">ليس لديك حساب؟ <span>إنشاء حساب جديد</span></div>
            </div>

            <div id="register-form" style="display: none;">
                <h2>إنشاء حساب</h2>
                <p class="subtitle">انضم إلينا واحصل على أفضل الخدمات</p>
                
                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <i class="fa fa-user"></i>
                    <input type="text" id="r-user" placeholder="أدخل اسمك">
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="r-email" placeholder="example@mail.com">
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <i class="fa fa-lock"></i>
                    <input type="password" id="r-pass" placeholder="أدخل كلمة مرور قوية">
                </div>

                <button class="btn-submit" onclick="register()">
                    <span id="r-text">إنشاء الحساب</span>
                    <div class="loader" id="r-loader"></div>
                </button>

                <div class="toggle-btn" onclick="toggleForm('log')">لديك حساب بالفعل؟ <span>سجل دخولك</span></div>
            </div>

            <div id="msg"></div>
        </div>
    </div>

    <div class="bottom-quran">
        اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ
    </div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            storageBucket: "cd-card-87365.firebasestorage.app",
            messagingSenderId: "397926299412",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. تبديل بين الدخول والتسجيل مع تأثير بصري
        function toggleForm(type) {
            const card = document.getElementById('main-card');
            const login = document.getElementById('login-form');
            const register = document.getElementById('register-form');
            const msg = document.getElementById('msg');
            
            msg.innerText = "";
            card.style.transform = "rotateY(10deg) scale(0.95)";
            
            setTimeout(() => {
                if(type === 'reg') {
                    login.style.display = 'none';
                    register.style.display = 'block';
                } else {
                    login.style.display = 'block';
                    register.style.display = 'none';
                }
                card.style.transform = "rotateY(0deg) scale(1)";
            }, 300);
        }

        // 3. وظيفة تسجيل الدخول
        async function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            const msg = document.getElementById('msg');
            
            if(!email || !pass) {
                showMsg("يرجى ملء كافة الحقول", "error");
                return;
            }

            setLoading('l', true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showMsg("تم الدخول بنجاح، جاري التحويل...", "success");
                setTimeout(() => window.location.href = "index.html", 1000);
            } catch(e) {
                showMsg("خطأ: البريد أو كلمة المرور غير صحيحة", "error");
            }
            setLoading('l', false);
        }

        // 4. وظيفة إنشاء حساب جديد
        async function register() {
            const user = document.getElementById('r-user').value;
            const email = document.getElementById('r-email').value;
            const pass = document.getElementById('r-pass').value;
            const msg = document.getElementById('msg');

            if(!user || !email || !pass) {
                showMsg("يرجى ملء كافة الحقول", "error");
                return;
            }

            if(pass.length < 6) {
                showMsg("كلمة المرور يجب أن تكون 6 أحرف على الأقل", "error");
                return;
            }

            setLoading('r', true);
            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                // حفظ بيانات المستخدم الإضافية في Firestore
                await db.collection("users").doc(res.user.uid).set({
                    username: user,
                    email: email,
                    balance: 0,
                    spent: 0,
                    status: "نشط",
                    dateCreated: new Date().toLocaleDateString('ar-LY')
                });
                showMsg("تم إنشاء الحساب بنجاح!", "success");
                setTimeout(() => window.location.href = "index.html", 1500);
            } catch(e) {
                if(e.code === 'auth/email-already-in-use') showMsg("البريد الإلكتروني مسجل بالفعل", "error");
                else showMsg("حدث خطأ أثناء التسجيل، حاول مجدداً", "error");
            }
            setLoading('r', false);
        }

        // وظائف مساعدة للواجهة
        function showMsg(text, type) {
            const m = document.getElementById('msg');
            m.innerText = text;
            m.className = type;
        }

        function setLoading(prefix, isLoad) {
            const text = document.getElementById(prefix + '-text');
            const loader = document.getElementById(prefix + '-loader');
            const btn = text.parentElement;

            if(isLoad) {
                text.style.display = 'none';
                loader.style.display = 'block';
                btn.disabled = true;
            } else {
                text.style.display = 'block';
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
