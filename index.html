<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD | المتجر المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0a0a0b; --card: #161618; --accent: #00ff88; --text: #ffffff; --input-bg: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* الهيدر العلوي */
        .user-header { background: var(--card); padding: 20px; border-bottom: 1px solid #2c2c2e; margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-item { background: #000; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #2c2c2e; }
        .stat-item small { color: #8e8e93; font-size: 11px; display: block; }
        .stat-item b { color: var(--accent); font-size: 16px; }

        .container { padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; }

        /* تنسيق الصناديق والمدخلات */
        .box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #2c2c2e; margin-bottom: 15px; }
        label { display: block; margin: 10px 0 5px; font-size: 13px; color: var(--accent); }
        select, input { width: 100%; background: var(--input-bg); border: 1px solid #3a3a3c; color: #fff; padding: 12px; border-radius: 10px; box-sizing: border-box; outline: none; }
        
        .description-text { background: #000; border-right: 3px solid var(--accent); padding: 10px; font-size: 12px; color: #ced4da; margin: 10px 0; line-height: 1.6; }

        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2c2c2e; z-index: 1000; }
        .nav-btn { background: none; border: none; color: #8e8e93; font-size: 11px; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--accent); }

        /* صفحة الإعدادات */
        .menu-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #2c2c2e; text-decoration: none; color: #fff; font-size: 14px; }
        .ref-card { background: linear-gradient(45deg, #161618, #004422); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="user-header">
    <div style="font-weight: bold; font-size: 18px;">مرحباً، <span id="uName">...</span></div>
    <div class="stats-grid">
        <div class="stat-item"><small>الرصيد المتوفر</small><b id="uBal">0.00</b></div>
        <div class="stat-item"><small>إجمالي المنفق</small><b id="uSpent">0.00</b></div>
    </div>
</div>

<div class="container">
    <div id="newOrder" class="page-section active">
        <div class="box">
            <label>اختر الفئة</label>
            <select id="cat" onchange="loadServices()"></select>
            
            <label>اختر الخدمة</label>
            <select id="serv" onchange="showDetails()"></select>
            
            <div id="descArea" class="description-text" style="display:none;">
                <b>الوصف:</b> ضمان 2 يوم فقط.
            </div>

            <label>الرابط أو الآيدي</label>
            <input type="text" id="link" placeholder="ضع الرابط هنا">

            <label>الكمية</label>
            <input type="number" id="qty" oninput="calc()">

            <div style="text-align: center; margin: 15px 0; background: #000; padding: 10px; border-radius: 10px;">
                <small>السعر الإجمالي:</small><br>
                <span id="total" style="color:var(--accent); font-weight:bold; font-size:20px;">0.00</span> <small>د.ل</small>
            </div>

            <button onclick="send()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:bold; font-size:16px;">طلب الآن ✅</button>
        </div>
    </div>

    <div id="myOrders" class="page-section">
        <h3 style="color: var(--accent);">📦 سجل طلباتك</h3>
        <div id="ordersList"></div>
    </div>

    <div id="settings" class="page-section">
        <div class="ref-card">
            <h3 style="margin:0 0 10px 0;">💰 برنامج الشراكة</h3>
            <p style="font-size: 11px; color: #ced4da;">شارك الرابط واربح عمولة 4% عن كل شحن يقوم به أصدقاؤك!</p>
            <div style="background:#000; padding:10px; border-radius:5px; font-size:10px; border:1px dashed var(--accent);" id="refLink">...</div>
        </div>

        <div class="box" style="padding:0; margin-top:15px;">
            <a href="#" class="menu-item"><span>📖 شرح استخدام الموقع</span> <span>></span></a>
            <a href="https://t.me/your_channel" class="menu-item"><span>📢 قناة الدعم (تليجرام)</span> <span>></span></a>
            <a href="#" class="menu-item"><span>📜 شروط الخدمة</span> <span>></span></a>
            <a href="#" class="menu-item"><span>💡 إعطاء رأي أو اقتراح</span> <span>></span></a>
        </div>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-btn" onclick="showPage('settings', this)">⚙️<br>الإعدادات</button>
    <button class="nav-btn active" onclick="showPage('newOrder', this)">🏠<br>الرئيسية</button>
    <button class="nav-btn" onclick="showPage('myOrders', this)">🛒<br>طلباتي</button>
</div>

<script>
    // استخدم بيانات Firebase الخاصة بك هنا
    const firebaseConfig = {
      apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
      authDomain: "cd-card-87365.firebaseapp.com",
      projectId: "cd-card-87365",
      storageBucket: "cd-card-87365.firebasestorage.app",
      messagingSenderId: "397926299412",
      appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let services = [];
    let selected = null;

    // وظيفة التنقل بين الصفحات
    function showPage(id, btn) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'myOrders') loadOrders();
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                const data = doc.data();
                document.getElementById('uName').innerText = user.email.split('@')[0];
                document.getElementById('uBal').innerText = data.balance.toFixed(2);
                document.getElementById('uSpent').innerText = (data.spent || 0).toFixed(2);
                document.getElementById('refLink').innerText = `mohammedstore.com/ref?id=${user.uid}`;
            });
            initData();
        }
    });

    async function initData() {
        const snap = await db.collection('services').get();
        const cats = new Set();
        snap.forEach(doc => {
            services.push({id: doc.id, ...doc.data()});
            cats.add(doc.data().category);
        });
        const catSelect = document.getElementById('cat');
        catSelect.innerHTML = '<option value="">-- اختر القسم --</option>';
        cats.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function loadServices() {
        const c = document.getElementById('cat').value;
        const sSelect = document.getElementById('serv');
        sSelect.innerHTML = '<option value="">-- اختر الخدمة --</option>';
        services.filter(s => s.category === c).forEach(s => {
            sSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
    }

    function showDetails() {
        const id = document.getElementById('serv').value;
        selected = services.find(s => s.id === id);
        if(selected) {
            document.getElementById('descArea').style.display = 'block';
            document.getElementById('qty').value = selected.min;
            calc();
        }
    }

    function calc() {
        if(selected) {
            const q = document.getElementById('qty').value || 0;
            document.getElementById('total').innerText = ((q/1000) * selected.finalPrice).toFixed(3);
        }
    }

    async function send() {
        const total = parseFloat(document.getElementById('total').innerText);
        const bal = parseFloat(document.getElementById('uBal').innerText);
        const link = document.getElementById('link').value;
        if(!selected || !link || bal < total) return alert("يرجى التأكد من الرصيد والبيانات");
        
        if(confirm("تأكيد طلب هذه الخدمة؟")) {
            const u = auth.currentUser;
            await db.collection('users').doc(u.uid).update({
                balance: firebase.firestore.FieldValue.increment(-total),
                spent: firebase.firestore.FieldValue.increment(total)
            });
            await db.collection('orders').add({
                uid: u.uid, serviceName: selected.name, cost: total,
                link: link, quantity: document.getElementById('qty').value,
                status: "قيد الانتظار", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم إرسال الطلب!");
            showPage('myOrders', document.querySelectorAll('.nav-btn')[2]);
        }
    }

    async function loadOrders() {
        const list = document.getElementById('ordersList');
        list.innerHTML = 'جاري التحميل...';
        const snap = await db.collection('orders').where('uid', '==', auth.currentUser.uid).orderBy('timestamp', 'desc').get();
        list.innerHTML = '';
        snap.forEach(doc => {
            const o = doc.data();
            list.innerHTML += `<div class="box" style="font-size:12px; margin-bottom:10px;">
                <div style="display:flex; justify-content:space-between;"><b>${o.serviceName}</b> <span style="color:var(--accent)">${o.status}</span></div>
                <div style="color:#8e8e93; margin-top:5px;">التكلفة: ${o.cost} د.ل | الكمية: ${o.quantity}</div>
            </div>`;
        });
    }
</script>
</body>
</html>
