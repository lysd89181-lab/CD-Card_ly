<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر CDCARD</title>

<style>
:root{
--bg:#06080f;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.15);
--accent:#00ffa6;
--text:#ffffff;
--danger:#ff4d4d;
}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(120deg,#02040a,#0a0f1f,#02040a);
color:var(--text);
text-align:center;
padding-bottom:170px;
}

.glass{
background:var(--glass);
backdrop-filter:blur(14px);
border:1px solid var(--border);
border-radius:20px;
box-shadow:0 8px 30px rgba(0,255,166,0.08);
}

.hero{
padding:30px 15px;
margin:12px;
}

.hero h1{
margin:0;
font-size:2rem;
color:var(--accent);
text-shadow:0 0 15px rgba(0,255,166,0.4);
}

.hero p{
color:#aaa;
margin-top:5px;
font-size:0.9rem;
}

/* تنسيق طرق الدفع الجديدة */
.payment-top{
margin:10px 12px;
padding:12px;
display:flex;
gap:10px;
flex-wrap: wrap;
}

.pay-card{
flex:1;
min-width: 80px;
padding:12px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
border-radius:15px;
background: var(--glass);
border: 1px solid var(--border);
font-size: 0.9rem;
}

.pay-card.active{
border:1px solid var(--accent);
box-shadow:0 0 15px rgba(0,255,166,0.4);
background:rgba(0,255,166,0.08);
color: var(--accent);
}

.category-title{
text-align:right;
margin:25px 15px 10px;
color:var(--accent);
font-weight:bold;
font-size:1.2rem;
border-right:4px solid var(--accent);
padding-right:10px;
}

.products-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:0 10px;
}

.product-card{
padding:10px;
transition:0.3s;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.product-img{
width:100%;
height:100px;
border-radius:15px;
object-fit:cover;
}

h3{
font-size:0.85rem;
margin:8px 0;
}

.price-tag{
color:var(--accent);
font-weight:bold;
font-size:0.9rem;
display: block;
margin-bottom: 5px;
}

/* تنسيق حقل الكمية */
.qty-input{
width: 80%;
background: rgba(255,255,255,0.1);
border: 1px solid var(--border);
color: white;
border-radius: 5px;
padding: 5px;
text-align: center;
margin: 5px auto;
font-size: 0.8rem;
}

.add-btn{
margin-top:8px;
width:95%;
padding:9px;
border-radius:25px;
border:none;
background:linear-gradient(135deg,#00ffa6,#00cfff);
color:black;
font-weight:bold;
cursor:pointer;
}

.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
padding:15px;
margin:10px;
z-index: 1000;
}

.cart-items-list{
max-height:120px;
overflow:auto;
text-align:right;
font-size:0.85rem;
margin-bottom:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.05);
padding:6px 10px;
margin-bottom:5px;
border-radius:8px;
}

.remove-btn{
color:var(--danger);
cursor:pointer;
font-weight:bold;
}

.cart-summary{
display:flex;
justify-content:space-between;
align-items:center;
}

.send-btn{
background:linear-gradient(135deg,#00ffa6,#00cfff);
color:black;
border:none;
padding:12px 25px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="hero glass">
<h1>CDCARD</h1>
<p>متابعين، شحن ألعاب، واشتراكات رقمية بأسعار منافسة</p>
</div>

<div class="payment-top glass">
<div class="pay-card active" onclick="setMethod(this,'كاش',0)">💵 كاش</div>
<div class="pay-card" onclick="setMethod(this,'لبيانا',2)">📱 لبيانا (+2)</div>
<div class="pay-card" onclick="setMethod(this,'مدار',2)">📡 مدار (+2)</div>
</div>

<div id="shop-container"></div>

<div class="cart-bar glass">
<div class="cart-items-list" id="cart-items-list"></div>
<div class="cart-summary">
<div style="text-align:right;">
<span id="cart-count" style="font-size:0.8rem;color:#aaa;">المنتجات: 0</span><br>
<strong id="cart-total">الإجمالي: 0 د.ل</strong>
</div>
<button class="send-btn" onclick="sendWhatsApp()">إرسال عبر واتساب ✅</button>
</div>
</div>

<script>
let currentMethod="كاش";
let pricePlus=0;
let cart=[];

// التعديل الثاني: إضافة خاصية isSocial لتمييز المنتجات التي تتطلب كمية
const categories={
"تيك توك":[
{name:"1000 متابع تيك توك",price:12,img:"tiktok.jpg"},
{name:"1000 لايك تيك توك",price:3,img:"tiktok.jpg"},
{name:"1000 مشاهدة تيك توك",price:1,img:"tiktok.jpg"},
{name:"100 مشاركة تيك توك",price:1,img:"tiktok.jpg"}
],
"عملات تيك توك":[
{name:"30 عملة تيك توك",price:4,img:"etonz.jpg"},
{name:"50 عملة تيك توك",price:7,img:"etonz.jpg"},
{name:"100 عملة تيك توك",price:14,img:"etonz.jpg"},
{name:"200 عملة تيك توك",price:28,img:"etonz.jpg"}
],
"انستقرام":[
{name:"1000 متابع انستقرام",price:8,img:"instagram.jpg"},
{name:"1000 لايك انستقرام",price:4,img:"instagram.jpg"},
{name:"1000 مشاهدة انستقرام",price:1,img:"instagram.jpg"},
{name:"100 مشاركة انستقرام",price:1,img:"instagram.jpg"}
],
"فيسبوك":[
{name:"1000 متابع صفحة",price:5,img:"facebook.jpg"},
{name:"1000 مشاهدة ريلز",price:1,img:"facebook.jpg"},
{name:"اعجابات منشور فيسبوك",price:6,img:"facebook.jpg"},
{name:"1000 متابع مجموعة",price:8,img:"facebook.jpg"}
],
"ببجي موبايل":[
{name:"ببجي 60 شدة",price:11,img:"pubg.jpg"},
{name:"ببجي 120 شدة",price:22,img:"pubg.jpg"},
{name:"ببجي 325 شدة",price:55,img:"pubg.jpg"},
{name:"ببجي 660 شدة",price:115,img:"pubg.jpg"}
],
"نجوم تيليجرام":[
{name:"100 نجمة",price:25,img:"telegram.jpg"},
{name:"150 نجمة",price:37,img:"telegram.jpg"},
{name:"250 نجمة",price:59,img:"telegram.jpg"},
{name:"350 نجمة",price:80,img:"telegram.jpg"},
{name:"500 نجمة",price:113,img:"telegram.jpg"}
],
"فري فاير":[
{name:"110 جوهرة",price:20,img:"freefire.jpg"},
{name:"221 جوهرة",price:32,img:"freefire.jpg"},
{name:"2420 جوهرة",price:225,img:"freefire.jpg"}
],
"اشتراكات":[
{name:"اشتراك شات جي بي تي - شهري",price:250,img:"shats.jpg"},
{name:"شاهد شهر",price:30,img:"shahid.jpg"},
{name:"نتفليكس شهر",price:30,img:"netflix.jpg"},
{name:"كاب كات شخصي",price:50,img:"capcut.jpg"},
{name:"تروكولر سنوي",price:160,img:"truecaller.jpg"}
],
"سناب شات بلس":[
{name:"سناب بلس 3 شهور",price:70,img:"snapchat.jpg"},
{name:"سناب بلس 6 شهور",price:130,img:"snapchat.jpg"},
{name:"سناب بلس سنوي",price:240,img:"snapchat.jpg"}
],
"روبلكس":[
{name:"40 عملة روبلكس",price:15,img:"roblox.jpg"},
{name:"80 عملة روبلكس",price:29,img:"roblox.jpg"},
{name:"400 عملة روبلكس",price:98,img:"roblox.jpg"}
],
"FC 25":[
{name:"40 نقطة FC",price:15,img:"fc.jpg"},
{name:"100 نقطة FC",price:29,img:"fc.jpg"},
{name:"520 نقطة FC",price:71,img:"fc.jpg"},
{name:"1070 نقطة FC",price:138,img:"fc.jpg"}
]
};

function render(){
const container=document.getElementById("shop-container");
container.innerHTML="";

for(let cat in categories){
container.innerHTML+=`<div class="category-title">${cat}</div>`;
let grid=document.createElement("div");
grid.className="products-grid";

categories[cat].forEach((p, index)=>{
let cardContent = '';
if(p.isSocial) {
    // منتج بSystem كمية (سوشيال ميديا)
    cardContent = `
    <div class="product-card glass">
        <img src="${p.img}" class="product-img">
        <h3>${p.name}</h3>
        <small style="font-size:0.7rem; color:#00ffa6">السعر لكل 1000: ${p.pricePer1000 + pricePlus} د.ل</small>
        <input type="number" class="qty-input" id="qty-${cat}-${index}" value="200" min="200" step="100">
        <button class="add-btn" onclick="addSocialToCart('${p.name}', ${p.pricePer1000}, 'qty-${cat}-${index}')">إضافة +</button>
    </div>`;
} else {
    // منتج عادي (شدات، اشتراكات)
    cardContent = `
    <div class="product-card glass">
        <img src="${p.img}" class="product-img">
        <h3>${p.name}</h3>
        <span class="price-tag">${p.price+pricePlus} د.ل</span>
        <button class="add-btn" onclick="addToCart('${p.name}',${p.price})">إضافة +</button>
    </div>`;
}
grid.innerHTML += cardContent;
});
container.appendChild(grid);
}
}

function setMethod(el,method,plus){
document.querySelectorAll(".pay-card").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
currentMethod=method;
pricePlus=plus;
// تحديث الأسعار في السلة عند تغيير طريقة الدفع
cart.forEach(item => {
    item.finalPrice = (item.isSocial ? (item.unitPrice + pricePlus) * (item.qty/1000) : (item.basePrice + pricePlus));
});
render();
updateUI();
}

// إضافة منتج عادي
function addToCart(name,basePrice){
cart.push({
    id:Date.now(),
    name:name,
    basePrice:basePrice,
    finalPrice:basePrice+pricePlus,
    isSocial: false
});
updateUI();
}

// إضافة منتج سوشيال ميديا بكمية مخصصة
function addSocialToCart(name, pricePer1000, inputId){
    let qty = parseInt(document.getElementById(inputId).value);
    if(qty < 200) return alert("الحد الأدنى للطلب هو 200");
    
    let currentUnitPrice = pricePer1000 + pricePlus;
    let finalPrice = (currentUnitPrice * qty) / 1000;

    cart.push({
        id: Date.now(),
        name: `${name} (كمية: ${qty})`,
        unitPrice: pricePer1000,
        qty: qty,
        finalPrice: finalPrice,
        isSocial: true
    });
    updateUI();
}

function removeFromCart(id){
cart=cart.filter(item=>item.id!==id);
updateUI();
}

function updateUI(){
const list=document.getElementById("cart-items-list");
list.innerHTML="";
let total=0;

cart.forEach(item=>{
total+=item.finalPrice;
list.innerHTML+=`
<div class="cart-item">
<span>${item.name} - ${item.finalPrice.toFixed(2)} د.ل</span>
<span class="remove-btn" onclick="removeFromCart(${item.id})">✖</span>
</div>
`;
});

document.getElementById("cart-count").innerText=`المنتجات: ${cart.length}`;
document.getElementById("cart-total").innerText=`الإجمالي: ${total.toFixed(2)} د.ل`;
}

function sendWhatsApp(){
if(cart.length===0)return alert("السلة فارغة!");
let itemsText=cart.map(it=>`- ${it.name}: ${it.finalPrice.toFixed(2)} د.ل`).join('%0A');
let total=cart.reduce((s,item)=>s+item.finalPrice,0);
let phone="218912377291";

let msg=`*طلب جديد - متجر CDCARD*%0A*طريقة الدفع:* ${currentMethod}%0A------------------%0A${itemsText}%0A------------------%0A*الإجمالي:* ${total.toFixed(2)} د.ل`;

window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');
}

render();
</script>
</body>
</html>
