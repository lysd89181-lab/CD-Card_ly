<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABD CENTER | المتجر المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050a18; --card: #0d162d; --blue: #007aff; --glow: #00d4ff; --text: #fff; --red: #ff4757; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(13, 22, 45, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); sticky; top: 0; z-index: 1000; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--glow); }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #1e293b; background: #16223f; color: #fff; outline: none; }
        
        .btn-blue { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(145deg, var(--blue), #0056b3); color: white; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #004494; transition: 0.2s; }
        .btn-blue:active { transform: translateY(3px); box-shadow: 0 2px 0 #004494; }
        .btn-blue:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box b { display: block; font-size: 18px; color: var(--glow); }

        #auth-section, #main-app { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--glow);">ABD CENTER</div>
    <div id="user-nav" style="display:none; font-size: 12px;">
        <span id="nav-name"></span> | <span id="logout-btn" style="color:var(--red); cursor:pointer;">خروج</span>
    </div>
</header>

<div class="container">
    <div id="auth-section">
        <div class="card">
            <h2 id="auth-title" style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
            <div id="name-field" style="display:none;" class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" id="reg-name" placeholder="ادخل اسمك">
            </div>
            <div class="input-group"><label>البريد الإلكتروني</label><input type="email" id="auth-email"></div>
            <div class="input-group"><label>كلمة المرور</label><input type="password" id="auth-pass"></div>
            <button class="btn-blue" id="auth-btn">دخول</button>
            <p style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer;" onclick="toggleAuth()">تبديل (حساب جديد / دخول)</p>
        </div>
    </div>

    <div id="main-app">
        <div class="card">
            <div class="stat-grid">
                <div class="stat-box"><span>رصيدك</span><b id="user-balance">$0.00</b></div>
                <div class="stat-box"><span>المنفق</span><b id="user-spent">$0.00</b></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom:15px; font-size:16px;">طلب خدمة جديدة</h3>
            <div class="input-group">
                <label>نوع الخدمة</label>
                <select id="service-type">
                    <option value="1.5">متابعين تيك توك ($1.5 لكل 1000)</option>
                    <option value="0.8">لايكات انستقرام ($0.8 لكل 1000)</option>
                    <option value="5.0">مشاهدات يوتيوب ($5.0 لكل 1000)</option>
                </select>
            </div>
            <div class="input-group"><label>الرابط</label><input type="url" id="order-link" placeholder="https://..."></div>
            <div class="input-group"><label>الكمية</label><input type="number" id="order-qty" placeholder="مثال: 1000"></div>
            <div id="order-cost" style="margin-bottom:10px; font-size:12px; color:var(--glow);">التكلفة المحسوبة: $0.00</div>
            <button class="btn-blue" id="place-order">تأكيد وشراء الآن</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
        authDomain: "cd-card-87365.firebaseapp.com",
        projectId: "cd-card-87365",
        storageBucket: "cd-card-87365.firebasestorage.app",
        messagingSenderId: "397926299412",
        appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;
    let currentUserData = null;

    // 1. تبديل واجهة الدخول
    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب";
        document.getElementById('name-field').style.display = isLogin ? "none" : "block";
        document.getElementById('auth-btn').innerText = isLogin ? "دخول" : "إنشاء حساب جديد";
    };

    // 2. تنفيذ الدخول أو التسجيل
    document.getElementById('auth-btn').onclick = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const name = document.getElementById('reg-name').value;

        try {
            if(isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // إنشاء سجل مالي فوري
                await setDoc(doc(db, "users", res.user.uid), {
                    full_name: name, balance: 0.0, spent: 0.0, role: 'user'
                });
            }
        } catch(e) { alert("خطأ: " + e.message); }
    };

    // 3. مراقبة حالة المستخدم وجلب بياناته
    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                currentUserData = snap.data();
                updateUI();
                document.getElementById('auth-section').classList.remove('active');
                document.getElementById('main-app').classList.add('active');
                document.getElementById('user-nav').style.display = "block";
                document.getElementById('nav-name').innerText = currentUserData.full_name;
            }
        } else {
            document.getElementById('auth-section').classList.add('active');
            document.getElementById('main-app').classList.remove('active');
            document.getElementById('user-nav').style.display = "none";
        }
    });

    function updateUI() {
        document.getElementById('user-balance').innerText = "$" + currentUserData.balance.toFixed(2);
        document.getElementById('user-spent').innerText = "$" + currentUserData.spent.toFixed(2);
    }

    // 4. نظام حساب التكلفة والطلب
    const calcCost = () => {
        const price = parseFloat(document.getElementById('service-type').value);
        const qty = parseInt(document.getElementById('order-qty').value) || 0;
        const total = (price * qty) / 1000;
        document.getElementById('order-cost').innerText = "التكلفة المحسوبة: $" + total.toFixed(2);
        return total;
    };

    document.getElementById('order-qty').oninput = calcCost;
    document.getElementById('service-type').onchange = calcCost;

    // 5. زر تأكيد الطلب مع الخصم من الرصيد
    document.getElementById('place-order').onclick = async () => {
        const cost = calcCost();
        const link = document.getElementById('order-link').value;
        
        if(!link || cost <= 0) return alert("أكمل بيانات الطلب أولاً");
        if(currentUserData.balance < cost) return alert("عذراً، رصيدك غير كافٍ. يرجى الشحن أولاً");

        if(confirm(`سيتم خصم $${cost.toFixed(2)} من حسابك. تأكيد؟`)) {
            try {
                // أ) خصم الرصيد من Firestore
                const newBalance = currentUserData.balance - cost;
                const newSpent = currentUserData.spent + cost;
                
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    balance: newBalance,
                    spent: newSpent
                });

                // ب) تسجيل الطلب في مجموعة جديدة اسمها orders
                await addDoc(collection(db, "orders"), {
                    userId: auth.currentUser.uid,
                    userEmail: auth.currentUser.email,
                    link: link,
                    cost: cost,
                    status: 'pending',
                    date: new Date().toISOString()
                });

                alert("تم إرسال طلبك بنجاح!");
                location.reload(); // لتحديث البيانات
            } catch(e) { alert("فشل تنفيذ الطلب: " + e.message); }
        }
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>
