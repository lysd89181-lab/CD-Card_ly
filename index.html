<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD | صيانة مؤقتة</title>
    <style>
        :root {
            --accent: #00ff88;
            --bg: #0d1117;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #16212e 0%, #080a0c 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .maintenance-container {
            padding: 20px;
            max-width: 500px;
        }

        .logo-area {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin: 0 auto 20px;
            background: url('cd.jpg') center/cover;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 255, 136, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        p {
            color: #8b949e;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .contact-btn {
            display: inline-block;
            padding: 12px 25px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .loader {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 40px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="logo-area"></div>
        <h1>الموقع قيد الصيانة</h1>
        <p>نعمل حالياً على تحديث البيانات وتحسين تجربتكم في <strong>CD-CARD</strong>. سنعود إليكم قريباً بأفضل الأسعار والخدمات.</p>
        
        <a href="https://wa.me/218912377291" class="contact-btn">تواصل معنا عبر واتساب</a>

        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div style="margin-top: 50px; font-size: 12px; color: #444;">
            © 2026 CD-CARD ALL RIGHTS RESERVED
        </div>
    </div>

</body>
</html>
