<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CD-CARD</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(140deg,#05070f,#0b1225,#05070f);
color:white;
padding:10px;
}

.container{
max-width:520px;
margin:auto;
}

.title{
text-align:center;
color:#00ffa6;
font-size:28px;
margin-top:10px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
padding:15px;
margin-top:15px;
backdrop-filter:blur(10px);
}

label{
display:block;
margin-top:10px;
margin-bottom:5px;
color:#00ffa6;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#0e1529;
color:white;
}

.price-box{
margin-top:10px;
background:#0e1529;
padding:10px;
border-radius:8px;
font-size:18px;
text-align:center;
}

button{
width:100%;
margin-top:10px;
padding:14px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#00ffa6,#00cfff);
color:black;
}

.payments{
display:flex;
gap:10px;
margin-top:10px;
}

.pay{
flex:1;
padding:10px;
text-align:center;
border-radius:10px;
background:#0e1529;
cursor:pointer;
}

.pay.active{
border:1px solid #00ffa6;
color:#00ffa6;
}

.cart{
margin-top:15px;
}

.cart-item{
background:#0e1529;
padding:8px;
border-radius:8px;
margin-bottom:5px;
display:flex;
justify-content:space-between;
}

.remove{
color:red;
cursor:pointer;
}

.total{
margin-top:10px;
font-size:18px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="title">CD-CARD</div>

<div class="card">

<label>الفئة</label>
<select id="category" onchange="loadServices()"></select>

<label>الخدمة</label>
<select id="service" onchange="serviceChanged()"></select>

<label>الرابط</label>
<input id="link" placeholder="ضع الرابط">

<label>الكمية</label>
<input id="qty" type="number" value="50" oninput="updatePrice()">

<label>التكلفة</label>
<div class="price-box">
<span id="price">0</span> د.ل
</div>

<label>طريقة الدفع</label>

<div class="payments">
<div class="pay active" onclick="setPay(this,'كاش',0)">💸 كاش</div>
<div class="pay" onclick="setPay(this,'لبيانا',0.25)">📲 لبيانا</div>
<div class="pay" onclick="setPay(this,'مدار',0.25)">📡 مدار</div>
</div>

<button onclick="addToCart()">إضافة إلى السلة</button>

</div>

<div class="card cart">

<h3>السلة</h3>

<div id="cart"></div>

<div class="total">
الإجمالي: <span id="total">0</span> د.ل
</div>

<button onclick="sendOrder()">إرسال الطلب</button>

</div>

</div>

<script>

let payPercent=0
let payType="كاش"
let cart=[]

const services={

"تيك توك":[
{name:"1000 متابع تيك توك",price:12,isSocial:true},
{name:"1000 لايك تيك توك",price:3,isSocial:true},
{name:"1000 مشاهدة تيك توك",price:1,isSocial:true},
{name:"100 مشاركة تيك توك",price:1,isSocial:true}
],

"انستقرام":[
{name:"1000 متابع انستقرام",price:8,isSocial:true},
{name:"1000 لايك انستقرام",price:4,isSocial:true},
{name:"1000 مشاهدة انستقرام",price:1,isSocial:true}
],

"فيسبوك":[
{name:"1000 متابع صفحة",price:5,isSocial:true},
{name:"1000 مشاهدة ريلز",price:1,isSocial:true},
{name:"1000 متابع مجموعة",price:8,isSocial:true}
],

"ببجي":[
{name:"60 شدة",price:11,isSocial:false},
{name:"120 شدة",price:22,isSocial:false},
{name:"325 شدة",price:55,isSocial:false},
{name:"660 شدة",price:115,isSocial:false}
],

"فري فاير":[
{name:"110 جوهرة",price:20,isSocial:false},
{name:"221 جوهرة",price:32,isSocial:false},
{name:"2420 جوهرة",price:225,isSocial:false}
],

"روبلكس":[
{name:"40 روبكس",price:15,isSocial:false},
{name:"80 روبكس",price:29,isSocial:false},
{name:"400 روبكس",price:98,isSocial:false}
],

"اشتراكات":[
{name:"نتفليكس شهر",price:30,isSocial:false},
{name:"شاهد شهر",price:30,isSocial:false},
{name:"كاب كات شخصي",price:50,isSocial:false},
{name:"تروكولر سنوي",price:160,isSocial:false}
],

"سناب بلس":[
{name:"3 شهور سناب بلس",price:70,isSocial:false},
{name:"6 شهور سناب بلس",price:130,isSocial:false},
{name:"سنوي سناب بلس",price:240,isSocial:false}
]

}

const cat=document.getElementById("category")

for(let c in services){
let opt=document.createElement("option")
opt.value=c
opt.textContent=c
cat.appendChild(opt)
}

function loadServices(){
let s=document.getElementById("service")
s.innerHTML=""

services[cat.value].forEach((srv,i)=>{
let opt=document.createElement("option")
opt.value=i
opt.textContent=srv.name
s.appendChild(opt)
})

serviceChanged()
}

function serviceChanged(){

let srv=services[cat.value][document.getElementById("service").value]

if(srv.isSocial){
document.getElementById("qty").min=50
document.getElementById("qty").value=50
}
else{
document.getElementById("qty").min=1
document.getElementById("qty").max=1
document.getElementById("qty").value=1
}

updatePrice()

}

function updatePrice(){

let srv=services[cat.value][document.getElementById("service").value]

let qty=parseInt(document.getElementById("qty").value)

let price=(srv.price*(srv.isSocial? qty/1000:1))

price=price+(price*payPercent)

document.getElementById("price").innerText=price.toFixed(2)

}

function setPay(el,type,p){

document.querySelectorAll(".pay").forEach(e=>e.classList.remove("active"))

el.classList.add("active")

payPercent=p
payType=type

updatePrice()

}

function addToCart(){

let price=parseFloat(document.getElementById("price").innerText)
let qty=parseInt(document.getElementById("qty").value)
let srv=services[cat.value][document.getElementById("service").value]
let link=document.getElementById("link").value

cart.push({
service:srv.name,
qty:qty,
link:link,
price:price
})

renderCart()

}

function renderCart(){

let box=document.getElementById("cart")
box.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price

box.innerHTML+=`
<div class="cart-item">
<span>${item.service} - ${item.price.toFixed(2)} د.ل</span>
<span class="remove" onclick="removeItem(${i})">✖</span>
</div>
`

})

document.getElementById("total").innerText=total.toFixed(2)

}

function removeItem(i){
cart.splice(i,1)
renderCart()
}

function sendOrder(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<1){
alert("لايمكن ارسال الطلب أقل من 1 دينار")
return
}

let msg="طلب جديد - CD CARD%0A%0A"

cart.forEach(item=>{
msg+=`الخدمة: ${item.service}%0Aالرابط: ${item.link}%0Aالكمية: ${item.qty}%0Aالسعر: ${item.price.toFixed(2)} د.ل%0A%0A`
})

msg+="طريقة الدفع: "+payType+"%0A"
msg+="الإجمالي: "+total.toFixed(2)+" د.ل"

window.open("https://wa.me/218912377291?text="+msg)

}

loadServices()

</script>

</body>
</html>
