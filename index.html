<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg: #080808; --card-bg: #121212; --accent: #00ff88; --text: #ffffff; --border: rgba(255,255,255,0.07); }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; padding-bottom: 80px; }
        
        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; display: flex; justify-content: space-around; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); z-index: 2000; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-center { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,255,136,0.3); }

        .section { display: none; }
        .section.active { display: block; }

        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid var(--border); overflow: hidden; }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
        .service-title { font-size: 11px; height: 35px; overflow: hidden; }
        .service-desc { font-size: 9px; color: #888; margin-bottom: 8px; height: 25px; }
        .data-input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 6px; border-radius: 5px; margin-bottom: 5px; font-size: 11px; box-sizing: border-box; }
        .buy-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .order-item { background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-right: 4px solid var(--accent); }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h2 style="color:var(--accent)">CD-CARD</h2>
    <input type="email" id="loginEmail" style="width:100%; max-width:300px; padding:12px; margin:10px; border-radius:10px; background:#121212; color:#fff; border:1px solid #333;" placeholder="البريد الإلكتروني">
    <input type="password" id="loginPass" style="width:100%; max-width:300px; padding:12px; margin:10px; border-radius:10px; background:#121212; color:#fff; border:1px solid #333;" placeholder="كلمة المرور">
    <button class="buy-btn" style="max-width:300px" onclick="login()">دخول</button>
</div>

<div id="main-content" style="display:none">
    
    <div id="new-order-sec" class="section active">
        <h3 style="text-align:center; color:var(--accent);">طلب جديد</h3>
        <div class="services-grid" id="grid"></div>
    </div>

    <div id="orders-sec" class="section">
        <h3 style="text-align:center; color:var(--accent);">سجل طلباتي</h3>
        <div id="orderList"></div>
    </div>

    <div id="support-sec" class="section">
        <h3 style="text-align:center; color:var(--accent);">الدعم الفني</h3>
        <div class="card" style="text-align:center; padding:40px 20px;">
            <p>لأي استفسار أو مشكلة في الطلب، تواصل معنا مباشرة:</p>
            <button class="buy-btn" onclick="window.open('https://wa.me/218912377291')">واتساب الدعم</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="showSec('orders-sec', this)">📑<br>طلباتي</div>
        <div class="nav-item nav-center" onclick="showSec('new-order-sec', this)">طلب جديد</div>
        <div class="nav-item" onclick="showSec('support-sec', this)">💬<br>الدعم</div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
      authDomain: "cd-card-87365.firebaseapp.com",
      projectId: "cd-card-87365",
      storageBucket: "cd-card-87365.firebasestorage.app",
      messagingSenderId: "397926299412",
      appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const API_KEY = "Bc34ac73c612e956734842221d87df60";
    const API_URL = "https://ms1.shop/api/v2";

    // قائمة الخدمات مع الوصف
    const services = [
        { id: 21417, title: 'لايكات تيك توك ❤️', price: 0.63, desc: 'سرعة عالية وضمان مدى الحياة', ph: 'رابط الفيديو' },
        { id: 21186, title: 'متابعين تيك توك 👤', price: 29.65, desc: 'حسابات حقيقية بضمان 15 يوم', ph: 'رابط الحساب' },
        { id: 14016, title: 'شاهد هاتف (شهر) 📱', price: 19.0, desc: 'اشتراك رسمي على رقمك الخاص', ph: 'البيانات' },
        { id: 10918, title: 'USDT $10 💵', price: 150.0, desc: 'تحويل فوري لمحفظتك', ph: 'عنوان المحفظة' }
    ];

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadBalance(user.uid);
            loadOrders(user.uid);
            renderServices();
        }
    });

    async function login() {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }

    function loadBalance(uid) {
        db.collection('users').doc(uid).onSnapshot(doc => {
            if(doc.exists) window.currentBalance = doc.data().balance || 0;
        });
    }

    function renderServices() {
        const grid = document.getElementById('grid');
        grid.innerHTML = services.map(s => `
            <div class="card">
                <img src="cd.jpg" alt="service">
                <div class="service-title"><b>${s.title}</b></div>
                <div class="service-desc">${s.desc}</div>
                <input type="text" class="data-input" id="link-${s.id}" placeholder="${s.ph}">
                <input type="number" class="data-input" id="qty-${s.id}" placeholder="الكمية (مثلاً 1000)" value="1000">
                <div style="color:var(--accent); font-size:12px; margin-bottom:5px;">السعر: ${s.price} / 1000</div>
                <button class="buy-btn" onclick="order('${s.id}', ${s.price}, '${s.title}')">طلب</button>
            </div>`).join('');
    }

    async function order(sid, pricePer1000, sName) {
        const link = document.getElementById(`link-${sid}`).value;
        const qty = parseInt(document.getElementById(`qty-${sid}`).value);
        if(!link || !qty) return alert("أكمل البيانات!");

        const finalPrice = (pricePer1000 / 1000) * qty;
        if(window.currentBalance < finalPrice) return alert("رصيدك غير كافٍ!");

        if(confirm(`سيتم خصم ${finalPrice.toFixed(2)} LYD للكمية ${qty}. تأكيد؟`)) {
            const user = auth.currentUser;
            await db.collection('users').doc(user.uid).update({ balance: window.currentBalance - finalPrice });

            let status = "قيد المراجعة";
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: new URLSearchParams({ 'key': API_KEY, 'action': 'add', 'service': sid, 'link': link, 'quantity': qty })
                });
                const data = await res.json();
                if(data.order) status = "تم الإرسال";
            } catch(e) {}

            await db.collection('orders').add({
                uid: user.uid, serviceName: sName, price: finalPrice, qty: qty, status: status, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم الطلب!");
        }
    }

    function loadOrders(uid) {
        db.collection('orders').where('uid', '==', uid).orderBy('timestamp', 'desc').onSnapshot(snap => {
            document.getElementById('orderList').innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                return `<div class="order-item">
                    <b>${d.serviceName}</b> (الكمية: ${d.qty})<br>
                    القيمة: ${d.price.toFixed(2)} LYD | الحالة: ${d.status}
                </div>`;
            }).join('');
        });
    }
</script>
</body>
</html>
