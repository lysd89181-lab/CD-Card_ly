<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CD-CARD | متجر الاشتراكات الرقمية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--glow-color:#00ffa6;
--bg-dark:#05070f;
--card-bg:#0e1529;
--text-gray:#a0a6b5;
}

body{
margin:0;
background:var(--bg-dark);
color:white;
font-family:'Cairo',sans-serif;
padding-bottom:120px;
}

.header-brand{
text-align:center;
padding:40px 20px 20px;
}

.header-brand h1{
color:var(--glow-color);
margin:0;
font-size:38px;
text-shadow:0 0 15px rgba(0,255,166,0.4);
}

.section-header{
padding:12px 20px;
color:var(--glow-color);
border-right:4px solid var(--glow-color);
margin:30px 15px 15px;
background:linear-gradient(to left,rgba(0,255,166,0.1),transparent);
font-weight:700;
}

.services-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:0 15px;
max-width:800px;
margin:auto;
}

.service-card{
background:var(--card-bg);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
transition:0.3s;
}

.service-card:hover{
border-color:var(--glow-color);
transform:translateY(-5px);
}

.service-img{
width:100%;
height:130px;
object-fit:cover;
}

.service-body{
padding:12px;
display:flex;
flex-direction:column;
flex-grow:1;
}

.price{
color:var(--glow-color);
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.input-group{
margin-bottom:10px;
}

.link-input,.qty-input{
width:100%;
background:#05070f;
border:1px solid #1e263d;
color:white;
padding:8px;
border-radius:10px;
font-family:'Cairo';
font-size:12px;
}

.add-btn{
background:var(--glow-color);
color:black;
border:none;
padding:10px;
border-radius:12px;
font-weight:700;
cursor:pointer;
width:100%;
margin-top:auto;
}

.cart-bar{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:white;
color:black;
padding:18px;
border-radius:20px;
text-align:center;
font-weight:700;
display:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header-brand">
<h1>CD-CARD</h1>
</div>

<div id="services-container"></div>

<div class="cart-bar" id="cart-bar" onclick="sendToWhatsApp()">
إرسال الطلب (<span id="count">0</span>)
</div>

<script>

let cart=[]

const githubURL="https://raw.githubusercontent.com/lysd89181-lab/CD-Card_ly/main/"

function label(type){

if(type==="user") return "يوزر الحساب"
if(type==="video") return "رابط الفيديو"
if(type==="game") return "ID اللعبة"
if(type==="whatsapp") return "رقم الواتساب"
if(type==="coins") return "يوزر الحساب + كلمة السر"

return "الرابط"

}

const services={

"خدمات تيك توك 📱":[
{name:"إعادة نشر تيك توك",price:1,img:"IMG-20260307-WA0001.jpg",min:50,type:"video"},
{name:"متابعين تيك توك",price:25,img:"tiktok.jpg",min:50,type:"user"},
{name:"لايكات تيك توك",price:4,img:"tiktok.jpg",min:50,type:"video"}
],

"شحن ألعاب 🎮":[
{name:"60 شدة ببجي",price:14,img:"pubg.jpg",min:1,max:1,type:"game"},
{name:"110 جوهرة فري فاير",price:20,img:"freefire.jpg",min:1,max:1,type:"game"},
{name:"روبوكس 80",price:29,img:"roblox.jpg",min:1,max:1,type:"game"},
{name:"نقاط FC 25",price:29,img:"fc.jpg",min:1,max:1,type:"game"}
],

"اشتراكات رقمية 📺":[
{name:"يوتيوب بريميوم شهر",price:48,img:"Instagram.jpg",min:1,max:1,type:"whatsapp"},
{name:"نيتفليكس شهر",price:30,img:"netflix.jpg",min:1,max:1,type:"whatsapp"},
{name:"شاهد VIP شهر",price:30,img:"shahid.jpg",min:1,max:1,type:"whatsapp"},
{name:"سناب شات بلس",price:70,img:"snapchat.jpg",min:1,max:1,type:"whatsapp"}
],

"عملات تيك توك":[
{name:"70 عملة تيك توك",price:18,img:"etonz.jpg",min:1,type:"coins"},
{name:"140 عملة تيك توك",price:32,img:"etonz.jpg",min:1,type:"coins"}
],

"نجوم تيليجرام":[
{name:"100 نجمة تيليجرام",price:25,img:"telegram.jpg",min:1,type:"whatsapp"}
],

"بطاقات وماستر كارد 💳":[
{name:"10 دولار ماستر كارد",price:150,img:"b3bb5717a1f5a0a1866e112fbc.jpg",min:5,max:99,defaultQty:10,type:"whatsapp"}
]

}

function renderServices(){

const container=document.getElementById('services-container')

for(const [section,list] of Object.entries(services)){

container.innerHTML+=`<div class="section-header">${section}</div>`

let grid='<div class="services-grid">'

list.forEach(s=>{

let qty=s.defaultQty||s.min

grid+=`

<div class="service-card">

<img src="${githubURL+s.img}" class="service-img">

<div class="service-body">

<h3>${s.name}</h3>

<div class="price">${s.price} د.ل</div>

<div class="input-group">
<input type="text" placeholder="${label(s.type)}" id="link-${s.name}" class="link-input">
</div>

<div class="input-group">
<input type="number" value="${qty}" min="${s.min}" max="${s.max||9999}" id="qty-${s.name}" class="qty-input">
</div>

<button class="add-btn" onclick="addToCart('${s.name}',${s.price})">
إضافة للسلة
</button>

</div>
</div>
`

})

grid+='</div>'

container.innerHTML+=grid

}

}

function addToCart(name,price){

cart.push({name,price})

document.getElementById('cart-bar').style.display='block'
document.getElementById('count').innerText=cart.length

}

function sendToWhatsApp(){

let msg="طلب جديد CD-CARD\n\n"

cart.forEach(i=>{
msg+=i.name+"\n"
})

window.open("https://wa.me/218912377291?text="+encodeURIComponent(msg))

}

renderServices()

</script>

</body>
</html>
