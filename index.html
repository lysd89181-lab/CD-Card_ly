<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر CDCARD</title>
    <style>
        :root { --main-bg:#0d0d0d; --card-bg:#161616; --accent:#00ff88; --text:#ffffff; --danger:#ff4444; }
        body { background-color:var(--main-bg); color:var(--text); font-family:'Segoe UI',sans-serif; margin:0; padding-bottom:200px; text-align:center; }
        
        /* Header & Profile */
        .user-info { background:#1a1a1a; padding:15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; }
        .balance-box { background:var(--accent); color:black; padding:5px 15px; border-radius:20px; font-weight:bold; }
        .logout-btn { background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:8px; cursor:pointer; }
        
        .hero { padding:25px 15px; }
        .hero h1 { color:var(--accent); margin:0; }

        /* Products Grid */
        .category-title { text-align:right; color:var(--accent); margin:20px 15px; border-right:4px solid var(--accent); padding-right:10px; font-weight:bold; }
        .products-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; padding:0 10px; }
        .product-card { background:var(--card-bg); border-radius:12px; border:1px solid #222; padding-bottom:10px; overflow:hidden; }
        .product-img { width:100%; height:100px; object-fit:cover; }
        .add-btn { width:90%; padding:8px; border-radius:20px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-weight:bold; }

        /* Order History Table */
        .history-section { margin:30px 10px; text-align:right; }
        .history-table { width:100%; border-collapse:collapse; background:var(--card-bg); border-radius:10px; overflow:hidden; font-size:0.8rem; }
        .history-table th, .history-table td { padding:10px; border-bottom:1px solid #333; text-align:center; }
        .status-ok { color:var(--accent); }

        /* Cart Bar */
        .cart-bar { position:fixed; bottom:0; left:0; right:0; background:#111; border-top:2px solid var(--accent); padding:15px; z-index:1000; }
        .pay-card { flex:1; background:var(--card-bg); border:1px solid #333; border-radius:10px; padding:8px; cursor:pointer; }
        .pay-card.active { border-color:var(--accent); background:#1a2e25; }
        .send-btn { background:var(--accent); color:black; border:none; padding:12px 20px; border-radius:25px; font-weight:bold; width:100%; margin-top:10px; }
    </style>
</head>
<body>

    <div class="user-info">
        <div>
            <span id="user-display-name">مرحباً..</span>
            <div class="balance-box">رصيدي: <span id="user-balance">0.00</span> د.ل</div>
        </div>
        <button class="logout-btn" onclick="logout()">خروج</button>
    </div>

    <div class="hero">
        <h1>CDCARD</h1>
        <p>متابعين، شحن ألعاب، واشتراكات رقمية</p>
    </div>

    <div id="shop-container"></div>

    <div class="history-section">
        <div class="category-title">آخر طلباتي</div>
        <table class="history-table">
            <thead>
                <tr>
                    <th>الطلب</th>
                    <th>التاريخ</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="orders-list">
                <tr><td colspan="3">لا توجد طلبات سابقة</td></tr>
            </tbody>
        </table>
    </div>

    <div class="cart-bar">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div class="pay-card active" onclick="setMethod(this,'كاش',0)">💵 كاش</div>
            <div class="pay-card" onclick="setMethod(this,'رصيد',2)">📱 رصيد (+2)</div>
        </div>
        <div id="cart-summary" style="text-align:right; font-size:0.9rem;">
            المنتجات: <span id="cart-count">0</span> | الإجمالي: <strong id="cart-total">0</strong> د.ل
        </div>
        <button class="send-btn" onclick="sendWhatsApp()">إرسال الطلب عبر واتساب ✅</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            storageBucket: "cd-card-87365.firebasestorage.app",
            messagingSenderId: "397926299412",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "login.html"; }
            else { document.getElementById('user-display-name').innerText = "مرحباً، " + (user.displayName || "عضو جديد"); }
        });

        window.logout = () => { signOut(auth).then(() => window.location.href = "login.html"); };

        // بيانات المتجر الأساسية
        const categories = {
            "تيك توك": [{name:"1000 متابع", price:12}, {name:"1000 لايك", price:3}],
            "ببجي موبايل": [{name:"60 شدة", price:11}, {name:"325 شدة", price:55}],
            "اشتراكات": [{name:"نتفليكس شهر", price:30}, {name:"شاهد VIP", price:30}]
        };

        let cart = [];
        let pricePlus = 0;
        let currentMethod = "كاش";

        function render() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '';
            for (let cat in categories) {
                container.innerHTML += `<div class="category-title">${cat}</div>`;
                let grid = document.createElement('div');
                grid.className = 'products-grid';
                categories[cat].forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="tiktok.jpg" class="product-img">
                            <div style="padding:5px;">
                                <div style="font-size:0.8rem;">${p.name}</div>
                                <div style="color:var(--accent); font-weight:bold;">${p.price + pricePlus} د.ل</div>
                                <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">إضافة</button>
                            </div>
                        </div>`;
                });
                container.appendChild(grid);
            }
        }

        window.addToCart = (name, price) => {
            cart.push({ name, finalPrice: price + pricePlus });
            updateUI();
        };

        window.setMethod = (el, method, plus) => {
            document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentMethod = method; pricePlus = plus;
            render(); updateUI();
        };

        function updateUI() {
            let total = cart.reduce((s, i) => s + i.finalPrice, 0);
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total;
        }

        window.sendWhatsApp = () => {
            if(cart.length === 0) return alert("السلة فارغة");
            let msg = `*طلب جديد من: ${auth.currentUser.displayName}*%0A*طريقة الدفع:* ${currentMethod}%0A` + cart.map(i => `- ${i.name}`).join('%0A');
            window.open(`https://wa.me/218912377291?text=${msg}`);
        };

        render();
    </script>
</body>
</html>
