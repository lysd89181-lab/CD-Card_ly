<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-Card | متجر الخدمات الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050a18;
            --card-bg: rgba(13, 22, 45, 0.7);
            --primary-blue: #007aff;
            --accent-glow: #00d4ff;
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        
        /* تأثير الإضاءة الخلفية */
        body::before {
            content: ''; position: fixed; top: -10%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(0,122,255,0.2) 0%, transparent 70%); z-index: -1;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(13, 22, 45, 0.8); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border);
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* تصميم الكرت الزجاجي 3D */
        .card {
            background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; padding: 25px; 
            margin-bottom: 20px; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--accent-glow); }
        input, select {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-blue); box-shadow: 0 0 10px rgba(0,122,255,0.3); }

        .btn-3d {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(145deg, #007aff, #0056b3); color: white;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #004494; transition: 0.1s;
        }
        .btn-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #004494; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--glass-border); }
        .stat-box b { font-size: 20px; color: var(--accent-glow); display: block; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 260px; height: 100%;
            background: #0d162d; z-index: 1000; padding: 40px 20px; transition: 0.4s;
        }
        .sidebar.active { right: 0; }
        .nav-link { display: block; padding: 15px; color: white; text-decoration: none; margin-bottom: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <div style="cursor:pointer; font-size:24px;" onclick="toggleMenu()">☰</div>
    <div style="text-align: center;">
        <h1 style="font-size: 18px; color: var(--accent-glow);">CD-CARD</h1>
    </div>
    <div id="user-head-balance" style="font-size: 12px; color: #4cd137;">$0.00</div>
</header>

<div class="sidebar" id="sidebar">
    <div style="text-align:left; cursor:pointer;" onclick="toggleMenu()">✕</div><br>
    <a href="#" class="nav-link" onclick="showPage('dashboard')">🏠 الرئيسية</a>
    <a href="#" class="nav-link" onclick="showPage('add-funds')">💰 شحن الرصيد</a>
    <a href="#" class="nav-link" style="color:#ff4757;" onclick="logout()">🚪 خروج</a>
</div>

<div class="container">
    <div id="auth-page" class="page active">
        <div class="card">
            <h2 id="auth-title" style="text-align:center; margin-bottom:20px;">تسجيل دخول</h2>
            <div id="reg-fields" style="display:none;">
                <div class="input-group"><label>الاسم</label><input type="text" id="reg-name"></div>
            </div>
            <div class="input-group"><label>الايميل</label><input type="email" id="auth-email"></div>
            <div class="input-group"><label>كلمة السر</label><input type="password" id="auth-password"></div>
            <button class="btn-3d" id="auth-btn">دخول</button>
            <p onclick="toggleAuth()" style="text-align:center; margin-top:15px; font-size:12px; cursor:pointer;">ليس لديك حساب؟ <span style="color:var(--accent-glow);">سجل الآن</span></p>
        </div>
    </div>

    <div id="dashboard" class="page">
        <div class="card">
            <h2 id="welcome-name">مرحباً ..</h2>
            <div class="stat-grid">
                <div class="stat-box"><span>رصيدك</span><b id="balance-val">$0.00</b></div>
                <div class="stat-box"><span>المنفق</span><b id="spent-val">$0.00</b></div>
            </div>
        </div>
        <div class="card">
            <h3>طلب خدمة</h3><br>
            <div class="input-group">
                <label>الخدمة</label>
                <select id="service-select">
                    <option value="1.10">إعادة نشر تيك توك ($1.10 لكل 1000)</option>
                    <option value="2.50">متابعين تيك توك ($2.50 لكل 1000)</option>
                </select>
            </div>
            <div class="input-group"><label>الرابط</label><input type="text" id="order-link"></div>
            <div class="input-group"><label>الكمية</label><input type="number" id="order-qty" value="1000"></div>
            <button class="btn-3d" id="order-btn">تأكيد الطلب</button>
        </div>
    </div>

    <div id="add-funds" class="page">
        <div class="card">
            <h3>شحن رصيد تلقائي</h3>
            <p style="font-size:11px; color:#4cd137; margin:10px 0;">حول الرصيد للمدار (0912377291) ثم أكد البيانات:</p>
            <div class="input-group"><label>رقم الهاتف الذي حولت منه</label><input type="tel" id="sender-phone" placeholder="091XXXXXXX"></div>
            <div class="input-group"><label>القيمة بالدينار</label><input type="number" id="amount-lyd" placeholder="10"></div>
            <button class="btn-3d" id="confirm-pay-btn">تأكيد الشحن الفوري</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
        authDomain: "cd-card-87365.firebaseapp.com",
        projectId: "cd-card-87365",
        storageBucket: "cd-card-87365.firebasestorage.app",
        messagingSenderId: "397926299412",
        appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLogin = true;
    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "تسجيل دخول" : "حساب جديد";
        document.getElementById('reg-fields').style.display = isLogin ? "none" : "block";
        document.getElementById('auth-btn').innerText = isLogin ? "دخول" : "إنشاء";
    };

    document.getElementById('auth-btn').onclick = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-password').value;
        try {
            if(isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const name = document.getElementById('reg-name').value;
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), { full_name: name, balance: 0.0, spent: 0.0 });
            }
        } catch(e) { alert("خطأ: " + e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                const data = snap.data();
                document.getElementById('welcome-name').innerText = "مرحباً " + data.full_name;
                document.getElementById('balance-val').innerText = "$" + data.balance.toFixed(2);
                document.getElementById('user-head-balance').innerText = "$" + data.balance.toFixed(2);
                document.getElementById('spent-val').innerText = "$" + data.spent.toFixed(2);
                showPage('dashboard');
            }
        } else { showPage('auth-page'); }
    });

    // --- منطق الشحن التلقائي الرهيب ---
    document.getElementById('confirm-pay-btn').onclick = async () => {
        const phone = document.getElementById('sender-phone').value;
        const amount = parseFloat(document.getElementById('amount-lyd').value);
        
        const q = query(collection(db, "incoming_sms"), where("sender_phone", "==", phone), where("amount", "==", amount), where("status", "==", "unused"));
        const snap = await getDocs(q);

        if(!snap.empty) {
            const smsDoc = snap.docs[0];
            const usdAmount = amount / 7.0; // سعر الصرف
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(usdAmount) });
            await updateDoc(doc(db, "incoming_sms", smsDoc.id), { status: "used", used_by: auth.currentUser.uid });
            alert("تم الشحن بنجاح!");
            location.reload();
        } else { alert("لم نجد رسالة تحويل تطابق هذه البيانات!"); }
    };

    window.logout = () => signOut(auth);
</script>

<script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleMenu();
    }
</script>
</body>
</html>
