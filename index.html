<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD-CARD - متجر خدمات رقمية</title>
<style>
:root {
    --main-bg: #0d0d0d;
    --card-bg: #161616;
    --accent: #00ff88;
    --text: #ffffff;
    --danger: #ff4444;
}

body {
    background-color: var(--main-bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
}

.container{
    width:90%;
    max-width:400px;
    margin:auto;
    margin-top:30px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.card{
    background: var(--card-bg);
    padding:20px;
    border-radius:12px;
    margin-top:15px;
}

.balance{
    font-size:22px;
    color:#22c55e;
}

h1,h2,h3{
    color:var(--accent);
}

#shop-container{
    margin-top:20px;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:0 10px;
}

.product-card{
    background: var(--card-bg);
    border-radius:12px;
    border:1px solid #222;
    padding-bottom:12px;
    overflow:hidden;
}

.product-img{
    width:100%;
    height:100px;
    background:#222;
    object-fit:cover;
}

.price-tag{
    color:var(--accent);
    font-weight:bold;
    margin-bottom:8px;
    display:block;
}

.add-btn{
    width:90%;
    padding:8px;
    border-radius:20px;
    border:1px solid var(--accent);
    background:transparent;
    color:var(--accent);
    font-weight:bold;
    cursor:pointer;
}

/* السلة السفلى */
.cart-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    border-top:2px solid var(--accent);
    padding:15px;
    z-index:1000;
}

.payment-methods{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.pay-card{
    flex:1;
    background: var(--card-bg);
    border:1.5px solid #333;
    border-radius:12px;
    padding:10px;
    cursor:pointer;
    font-size:0.9rem;
}

.pay-card.active{
    border-color:var(--accent);
    background:#1a2e25;
}

.cart-items-list{
    max-height:120px;
    overflow-y:auto;
    text-align:right;
    margin-bottom:10px;
    font-size:0.85rem;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    background:#222;
    padding:6px 10px;
    margin-bottom:5px;
    border-radius:6px;
}

.remove-btn{
    color:var(--danger);
    cursor:pointer;
    font-weight:bold;
}

.cart-summary{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.send-btn{
    background:var(--accent);
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container" id="auth-container">
<h1>CD-CARD</h1>
<p>متابعين، شحن ألعاب، واشتراكات رقمية</p>

<div class="card" id="register-card">
<h3>إنشاء حساب</h3>
<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">
<input id="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">
<input id="password2" type="password" placeholder="تأكيد كلمة المرور">
<button onclick="register()">إنشاء حساب</button>
<p>لديك حساب؟ <a href="#" onclick="showLogin()">تسجيل دخول</a></p>
</div>

<div class="card" id="login-card" style="display:none;">
<h3>تسجيل دخول</h3>
<input id="login-email" placeholder="البريد الإلكتروني">
<input id="login-password" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p>لا تملك حساب؟ <a href="#" onclick="showRegister()">إنشاء حساب</a></p>
</div>
</div>

<!-- لوحة المستخدم -->
<div class="container" id="dashboard" style="display:none;">
<h2>مرحبا بك في CD-CARD</h2>
<div class="card">
رصيدك: <span class="balance" id="balance">0</span> د.ل
</div>

<div id="shop-container"></div>

<!-- السلة -->
<div class="cart-bar">
<div class="payment-methods">
    <div class="pay-card active" onclick="setMethod(this,'كاش',0)">💵 كاش</div>
    <div class="pay-card" onclick="setMethod(this,'رصيد',2)">📱 رصيد (+2)</div>
</div>
<div class="cart-items-list" id="cart-items-list"></div>
<div class="cart-summary">
    <div style="text-align:right;">
        <span id="cart-count" style="font-size:0.8rem;color:#aaa;">المنتجات: 0</span><br>
        <strong id="cart-total">الإجمالي: 0 د.ل</strong>
    </div>
    <button class="send-btn" onclick="sendWhatsApp()">إرسال الطلب ✅</button>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
  authDomain: "cd-card-87365.firebaseapp.com",
  projectId: "cd-card-87365",
  storageBucket: "cd-card-87365.firebasestorage.app",
  messagingSenderId: "397926299412",
  appId: "1:397926299412:web:efbe9ae9aae29df368f401",
  measurementId: "G-NDL36M3W68"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// التسجيل والدخول
function showLogin(){ document.getElementById("register-card").style.display="none"; document.getElementById("login-card").style.display="block";}
function showRegister(){ document.getElementById("register-card").style.display="block"; document.getElementById("login-card").style.display="none";}

function register(){
    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let email=document.getElementById("email").value;
    let password=document.getElementById("password").value;
    let password2=document.getElementById("password2").value;

    if(password!==password2){ alert("كلمتا المرور غير متطابقتين"); return; }

    auth.createUserWithEmailAndPassword(email,password)
    .then(user=>{
        db.collection("users").doc(user.user.uid).set({
            name:name,
            phone:phone,
            email:email,
            balance:0,
            role:"user"
        });
        alert("تم إنشاء الحساب");
        showDashboard(user.user);
    }).catch(e=>alert(e.message));
}

function login(){
    let email=document.getElementById("login-email").value;
    let password=document.getElementById("login-password").value;
    auth.signInWithEmailAndPassword(email,password)
    .then(res=>{
        showDashboard(res.user);
    }).catch(e=>alert(e.message));
}

// لوحة المستخدم
const cart=[];
let currentMethod="كاش";
let pricePlus=0;

function showDashboard(user){
    document.getElementById("auth-container").style.display="none";
    document.getElementById("dashboard").style.display="block";

    db.collection("users").doc(user.uid).get().then(doc=>{
        document.getElementById("balance").innerText=doc.data().balance;
    });

    renderShop();
}

// خدمات وهمية
const categories = {
    "تيك توك":[ {name:"1000 متابع", price:12}, {name:"1000 لايك", price:3} ],
    "انستقرام":[ {name:"1000 متابع", price:8}, {name:"1000 لايك", price:4} ]
};

function renderShop(){
    const container=document.getElementById("shop-container");
    container.innerHTML="";
    for(let cat in categories){
        container.innerHTML+=`<div class="category-title">${cat}</div>`;
        let grid=document.createElement('div'); grid.className='products-grid';
        categories[cat].forEach(p=>{
            grid.innerHTML+=`<div class="product-card">
                <img class="product-img" src="" onerror="this.src='tiktok.jpg'">
                <h3>${p.name}</h3>
                <span class="price-tag">${p.price+pricePlus} د.ل</span>
                <button class="add-btn" onclick="addToCart('${p.name}',${p.price})">إضافة +</button>
            </div>`;
        });
        container.appendChild(grid);
    }
}

function setMethod(el, method, plus){
    document.querySelectorAll('.pay-card').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    currentMethod=method;
    pricePlus=plus;
    cart.forEach(item=>item.finalPrice=item.basePrice+pricePlus);
    updateUI();
}

function addToCart(name, basePrice){
    cart.push({id:Date.now(), name:name, basePrice:basePrice, finalPrice:basePrice+pricePlus});
    updateUI();
}

function removeFromCart(id){ cart.splice(cart.findIndex(i=>i.id===id),1); updateUI(); }

function updateUI(){
    const list=document.getElementById("cart-items-list");
    list.innerHTML="";
    let total=0;
    cart.forEach(item=>{
        total+=item.finalPrice;
        list.innerHTML+=`<div class="cart-item"><span>${item.name} (${item.finalPrice} د.ل)</span><span class="remove-btn" onclick="removeFromCart(${item.id})">✖</span></div>`;
    });
    document.getElementById("cart-count").innerText=`المنتجات: ${cart.length}`;
    document.getElementById("cart-total").innerText=`الإجمالي: ${total} د.ل`;
}

function sendWhatsApp(){
    if(cart.length===0){ alert("السلة فارغة"); return; }
    let itemsText=cart.map(it=>`- ${it.name}: ${it.finalPrice} د.ل`).join('%0A');
    let total=cart.reduce((s,it)=>s+it.finalPrice,0);
    let phone="218912377291";
    let msg=`*طلب جديد - CD-CARD*%0A*طريقة الدفع:* ${currentMethod}%0A------------------%0A${itemsText}%0A------------------%0A*الإجمالي:* ${total} د.ل`;
    window.open(`https://wa.me/${phone}?text=${msg}`,'_blank');
}
</script>
</body>
</html>
