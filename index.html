<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-Card | لشحن الخدمات الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050a18; 
            --card: #0d162d; 
            --blue: #007aff; 
            --glow: #00d4ff; 
            --text: #ffffff; 
            --red: #ff4757; 
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* تأثير الإضاءة الخلفية لـ CD-Card */
        body::before { 
            content: ''; position: fixed; top: -50px; left: -50px; 
            width: 300px; height: 300px; background: var(--blue); 
            filter: blur(150px); opacity: 0.15; z-index: -1; 
        }

        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(13, 22, 45, 0.9); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; 
        }
        .logo-text { font-weight: bold; color: var(--glow); font-size: 22px; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 480px; margin: auto; }
        .card { 
            background: var(--card); border-radius: 25px; padding: 25px; 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #8a99af; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); 
            background: #16223f; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0,122,255,0.2); }
        
        .btn-main { 
            width: 100%; padding: 16px; border-radius: 15px; border: none; 
            background: linear-gradient(145deg, var(--blue), #0056b3); 
            color: white; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px 0 #004494; transition: 0.2s; 
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #004494; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { 
            background: rgba(255,255,255,0.02); padding: 15px; 
            border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); 
        }
        .stat-box span { font-size: 12px; color: #8a99af; }
        .stat-box b { display: block; font-size: 20px; color: var(--glow); margin-top: 5px; }

        #auth-section, #dashboard-section { display: none; }
        .active-page { display: block !important; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 22px;">☰</div>
    <div class="logo-text">CD-Card</div>
    <div id="logout-btn" style="display:none; color:var(--red); cursor:pointer; font-size: 14px;">خروج</div>
</header>

<div class="container">
    <div id="auth-section" class="active-page">
        <div class="card">
            <h2 id="auth-title" style="text-align:center; margin-bottom:20px;">تسجيل الدخول</h2>
            
            <div id="reg-fields" style="display:none;">
                <div class="input-group"><label>الاسم بالكامل</label><input type="text" id="reg-name" placeholder="مثلاً: منصور"></div>
            </div>

            <div class="input-group"><label>البريد الإلكتروني</label><input type="email" id="auth-email" placeholder="mail@example.com"></div>
            <div class="input-group"><label>كلمة المرور</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
            
            <button class="btn-main" id="auth-main-btn">دخول</button>
            <p style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer; color:var(--glow);" onclick="toggleAuth()">
                <span id="toggle-hint">ليس لديك حساب؟ إنشاء حساب جديد</span>
            </p>
        </div>
    </div>

    <div id="dashboard-section">
        <div class="card">
            <h3 id="user-greeting" style="margin-bottom:15px;">مرحباً بك</h3>
            <div class="stat-grid">
                <div class="stat-box"><span>رصيدك</span><b id="val-balance">$0.00</b></div>
                <div class="stat-box"><span>المنفق</span><b id="val-spent">$0.00</b></div>
            </div>
        </div>

        <div class="card">
            <h4 style="margin-bottom:15px; color:var(--glow);">طلب خدمة جديدة</h4>
            <div class="input-group">
                <label>اختر الخدمة</label>
                <select id="serv-select">
                    <option value="1.5">شحن PUBG (60 شدة) - $1.50</option>
                    <option value="5.0">اشتراك Netflix (شهر) - $5.00</option>
                    <option value="2.0">متابعين تيك توك (1000) - $2.00</option>
                </select>
            </div>
            <div class="input-group"><label>الرابط / ID اللاعب</label><input type="text" id="serv-target" placeholder="ضع البيانات هنا"></div>
            <div class="input-group"><label>الكمية</label><input type="number" id="serv-qty" value="1"></div>
            <button class="btn-main" onclick="confirmOrder()">شراء الآن</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // إعدادات Firebase الخاصة بـ CD-Card
    const firebaseConfig = {
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
        authDomain: "cd-card-87365.firebaseapp.com",
        projectId: "cd-card-87365",
        storageBucket: "cd-card-87365.firebasestorage.app",
        messagingSenderId: "397926299412",
        appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let isLoginMode = true;

    window.toggleAuth = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "تسجيل الدخول" : "إنشاء حساب جديد";
        document.getElementById('reg-fields').style.display = isLoginMode ? "none" : "block";
        document.getElementById('auth-main-btn').innerText = isLoginMode ? "دخول" : "تسجيل حساب";
        document.getElementById('toggle-hint').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب؟ سجل دخولك";
    };

    document.getElementById('auth-main-btn').onclick = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const name = document.getElementById('reg-name').value;

        try {
            if(isLoginMode) {
                await signInWithEmailAndPassword(auth, email, pass);
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // إنشاء سجل رصيد فوري في Firestore
                await setDoc(doc(db, "users", res.user.uid), {
                    full_name: name || "مستخدم جديد", 
                    balance: 0.0, 
                    spent: 0.0
                });
            }
        } catch(e) { alert("خطأ: " + e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                const d = snap.data();
                document.getElementById('user-greeting').innerText = "مرحباً " + d.full_name;
                document.getElementById('val-balance').innerText = "$" + d.balance.toFixed(2);
                document.getElementById('val-spent').innerText = "$" + d.spent.toFixed(2);
                
                document.getElementById('auth-section').classList.remove('active-page');
                document.getElementById('dashboard-section').classList.add('active-page');
                document.getElementById('logout-btn').style.display = "block";
            }
        } else {
            document.getElementById('auth-section').classList.add('active-page');
            document.getElementById('dashboard-section').classList.remove('active-page');
            document.getElementById('logout-btn').style.display = "none";
        }
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>
