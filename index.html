<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABD CENTER | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #12141d; --card: #1c1f2a; --gold: #ffb800; --blue: #007aff; --text: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* الهيدر */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--gold); }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* بطاقة اسم المستخدم والرصيد (نفس صورك) */
        .user-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.05); }
        .username { color: var(--gold); font-size: 22px; margin-bottom: 5px; font-weight: bold; }
        .welcome-sub { font-size: 11px; opacity: 0.7; margin-bottom: 20px; }

        .stat-item { background: #12141d; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.02); }
        .stat-item span { font-size: 12px; opacity: 0.8; }
        .stat-item b { color: var(--gold); font-size: 18px; }

        /* نموذج الطلب */
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: var(--shadow); }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--gold); }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #12141d; color: #fff; outline: none; }

        .btn-send { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--gold); color: #000; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-send:hover { background: #e5a600; transform: scale(0.98); }

        /* أيقونات التواصل */
        .floating-icons { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px;">☰</div>
    <div class="logo-area">
        <h1>ABD CENTER</h1>
    </div>
    <div style="font-size: 20px;">⚙️</div>
</header>

<div class="container">
    <div class="user-card">
        <div class="username" id="display-name">جاري التحميل...</div>
        <p class="welcome-sub">مرحباً بك في عبدو سنتر!</p>

        <div class="stat-item">
            <span>Account level</span>
            <b style="color: var(--gold);">NEW</b>
        </div>
        <div class="stat-item">
            <span>Discount</span>
            <b>0%</b>
        </div>
        <div class="stat-item">
            <span>الرصيد المنفق</span>
            <b id="display-spent">$0.00</b>
        </div>
        <div class="stat-item">
            <span>رصيد حسابك</span>
            <b id="display-balance">$0.00</b>
        </div>
    </div>

    <div class="order-card">
        <div class="field">
            <label>الفئة</label>
            <select id="category" onchange="updateServices()">
                <option value="">-- اختر الفئة --</option>
                <option value="tk">تيك توك</option>
            </select>
        </div>
        <div class="field">
            <label>الخدمة</label>
            <select id="service">
                <option>اختر الفئة أولاً...</option>
            </select>
        </div>
        <div class="field">
            <label>الرابط</label>
            <input type="url" id="target-link" placeholder="https://...">
        </div>
        <div class="field">
            <label>الكمية</label>
            <input type="number" id="target-qty" placeholder="الحد الأدنى 100">
        </div>
        <button class="btn-send" onclick="placeOrder()">إرسال الطلب</button>
    </div>
</div>

<div class="floating-icons">
    <a href="#" class="icon" style="background: #0088cc;">✈️</a>
    <a href="#" class="icon" style="background: #25d366;">💬</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // إعداداتك الخاصة التي أرسلتها
    const firebaseConfig = {
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
        authDomain: "cd-card-87365.firebaseapp.com",
        projectId: "cd-card-87365",
        storageBucket: "cd-card-87365.firebasestorage.app",
        messagingSenderId: "397926299412",
        appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // جلب بيانات المستخدم وعرضها
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('display-name').innerText = data.full_name || "مستخدم";
                document.getElementById('display-balance').innerText = `$${data.balance.toFixed(6)}`;
                document.getElementById('display-spent').innerText = `$${data.spent.toFixed(6)}`;
            }
        } else {
            window.location.href = "login.html"; // حماية الصفحة
        }
    });

    // تحديث الخدمات (رقم 1100)
    window.updateServices = function() {
        const cat = document.getElementById('category').value;
        const serv = document.getElementById('service');
        if(cat === 'tk') {
            serv.innerHTML = '<option value="1100">إعادة نشر تيك توك (#1100)</option>';
        }
    }

    // إرسال الطلب
    window.placeOrder = function() {
        const serviceId = document.getElementById('service').value;
        const link = document.getElementById('target-link').value;
        if(!link) return alert("الرجاء وضع الرابط");

        alert(`جاري معالجة الطلب رقم ${serviceId} وإرساله لـ SMM ADAM...`);
        // هنا يوضع كود الـ API الفعلي للخصم من Firebase والإرسال للمزود
    }
</script>

</body>
</html>
