<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CD-CARD</title>

<style>

:root{
--glow:#00ffa6;
--bg:#05070f;
--card:#0e1529;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
}

/* عنوان */
.header{
text-align:center;
padding:30px 10px;
}

.header h1{
color:var(--glow);
margin:0;
}

/* فئات */
.section-title{
color:var(--glow);
margin:20px 10px;
font-weight:bold;
}

/* 🔥 خدمتين جنب بعض */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:0 10px;
max-width:420px;
margin:auto;
}

/* الكرت */
.card{
background:var(--card);
border-radius:12px;
overflow:hidden;
text-align:center;
padding-bottom:10px;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.card h3{
font-size:13px;
margin:5px 0;
}

.price{
color:var(--glow);
font-size:13px;
}

.btn{
background:var(--glow);
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* popup */
.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.box{
background:#0e1529;
padding:20px;
border-radius:15px;
width:90%;
max-width:320px;
}

.box input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:8px;
border:none;
}

/* سلة */
.cart{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:white;
color:black;
padding:15px;
border-radius:15px;
text-align:center;
display:none;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
<h1>CD-CARD</h1>
<p>كل خدمات السوشيال والشحن 🔥</p>
</div>

<div id="app"></div>

<!-- popup -->
<div class="popup" id="popup">
<div class="box">

<h3 id="p-title"></h3>

<input id="p-input">
<input id="p-qty" type="number">

<button class="btn" onclick="addConfirm()">تأكيد</button>

</div>
</div>

<div class="cart" id="cart" onclick="send()">
إرسال الطلب (<span id="count">0</span>)
</div>

<script>

const githubURL="https://raw.githubusercontent.com/lysd89181-lab/CD-Card_ly/main/"

let cart=[]
let current=null

const services={

"تيك توك":[
{name:"متابعين",price:25,img:"tiktok.jpg",type:"followers"},
{name:"لايكات",price:4,img:"tiktok.jpg",type:"likes"},
{name:"مشاهدات",price:2,img:"tiktok.jpg",type:"views"},
{name:"اكسبلور",price:3,img:"tiktok.jpg",type:"views"},
{name:"إعادة نشر",price:1,img:"tiktok.jpg",type:"views"}
],

"انستقرام":[
{name:"متابعين",price:30,img:"Instagram.jpg",type:"followers"},
{name:"لايكات",price:5,img:"Instagram.jpg",type:"likes"},
{name:"مشاهدات",price:3,img:"Instagram.jpg",type:"views"}
],

"فيسبوك":[
{name:"متابعين",price:28,img:"facebook.jpg",type:"followers"},
{name:"لايكات",price:6,img:"facebook.jpg",type:"likes"}
],

"الألعاب":[
{name:"ببجي",price:14,img:"pubg.jpg",type:"game"},
{name:"فري فاير",price:20,img:"freefire.jpg",type:"game"},
{name:"روبلوكس",price:29,img:"roblox.jpg",type:"game"}
],

"اشتراكات":[
{name:"نتفليكس",price:30,img:"netflix.jpg",type:"sub"},
{name:"يوتيوب بريميوم",price:48,img:"youtube.jpg",type:"sub"},
{name:"شاهد VIP",price:30,img:"shahid.jpg",type:"sub"}
],

"عملات تيك توك":[
{name:"70 عملة",price:18,img:"etonz.jpg",type:"tiktok"},
{name:"140 عملة",price:32,img:"etonz.jpg",type:"tiktok"}
],

"نجوم تيليجرام":[
{name:"100 نجمة",price:25,img:"telegram.jpg",type:"telegram"}
],

"ماستر كارد":[
{name:"ماستر كارد",price:150,img:"b3bb5717a1f5a0a1866e112fbc.jpg",type:"master"}
]

}

/* نوع الإدخال */
function getPlaceholder(type){
if(type==="followers") return "يوزر الحساب"
if(type==="likes"||type==="views") return "رابط الفيديو"
if(type==="game") return "ID اللعبة"
if(type==="sub") return "رقم الواتساب"
if(type==="tiktok") return "يوزر + كلمة السر"
if(type==="telegram") return "رقم الواتساب"
if(type==="master") return "رقم الواتساب"
return "ادخل البيانات"
}

/* عرض */
function render(){

let html=""

for(let sec in services){

html+=`<div class="section-title">${sec}</div><div class="grid">`

services[sec].forEach(s=>{

html+=`
<div class="card">
<img src="${githubURL+s.img}">
<h3>${s.name}</h3>
<div class="price">${s.price} د.ل</div>
<button class="btn" onclick="openPopup('${s.name}',${s.price},'${s.type}')">إضافة</button>
</div>
`

})

html+="</div>"
}

document.getElementById("app").innerHTML=html
}

/* فتح */
function openPopup(name,price,type){

current={name,price,type}

document.getElementById("p-title").innerText=name
document.getElementById("p-input").placeholder=getPlaceholder(type)

/* حدود */
let qty=document.getElementById("p-qty")

if(type==="followers"||type==="likes"||type==="views"){
qty.min=50
qty.value=1000
}else if(type==="master"){
qty.min=5
qty.value=10
}else{
qty.min=1
qty.value=1
}

document.getElementById("popup").style.display="flex"
}

/* تأكيد */
function addConfirm(){

let link=document.getElementById("p-input").value
let qty=parseFloat(document.getElementById("p-qty").value)

if(!link) return alert("عبي البيانات")

let total=current.price*qty

cart.push({
name:current.name,
link,
qty,
total
})

document.getElementById("popup").style.display="none"

document.getElementById("cart").style.display="block"
document.getElementById("count").innerText=cart.length

}

/* ارسال */
function send(){

let msg="طلب CD-CARD\n\n"
let total=0

cart.forEach(i=>{
msg+=`${i.name}\n${i.link}\n${i.qty}\n${i.total}\n\n`
total+=i.total
})

msg+=`الإجمالي: ${total}`

window.open(`https://wa.me/218912377291?text=${encodeURIComponent(msg)}`)

cart=[]
document.getElementById("cart").style.display="none"

}

render()

</script>

</body>
</html>
