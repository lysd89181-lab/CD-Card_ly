<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر CDCARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #0d0d0d;
            --card-bg: #161616;
            --accent: #2ecc71; 
            --text-color: #ffffff;
            --muted-text: #888;
            --border-color: #222;
            --sky-blue: #4fd1ed;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 200px;
            scroll-behavior: smooth;
        }

        /* الهيدر */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #000;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-section {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, #0d0d0d);
        }

        .hero-section h1 { font-size: 22px; margin-bottom: 5px; color: var(--accent); }
        .hero-section p { color: var(--muted-text); font-size: 13px; }

        /* الأقسام (الناف بار) */
        .nav-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px;
            gap: 10px;
            background: #0d0d0d;
            position: sticky;
            top: 0;
            z-index: 99;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-item {
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            color: #ccc;
        }

        /* طرق الدفع */
        .payment-methods { display: flex; gap: 10px; padding: 15px 20px; }
        .pay-card {
            flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--muted-text); padding: 12px; border-radius: 12px;
            cursor: pointer; font-weight: bold; text-align: center; font-size: 13px;
        }
        .pay-card.active { border-color: var(--sky-blue); color: var(--sky-blue); background: rgba(79, 209, 237, 0.1); }

        /* تصميم المنتجات */
        .category-title {
            padding: 10px 20px; font-size: 18px; font-weight: bold;
            color: var(--accent); border-right: 4px solid var(--accent); margin: 25px 0 15px;
        }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .product-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid var(--border-color); display: flex; flex-direction: column;
        }
        .img-container { position: relative; width: 100%; height: 120px; background: #222; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 12px; text-align: center; }
        .product-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #eee; min-height: 38px; }
        .price-box { color: var(--accent); font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .add-btn {
            background: #fff; color: #000; border: none; padding: 8px;
            border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 12px;
        }

        /* السلة في الأسفل */
        .cart-footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: #000;
            padding: 15px 20px; border-top: 1px solid #222; z-index: 1000;
        }
        .total-info { margin-bottom: 10px; font-size: 12px; color: #888; }
        .btn-send {
            background: var(--sky-blue); color: #000; padding: 12px;
            border-radius: 25px; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 15px;
        }

        /* واجهة الدفع (Modal) */
        .modal {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
        }
        .modal-content {
            background-color: #1a222c; padding: 25px; border-radius: 20px;
            width: 85%; max-width: 400px; margin: 15% auto; text-align: center; border: 1px solid #2d3748;
        }
        .wallet-box { background-color: #27ae60; color: white; padding: 10px; border-radius: 15px; display: block; margin: 10px 0; font-weight: bold; }
        .v-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; text-align: center; font-size: 16px; }
        .v-btn { width: 100%; padding: 12px; background: var(--sky-blue); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight:bold; color:var(--accent); font-size: 20px;">CDCARD</div>
    <div>☰</div>
</div>

<div class="hero-section">
    <h1>متجر CDCARD للخدمات الرقمية</h1>
    <p>شحن ألعاب، متابعين، واشتراكات</p>
</div>

<div class="nav-scroll" id="nav-tabs"></div>

<div class="payment-methods">
    <div class="pay-card active" onclick="changeMethod(this, 'مدار')">📡 مدار</div>
    <div class="pay-card" onclick="changeMethod(this, 'لبيانا')">📱 لبيانا</div>
</div>

<div id="services-container"></div>

<div class="cart-footer">
    <div id="cart-summary" class="total-info">السلة فارغة</div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div id="total-price" style="font-size: 22px; color: var(--accent); font-weight: bold;">0.00 د.ل</div>
        <button class="btn-send" style="width: auto; padding: 10px 40px;" onclick="openPayment()">إرسال الطلب</button>
    </div>
</div>

<div id="payModal" class="modal">
    <div class="modal-content">
        <p style="font-size: 14px;">أرقام المحافظ الخاصة بنا:</p>
        <div class="wallet-box" id="active-wallet">0912377291 📡</div>
        
        <div style="text-align: right; font-size: 12px; color: #a0aec0; margin: 15px 0; line-height: 1.8;">
            1. قم بتحويل الرصيد للرقم الموضح أعلاه<br>
            2. أدخل رقمك الذي حولت منه في الخانة الأولى<br>
            3. أدخل القيمة المحولة في الخانة الثانية
        </div>

        <input type="text" id="u-phone" class="v-input" placeholder="رقمك (09XXXXXXXX)">
        <input type="number" id="u-amount" class="v-input" placeholder="المبلغ">
        
        <button class="v-btn" onclick="startVerification()">دفع</button>
        <div id="v-msg" style="margin-top: 10px; font-size: 12px;"></div>
        <button onclick="document.getElementById('payModal').style.display='none'" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
// --- إعدادات ---
const BOT_TOKEN = 'ضع_التوكن_هنا'; 
const MY_WALLETS = { 'مدار': '0912377291 📡', 'لبيانا': '0920414760 📱' };
let currentMethod = 'مدار';
let myCart = [];

// --- قائمة الخدمات الكاملة ---
const servicesData = {
    "تيك توك": [
        {name: "1000 متابع تيك توك", price: 12, img: "https://via.placeholder.com/150"},
        {name: "5000 مشاهدة فيديو", price: 5, img: "https://via.placeholder.com/150"}
    ],
    "ببجي موبايل": [
        {name: "60 شدة ببجي", price: 11, img: "https://via.placeholder.com/150"},
        {name: "325 شدة ببجي", price: 55, img: "https://via.placeholder.com/150"}
    ],
    "اشتراكات": [
        {name: "شاهد VIP شهر", price: 25, img: "https://via.placeholder.com/150"},
        {name: "نيتفليكس شهر", price: 40, img: "https://via.placeholder.com/150"}
    ]
};

// --- وظيفة عرض الخدمات ---
function displayServices() {
    const container = document.getElementById("services-container");
    const tabs = document.getElementById("nav-tabs");
    container.innerHTML = ""; tabs.innerHTML = "";

    for (let category in servicesData) {
        // إضافة التبويب
        tabs.innerHTML += `<div class="nav-item" onclick="document.getElementById('${category}').scrollIntoView()">${category}</div>`;
        
        // إضافة العنوان والشبكة
        container.innerHTML += `<div class="category-title" id="${category}">${category}</div>`;
        let grid = document.createElement("div");
        grid.className = "products-grid";

        servicesData[category].forEach(item => {
            grid.innerHTML += `
                <div class="product-card">
                    <div class="img-container"><img src="${item.img}" class="product-img"></div>
                    <div class="product-info">
                        <div class="product-name">${item.name}</div>
                        <div class="price-box">${item.price.toFixed(2)} د.ل</div>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">إضافة للسلة</button>
                    </div>
                </div>`;
        });
        container.appendChild(grid);
    }
}

function addToCart(name, price) {
    myCart.push({name, price});
    let total = myCart.reduce((s, i) => s + i.price, 0);
    document.getElementById("total-price").innerText = total.toFixed(2) + " د.ل";
    document.getElementById("cart-summary").innerText = myCart.map(i => i.name).join(' + ');
}

function changeMethod(el, m) {
    document.querySelectorAll(".pay-card").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    currentMethod = m;
    document.getElementById("active-wallet").innerText = MY_WALLETS[m];
}

function openPayment() {
    if(myCart.length === 0) return alert("السلة فارغة!");
    document.getElementById("u-amount").value = myCart.reduce((s, i) => s + i.price, 0);
    document.getElementById("payModal").style.display = "block";
}

async function startVerification() {
    const phone = document.getElementById("u-phone").value.trim();
    const amount = document.getElementById("u-amount").value;
    const msg = document.getElementById("v-msg");

    if(!phone) return alert("يرجى إدخال رقمك");
    msg.style.color = "#4fd1ed";
    msg.innerText = "⏳ جاري فحص عملية التحويل...";

    try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
        const data = await response.json();
        // فحص وجود الرسالة في البوت
        const check = data.result.find(r => r.message.text.includes(phone) && r.message.text.includes(amount));

        if(check) {
            msg.style.color = "#2ecc71";
            msg.innerText = "✅ تم التأكد! جاري إتمام الطلب...";
            setTimeout(() => {
                let text = `طلب دفع آلي ✅%0Aالشبكة: ${currentMethod}%0Aالرقم: ${phone}%0Aالمبلغ: ${amount}%0Aالطلبات:%0A` + myCart.map(i => i.name).join('%0A');
                window.open(`https://wa.me/218910000000?text=${text}`); // رقم الواتساب الخاص بك
            }, 1500);
        } else {
            msg.style.color = "#ff4d4d";
            msg.innerText = "❌ لم نجد عملية تحويل مطابقة، تأكد من البيانات.";
        }
    } catch(e) { msg.innerText = "⚠️ خطأ في الاتصال بالسيرفر."; }
}

window.onload = displayServices;
</script>
</body>
</html>
