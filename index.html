<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر CDCARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #0d0d0d;
            --card-bg: #161616;
            --accent: #2ecc71; 
            --text-color: #ffffff;
            --muted-text: #888;
            --border-color: #222;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-color);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 180px;
            scroll-behavior: smooth;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #000;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-section {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, #0d0d0d);
        }

        .hero-section h1 { font-size: 24px; margin-bottom: 5px; color: var(--accent); }
        .hero-section p { color: var(--muted-text); font-size: 14px; }

        .nav-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px;
            gap: 10px;
            background: #0d0d0d;
            position: sticky;
            top: 0;
            z-index: 99;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-item {
            background: var(--card-bg);
            padding: 7px 15px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .payment-methods { display: flex; gap: 10px; padding: 15px 20px; }
        .pay-card {
            flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--muted-text); padding: 12px; border-radius: 12px;
            cursor: pointer; font-weight: bold; text-align: center; font-size: 13px;
        }
        .pay-card.active { border-color: var(--accent); color: var(--accent); background: rgba(46, 204, 113, 0.1); }

        .category-title {
            padding: 10px 20px; font-size: 18px; font-weight: bold;
            color: var(--accent); border-right: 4px solid var(--accent); margin: 20px 0 10px;
        }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .product-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid var(--border-color); display: flex; flex-direction: column;
        }

        .img-container { position: relative; width: 100%; height: 110px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .badge {
            position: absolute; top: 8px; right: 8px; background: var(--accent);
            color: #000; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold;
        }

        .product-info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; min-height: 35px; color: #eee; }

        .desc-btn {
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: #eee;
            padding: 6px; border-radius: 8px; font-size: 11px; margin-bottom: 10px; width: 100%; cursor: pointer;
        }

        .price-box { color: var(--accent); font-size: 17px; font-weight: bold; margin: 5px 0; }
        .qty-input {
            width: 100%; background: #000; color: #fff; border: 1px solid #333;
            padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; text-align: center;
        }

        .add-to-cart-btn {
            background: #fff; color: #000; border: none; padding: 10px;
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 13px;
        }

        .cart-footer {
            position: fixed; bottom: 0; left: 0; right: 0; background: #000;
            padding: 20px; border-top: 1px solid #222; z-index: 1000;
        }
        .cart-items-list { max-height: 60px; overflow-y: auto; text-align: right; font-size: 12px; color: #888; margin-bottom: 10px; }
        .total-row { display: flex; justify-content: space-between; align-items: center; }
        .send-order {
            background: var(--accent); color: #000; padding: 12px 30px;
            border-radius: 25px; font-weight: bold; border: none; cursor: pointer;
        }

        /* تعديلات المودال لتناسب الدفع الآلي */
        .modal {
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); margin: 25% auto; padding: 25px; border-radius: 20px;
            width: 85%; max-width: 400px; text-align: center; border: 1px solid var(--accent);
        }
        .close-modal { background: #555; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        .verify-btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .v-input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--accent); color: #fff; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight:bold; color:var(--accent); font-size: 20px;">CDCARD</div>
    <div style="font-size: 20px;">☰</div>
</div>

<div class="hero-section">
    <h1>متجر CDCARD الرقمي</h1>
    <p>متابعين، شحن ألعاب، واشتراكات بأفضل الأسعار</p>
</div>

<div class="nav-scroll" id="nav-scroll"></div>

<div class="payment-methods">
    <div class="pay-card active" onclick="setMethod(this,'كاش',0)">💵 كاش</div>
    <div class="pay-card" onclick="setMethod(this,'لبيانا',2)">📱 لبيانا (+2)</div>
    <div class="pay-card" onclick="setMethod(this,'مدار',2)">📡 مدار (+2)</div>
</div>

<div id="shop-container"></div>

<div class="cart-footer">
    <div id="cart-items-list" class="cart-items-list"></div>
    <div class="total-row">
        <div>
            <span style="font-size: 12px; color: #888;">الإجمالي:</span><br>
            <strong id="cart-total" style="font-size: 20px; color: var(--accent);">0.00 د.ل</strong>
        </div>
        <button class="send-order" onclick="initOrder()">إرسال الطلب ✅</button>
    </div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content" id="modal-content-area">
        </div>
</div>

<script>
// إعدادات البوت - ضع الـ Token الخاص بك هنا
const TELEGRAM_TOKEN = 'ضع_هنا_توكن_البوت_الخاص_بك'; 

let currentMethod = "كاش";
let pricePlus = 0;
let cart = [];

const categories = {
    "تيك توك": [
        {name: "1000 متابع تيك توك", price: 12, img: "tiktok.jpg", isSocial: true, desc: "متابعين جودة عالية، ضمان 30 يوم."},
        {name: "1000 لايك تيك توك", price: 3, img: "tiktok.jpg", isSocial: true, desc: "لايكات حقيقية وسريعة."},
        {name: "1000 مشاهدة تيك توك", price: 1, img: "tiktok.jpg", isSocial: true, desc: "مشاهدات ترفع رانك الفيديو."},
        {name: "100 مشاركة تيك توك", price: 1, img: "tiktok.jpg", isSocial: true, desc: "زيادة إكسبلور ومشاركات."},
        {name: "🚀 خدمة إعادة النشر (إكسبلور)", price: 100, img: "eat.jpg", isSocial: true, desc: "سر الظهور في الإكسبلور! ترفع هذه الخدمة من تقييم الخوارزميات لمحتواك وتضعه أمام جمهور جديد كلياً."}
    ],
    "عملات تيك توك": [
        {name: "30 عملة تيك توك", price: 4, img: "etonz.jpg", desc: "شحن رسمي عن طريق الايدي."},
        {name: "50 عملة تيك توك", price: 9, img: "etonz.jpg", desc: "باقة 50 عملة تيك توك."},
        {name: "100 عملة تيك توك", price: 15, img: "etonz.jpg", desc: "باقة 100 عملة تيك توك."}
    ],
    "انستقرام": [
        {name: "1000 متابع انستقرام", price: 8, img: "instagram.jpg", isSocial: true, desc: "متابعين ثابتين، جودة ممتازة."},
        {name: "1000 لايك انستقرام", price: 4, img: "instagram.jpg", isSocial: true, desc: "لايكات فورية لصورك وفيديوهاتك."}
    ],
    "ببجي موبايل": [
        {name: "ببجي 60 شدة", price: 11, img: "pubg.jpg", desc: "شحن رسمي فوري ID."},
        {name: "ببجي 120 شدة", price: 22, img: "pubg.jpg", desc: "شحن آمن ومضمون."}
    ],
    "اشتراكات": [
        {name: "شاهد شهر", price: 30, img: "shahid.jpg", desc: "اشتراك شاهد VIP رسمي."},
        {name: "نتفليكس شهر", price: 30, img: "netflix.jpg", desc: "حساب نتفليكس 4K مشترك."}
    ]
};

function render() {
    const container = document.getElementById("shop-container");
    const navScroll = document.getElementById("nav-scroll");
    container.innerHTML = ""; 
    navScroll.innerHTML = "";
    
    for (let cat in categories) {
        navScroll.innerHTML += `<div class="nav-item" onclick="document.getElementById('${cat}').scrollIntoView({behavior:'smooth'})">${cat}</div>`;
        container.innerHTML += `<div class="category-title" id="${cat}">${cat}</div>`;
        let grid = document.createElement("div"); 
        grid.className = "products-grid";
        
        categories[cat].forEach((p, index) => {
            let basePrice = p.price + pricePlus;
            let defaultQty = (p.name.includes("إعادة النشر")) ? 10 : 1000;
            let minQty = (p.name.includes("إعادة النشر")) ? 10 : 200;
            let initialPrice = p.isSocial ? (basePrice * defaultQty / 1000) : basePrice;

            grid.innerHTML += `
                <div class="product-card">
                    <div class="img-container">
                        <img src="${p.img}" class="product-img" onerror="this.src='https://via.placeholder.com/150'">
                        <div class="badge">${p.isSocial ? 'سريع' : 'رسمي'}</div>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <button class="desc-btn" onclick="showDesc('${p.name}', '${p.desc || "لا يوجد وصف."}')">📋 عرض الوصف</button>
                        <div class="price-box" id="display-price-${cat}-${index}">LYD ${initialPrice.toFixed(2)}</div>
                        ${p.isSocial ? `<input type="number" class="qty-input" id="qty-${cat}-${index}" value="${defaultQty}" min="${minQty}" oninput="updateLivePrice('${cat}', ${index}, ${basePrice})">` : '<div style="height:42px"></div>'}
                        <button class="add-to-cart-btn" onclick="addClick('${cat}', ${index})">إضافة للسلة</button>
                    </div>
                </div>`;
        });
        container.appendChild(grid);
    }
}

function updateLivePrice(cat, index, basePrice) {
    const qtyInput = document.getElementById(`qty-${cat}-${index}`);
    const priceDisplay = document.getElementById(`display-price-${cat}-${index}`);
    let qty = parseInt(qtyInput.value) || 0;
    let newPrice = (basePrice * qty) / 1000;
    priceDisplay.innerText = `LYD ${newPrice.toFixed(2)}`;
}

function addClick(cat, index) {
    const p = categories[cat][index];
    let basePrice = p.price + pricePlus;
    let fPrice = basePrice;
    let finalName = p.name;
    
    if (p.isSocial) {
        const qtyInput = document.getElementById(`qty-${cat}-${index}`);
        const qty = parseInt(qtyInput.value);
        let minLimit = (p.name.includes("إعادة النشر")) ? 10 : 200;
        if (qty < minLimit) return alert("الحد الأدنى هو " + minLimit); 
        fPrice = (basePrice * qty) / 1000;
        finalName = `${p.name} (كمية: ${qty})`;
    }
    cart.push({name: finalName, price: fPrice});
    updateUI();
}

function updateUI() {
    let total = 0;
    const list = document.getElementById("cart-items-list");
    list.innerHTML = "";
    cart.forEach((item, i) => {
        total += item.price;
        list.innerHTML += `<span>${item.name} | </span>`;
    });
    document.getElementById("cart-total").innerText = total.toFixed(2) + " د.ل";
}

function setMethod(el, method, plus) {
    document.querySelectorAll(".pay-card").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    currentMethod = method; 
    pricePlus = plus;
    render(); 
}

function showDesc(title, text) {
    const modalArea = document.getElementById("modal-content-area");
    modalArea.innerHTML = `
        <h3 style="color: var(--accent);">${title}</h3>
        <p style="font-size: 14px; line-height: 1.6;">${text}</p>
        <button class="close-modal" onclick="closeModal()">إغلاق</button>
    `;
    document.getElementById("mainModal").style.display = "block";
}

// نظام التأكيد الآلي
function initOrder() {
    if (cart.length === 0) return alert("السلة فارغة!");
    let total = cart.reduce((a, b) => a + b.price, 0);

    if (currentMethod === "كاش") {
        sendWhatsApp(); // الكاش يرسل مباشرة للواتساب
    } else {
        const modalArea = document.getElementById("modal-content-area");
        modalArea.innerHTML = `
            <h3 style="color: var(--accent);">تأكيد الدفع (رصيد ${currentMethod})</h3>
            <p>يرجى تحويل مبلغ <b>${total.toFixed(2)} د.ل</b> إلى رقمنا ثم أدخل رقمك هنا للتأكد:</p>
            <input type="text" id="v-phone" class="v-input" placeholder="091XXXXXXX">
            <button class="verify-btn" onclick="verifyAndSend()">تأكيد الدفع الآن ✅</button>
            <button class="close-modal" onclick="closeModal()">إلغاء</button>
            <div id="v-status" style="margin-top:10px; font-size:12px; color:var(--accent);"></div>
        `;
        document.getElementById("mainModal").style.display = "block";
    }
}

async function verifyAndSend() {
    const phone = document.getElementById("v-phone").value.trim();
    const status = document.getElementById("v-status");
    let total = cart.reduce((a, b) => a + b.price, 0).toFixed(2);

    if(!phone) return alert("أدخل رقم الهاتف!");
    status.innerText = "🔄 جاري فحص الرسائل في هاتفك...";

    try {
        const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/getUpdates`);
        const data = await res.json();
        
        // فحص هل توجد رسالة تحتوي على الرقم والمبلغ
        const found = data.result.find(m => m.message.text.includes(phone) && m.message.text.includes(total));

        if (found) {
            status.innerText = "✅ تم التأكد! جاري إرسال الطلب...";
            setTimeout(() => sendWhatsApp(phone, true), 1500);
        } else {
            status.innerText = "❌ لم نجد رسالة التحويل، تأكد من المبلغ وحاول مجدداً بعد دقيقة.";
        }
    } catch (e) {
        status.innerText = "⚠️ خطأ في الاتصال، يرجى المحاولة لاحقاً.";
    }
}

function sendWhatsApp(phone = "", verified = false) {
    let msg = `طلب جديد CDCARD%0A---%0Aطريقة الدفع: ${currentMethod}%0Aالتحقق الآلي: ${verified ? 'تم بنجاح ✅' : 'يدوي/كاش'}%0Aالرقم المحول منه: ${phone}%0Aالطلبات:%0A`;
    cart.forEach(item => msg += `- ${item.name}%0A`);
    let total = cart.reduce((a, b) => a + b.price, 0);
    msg += `---%0Aالإجمالي: ${total.toFixed(2)} د.ل`;
    window.open(`https://wa.me/218910000000?text=${msg}`); // ضع رقمك هنا
}

function closeModal() { document.getElementById("mainModal").style.display = "none"; }

window.onload = render;
</script>

</body>
</html>
