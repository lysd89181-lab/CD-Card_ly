<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD Ultimate Admin | محمد</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --p: #39ff14; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
            --text: #ffffff; --muted: #888888; --danger: #ff003c; --accent: #0088ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; direction: rtl; line-height: 1.6; }

        /* Navigation Bar */
        .admin-nav {
            position: sticky; top: 0; background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px); z-index: 2000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; gap: 8px; padding: 15px; overflow-x: auto;
        }

        .nav-link {
            padding: 12px 20px; color: var(--muted); cursor: pointer; font-weight: 700;
            font-size: 14px; border-radius: 12px; transition: 0.3s all cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }

        .nav-link i { font-size: 16px; }
        .nav-link.active { color: var(--p); background: rgba(57, 255, 20, 0.08); border: 1px solid rgba(57, 255, 20, 0.2); transform: translateY(-2px); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Animation */
        .view-section { display: none; animation: slideUp 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .page-head { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; border-right: 5px solid var(--p); padding-right: 20px;
        }

        /* Category System */
        .cat-box { 
            background: var(--card); border-radius: 16px; border: 1px solid var(--border); 
            margin-bottom: 20px; overflow: hidden; transition: 0.3s;
        }
        .cat-box:hover { border-color: #333; }

        .cat-top { 
            padding: 15px 25px; display: flex; justify-content: space-between; 
            align-items: center; background: linear-gradient(to left, #0a0a0a, #0d0d0d);
            border-bottom: 1px solid #151515;
        }

        .cat-info-side { display: flex; align-items: center; gap: 15px; }

        .order-circle {
            background: #151515; border: 1px solid #252525; color: var(--p);
            width: 40px; height: 40px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .order-circle:hover { border-color: var(--p); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        .cat-title { font-size: 17px; font-weight: 800; color: #fff; cursor: pointer; }

        .cat-body { display: none; background: #070707; padding: 10px; }
        .cat-body.open { display: block; }

        /* Service Rows */
        .srv-row { 
            display: flex; align-items: center; padding: 15px 20px; 
            border-bottom: 1px solid #111; justify-content: space-between; gap: 15px;
            transition: 0.2s; border-radius: 10px;
        }
        .srv-row:hover { background: #0f0f0f; transform: scale(1.005); }

        .srv-meta { display: flex; align-items: center; gap: 15px; flex: 1; }
        .srv-main-text b { font-size: 14px; color: #eee; display: block; margin-bottom: 4px; }
        .srv-main-text span { color: var(--muted); font-size: 11px; display: block; }

        .srv-pricing { 
            background: #111; padding: 8px 15px; border-radius: 10px; 
            border: 1px solid #222; text-align: center; min-width: 100px;
        }
        .srv-pricing b { color: var(--p); font-size: 14px; }
        .srv-pricing small { display: block; font-size: 10px; color: #555; margin-top: 2px; }

        /* Global Buttons */
        .btn {
            padding: 10px 20px; border-radius: 12px; border: none; 
            cursor: pointer; font-weight: 700; font-size: 13px; display: inline-flex; 
            align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-p { background: var(--p); color: #000; box-shadow: 0 4px 15px rgba(57, 255, 20, 0.2); }
        .btn-p:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: rgba(255, 0, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 8px; }

        /* Form Controls */
        .form-card { 
            background: var(--card); padding: 25px; border-radius: 20px; 
            border: 1px solid var(--border); margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .sw-input, .api-input {
            width: 100%; padding: 14px; background: #000; border: 1px solid #222;
            color: #fff; border-radius: 12px; margin-top: 10px; text-align: right; 
            outline: none; font-size: 14px; transition: 0.3s;
        }
        .sw-input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.05); }

        .scroll-box { 
            background: var(--card); border-radius: 16px; border: 1px solid var(--border); 
            overflow-x: auto; margin-top: 20px;
        }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 800px; }
        th { padding: 18px; background: #0f0f0f; color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 16px; border-bottom: 1px solid #111; font-size: 14px; }

        .id-badge { 
            font-family: 'Courier New', monospace; color: var(--accent); 
            background: rgba(0, 136, 255, 0.15); padding: 4px 8px; 
            border-radius: 6px; font-size: 11px; font-weight: bold;
        }

        /* User Management Specific */
        .user-row {
            display: flex; align-items: center; padding: 18px 25px; 
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; margin-bottom: 10px; justify-content: space-between;
        }
        .user-balance { text-align: center; background: rgba(57, 255, 20, 0.05); padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(57, 255, 20, 0.1); }
        .user-balance b { color: var(--p); font-size: 16px; }
    </style>
</head>
<body>

    <nav class="admin-nav">
        <div class="nav-link active" onclick="showView('services', this)"><i class="fa fa-layer-group"></i> المحتوى والترتيب</div>
        <div class="nav-link" onclick="showView('api', this)"><i class="fa fa-plug"></i> جلب API</div>
        <div class="nav-link" onclick="showView('notif', this)"><i class="fa fa-bell"></i> الإشعارات</div>
        <div class="nav-link" onclick="showView('orders', this)"><i class="fa fa-shopping-cart"></i> الطلبات</div>
        <div class="nav-link" onclick="showView('users', this)"><i class="fa fa-users"></i> المستخدمين</div>
    </nav>

    <div class="container">

        <section id="view-services" class="view-section active">
            <div class="page-head">
                <div>
                    <h2 style="font-weight: 900; font-size: 24px;">لوحة إدارة الخدمات</h2>
                    <p style="font-size: 12px; color: var(--muted);">رتب، عدل، أو احذف خدمات متجرك بسهولة</p>
                </div>
                <button class="btn btn-p" onclick="addSrvManual()">
                    <i class="fa fa-plus-circle"></i> إضافة خدمة يدوية
                </button>
            </div>
            <div id="master-services-list"></div>
        </section>

        <section id="view-api" class="view-section">
            <div class="page-head"><h2>سحب خدمات المزود (API)</h2></div>
            <div class="form-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label style="font-size: 12px; color: var(--muted);">رابط المزود</label>
                        <input type="text" id="api-url" class="api-input" value="https://libyaplus1.com/api/v2">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: var(--muted);">مفتاح API الخاص بك</label>
                        <input type="text" id="api-key" class="api-input" value="958c5695446fccb28ab7b8090d5e271a">
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <label style="font-size: 12px; color: var(--muted);">نسبة الربح % (ستضاف تلقائياً للسعر)</label>
                    <input type="number" id="api-profit" class="api-input" value="10">
                </div>
                <button class="btn btn-p" style="width:100%; margin-top:20px; height:50px;" onclick="fetchExternalAPI()">
                    <i class="fa fa-sync-alt"></i> فحص وجلب الخدمات الآن
                </button>
            </div>
            <div id="api-results-box"></div>
        </section>

        <section id="view-notif" class="view-section">
            <div class="page-head"><h2>بث إشعارات حية</h2></div>
            <div class="form-card" style="border-right: 5px solid var(--accent);">
                <label>نص الرسالة (ستظهر لجميع المستخدمين)</label>
                <textarea id="notif-text" class="sw-input" style="height:100px;" placeholder="مثال: خصومات كبرى على شحن ببجي اليوم!"></textarea>
                <button class="btn btn-p" style="width:100%; margin-top:20px;" onclick="sendGlobalNotification()">
                    <i class="fa fa-paper-plane"></i> إرسال تنبيه فوري
                </button>
            </div>
            <div id="notif-history" style="margin-top: 20px;"></div>
        </section>

        <section id="view-orders" class="view-section">
            <div class="page-head"><h2>سجل طلبات العملاء</h2></div>
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr>
                            <th>الخدمة المطلوبة</th>
                            <th>اسم المستخدم</th>
                            <th>الرابط / الآيدي</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-rows"></tbody>
                </table>
            </div>
        </section>

        <section id="view-users" class="view-section">
            <div class="page-head"><h2>إدارة الحسابات والأرصدة</h2></div>
            <div id="users-list-area"></div>
        </section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showView(v, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            el.classList.add('active');
            
            if(v==='services') loadMasterData();
            if(v==='orders') loadAdminOrders();
            if(v==='notif') loadNotifHistory();
            if(v==='users') loadUsersData();
        }

        function loadMasterData() {
            db.collection("services").onSnapshot(snap => {
                const area = document.getElementById('master-services-list');
                area.innerHTML = "";
                const cats = {};

                snap.forEach(doc => {
                    const d = doc.data();
                    const c = d.category || "غير مصنف";
                    if(!cats[c]) cats[c] = { name: c, order: d.catOrder || 99, items: [] };
                    cats[c].items.push({id: doc.id, ...d});
                });

                const sortedCats = Object.values(cats).sort((a,b) => a.order - b.order);
                
                sortedCats.forEach(cat => {
                    const box = document.createElement('div');
                    box.className = 'cat-box';
                    const sortedItems = cat.items.sort((a,b) => (a.srvOrder || 0) - (b.srvOrder || 0));
                    
                    const itemsHtml = sortedItems.map(s => `
                        <div class="srv-row">
                            <div class="srv-meta">
                                <div class="order-circle" style="width:30px; height:30px; font-size:12px;" 
                                     onclick="updateSrvOrder('${s.id}', ${s.srvOrder || 0})">${s.srvOrder || 0}</div>
                                <div class="srv-main-text">
                                    <b>${s.name}</b>
                                    <span>${s.description || 'لا يوجد وصف متاح'}</span>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="srv-pricing">
                                    <b>${s.finalPrice} د.ل</b>
                                    <small>${s.priceType == '1' ? 'سعر ثابت' : 'لكل 1000'}</small>
                                </div>
                                <button class="btn btn-outline btn-sm" onclick="fullEditService('${s.id}')"><i class="fa fa-edit"></i></button>
                                <button class="btn btn-danger btn-sm" onclick="deleteServiceDirect('${s.id}')"><i class="fa fa-trash"></i></button>
                            </div>
                        </div>`).join('');

                    box.innerHTML = `
                        <div class="cat-top">
                            <div class="cat-info-side">
                                <div class="order-circle" onclick="updateCatOrder('${cat.name}', ${cat.order})">${cat.order}</div>
                                <span class="cat-title" onclick="toggleCat(this)">${cat.name} (${cat.items.length})</span>
                            </div>
                            <div class="cat-actions" style="display:flex; gap:8px;">
                                <button class="btn btn-outline btn-sm" onclick="renameCatGroup('${cat.name}')"><i class="fa fa-edit"></i> تعديل الاسم</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteCategoryGroup('${cat.name}')"><i class="fa fa-trash"></i> حذف الكل</button>
                                <button class="btn btn-outline btn-sm" onclick="toggleCat(this)"><i class="fa fa-chevron-down"></i></button>
                            </div>
                        </div>
                        <div class="cat-body open">${itemsHtml}</div>`;
                    area.appendChild(box);
                });
            });
        }

        function toggleCat(el) {
            el.closest('.cat-box').querySelector('.cat-body').classList.toggle('open');
        }

        async function fetchExternalAPI() {
            const url = document.getElementById('api-url').value;
            const key = document.getElementById('api-key').value;
            const profit = parseFloat(document.getElementById('api-profit').value) || 0;
            const proxy = "https://api.allorigins.win/get?url=";
            const fullUrl = `${url}?key=${key}&action=services`;
            
            Swal.fire({ title: 'جاري الاتصال بالمزود...', didOpen: () => Swal.showLoading(), background: '#0d0d0d', color: '#fff' });
            
            try {
                const response = await fetch(proxy + encodeURIComponent(fullUrl));
                const resJson = await response.json();
                const data = JSON.parse(resJson.contents);

                let html = `<div class="scroll-box"><table><thead><tr><th>ID</th><th>الخدمة</th><th>السعر</th><th>إجراء</th></tr></thead><tbody>`;
                data.forEach(s => {
                    const final = (parseFloat(s.rate) + (parseFloat(s.rate) * (profit/100))).toFixed(2);
                    html += `<tr><td><span class="id-badge">${s.service}</span></td><td><b>${s.name}</b><br><small>${s.category}</small></td><td>${final} د.ل</td><td><button class="btn btn-p btn-sm" onclick="importFromAPI('${s.service}','${s.name.replace(/'/g,"")}','${s.category.replace(/'/g,"")}',${final})">جلب</button></td></tr>`;
                });
                document.getElementById('api-results-box').innerHTML = html + `</tbody></table></div>`;
                Swal.close();
            } catch (e) { Swal.fire('خطأ', 'تأكد من الاتصال', 'error'); }
        }

        function loadUsersData() {
            db.collection("users").onSnapshot(snap => {
                const area = document.getElementById('users-list-area');
                area.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    const userId = doc.id;
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `<div class="user-meta"><b>${u.username || 'مستخدم جديد'}</b><span>${u.email || ''}</span></div><div style="display:flex; align-items:center; gap:15px;"><div class="user-balance"><b>${(u.balance || 0).toFixed(2)} د.ل</b></div><button class="btn btn-p btn-sm" onclick="adjustBalance('${userId}', 'add')">+</button><button class="btn btn-danger btn-sm" onclick="adjustBalance('${userId}', 'sub')">-</button></div>`;
                    area.appendChild(row);
                });
            });
        }

        async function adjustBalance(id, action) {
            const { value: amount } = await Swal.fire({ title: 'تعديل الرصيد', input: 'number', background: '#0d0d0d', color: '#fff' });
            if (amount) {
                const userRef = db.collection("users").doc(id);
                await db.runTransaction(async (t) => {
                    const doc = await t.get(userRef);
                    const current = doc.data().balance || 0;
                    t.update(userRef, { balance: action === 'add' ? current + parseFloat(amount) : current - parseFloat(amount) });
                });
            }
        }

        async function deleteCategoryGroup(catName) {
            const confirm = await Swal.fire({ title: 'حذف القسم؟', icon: 'warning', showCancelButton: true, background: '#0d0d0d', color: '#fff' });
            if (confirm.isConfirmed) {
                const snap = await db.collection("services").where("category", "==", catName).get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            }
        }

        // --- التعديل المطلوب: تفعيل إعادة تسمية القسم ---
        async function renameCatGroup(oldName) {
            const { value: newName } = await Swal.fire({
                title: 'تعديل اسم القسم',
                input: 'text',
                inputValue: oldName,
                background: '#0d0d0d',
                color: '#fff',
                showCancelButton: true,
                confirmButtonText: 'تحديث الآن',
                cancelButtonText: 'إلغاء'
            });

            if (newName && newName !== oldName) {
                Swal.fire({ title: 'جاري التحديث...', didOpen: () => Swal.showLoading() });
                
                try {
                    const snap = await db.collection("services").where("category", "==", oldName).get();
                    const batch = db.batch();
                    
                    snap.forEach(doc => {
                        batch.update(doc.ref, { category: newName });
                    });
                    
                    await batch.commit();
                    Swal.fire('تم بنجاح', 'تم تغيير اسم القسم في جميع الخدمات التابعة له', 'success');
                } catch (e) {
                    Swal.fire('فشل التحديث', e.message, 'error');
                }
            }
        }

        async function deleteServiceDirect(id) {
            if(confirm("حذف؟")) await db.collection("services").doc(id).delete();
        }

        async function fullEditService(id) {
            const doc = await db.collection("services").doc(id).get();
            const s = doc.data();
            const { value: res } = await Swal.fire({
                title: 'تعديل الخدمة',
                background: '#0d0d0d', color: '#fff',
                html: `<input id="e-n" class="sw-input" value="${s.name}"><input id="e-c" class="sw-input" value="${s.category}"><input id="e-p" type="number" class="sw-input" value="${s.finalPrice}"><select id="e-t" class="sw-input"><option value="1">ثابت</option><option value="1000">1000</option></select>`,
                preConfirm: () => ({ n: document.getElementById('e-n').value, c: document.getElementById('e-c').value, p: document.getElementById('e-p').value, t: document.getElementById('e-t').value })
            });
            if(res) await db.collection("services").doc(id).update({ name: res.n, category: res.c, finalPrice: parseFloat(res.p), priceType: res.t });
        }

        async function sendGlobalNotification() {
            const text = document.getElementById('notif-text').value;
            if(text) await db.collection("notifications").add({ message: text, active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        }

        function loadNotifHistory() {
            db.collection("notifications").orderBy("createdAt", "desc").limit(5).onSnapshot(snap => {
                const area = document.getElementById('notif-history');
                area.innerHTML = "";
                snap.forEach(doc => {
                    area.innerHTML += `<div class="form-card">${doc.data().message} <button onclick="deleteNotif('${doc.id}')">X</button></div>`;
                });
            });
        }
        async function deleteNotif(id) { await db.collection("notifications").doc(id).delete(); }

        function loadAdminOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const rows = document.getElementById('admin-orders-rows');
                rows.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    rows.innerHTML += `<tr><td>${o.serviceName}</td><td>${o.username}</td><td>${o.target}</td><td>${o.status || 'معلق'}</td><td>...</td><td><button onclick="updateOrderStatus('${doc.id}')">تحديث</button></td></tr>`;
                });
            });
        }

        async function updateOrderStatus(id) {
            const { value: st } = await Swal.fire({ title: 'الحالة', input: 'select', inputOptions: { 'مكتمل': 'مكتمل', 'ملغي': 'ملغي' } });
            if(st) await db.collection("orders").doc(id).update({ status: st });
        }

        async function updateCatOrder(name, current) {
            const { value: num } = await Swal.fire({ title: 'ترتيب القسم', input: 'number', inputValue: current });
            if(num) {
                const snap = await db.collection("services").where("category", "==", name).get();
                const batch = db.batch();
                snap.forEach(doc => batch.update(doc.ref, { catOrder: parseInt(num) }));
                await batch.commit();
            }
        }

        async function updateSrvOrder(id, current) {
            const { value: num } = await Swal.fire({ title: 'ترتيب الخدمة', input: 'number', inputValue: current });
            if(num) await db.collection("services").doc(id).update({ srvOrder: parseInt(num) });
        }

        async function addSrvManual() {
            const { value: res } = await Swal.fire({
                title: 'إضافة خدمة',
                html: `<input id="a-n" class="sw-input" placeholder="الاسم"><input id="a-c" class="sw-input" placeholder="القسم"><input id="a-p" type="number" class="sw-input" placeholder="السعر">`,
                preConfirm: () => ({ n: document.getElementById('a-n').value, c: document.getElementById('a-c').value, p: document.getElementById('a-p').value })
            });
            if(res) await db.collection("services").add({ name: res.n, category: res.c, finalPrice: parseFloat(res.p), catOrder: 99, srvOrder: 0 });
        }

        async function importFromAPI(eid, n, c, p) {
            await db.collection("services").add({ externalId: eid, name: n, category: c, finalPrice: parseFloat(p), priceType: "1000", catOrder: 99, srvOrder: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        }

        window.onload = () => { loadMasterData(); loadAdminOrders(); loadNotifHistory(); loadUsersData(); };
    </script>
</body>
</html>
