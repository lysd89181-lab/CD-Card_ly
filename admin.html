<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD PRO | النظام الإداري المتكامل</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --p: #39ff14; --bg: #000; --card: #0d0d0d; --border: #1a1a1a;
            --text: #fff; --muted: #888; --danger: #ff003c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Navigation Tabs */
        .tabs-nav { 
            position: sticky; top: 0; background: rgba(0,0,0,0.9); 
            display: flex; justify-content: space-around; padding: 15px; 
            border-bottom: 1px solid var(--border); z-index: 1000; backdrop-filter: blur(10px);
        }
        .tab-btn { color: var(--muted); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { color: var(--p); border-bottom: 2px solid var(--p); padding-bottom: 5px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Category & Services UI */
        .category-group { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card); }
        .category-header { 
            background: #151515; padding: 18px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .services-list { display: none; background: #080808; padding: 5px; border-top: 1px solid var(--border); }
        .services-list.active { display: block; }

        .service-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-bottom: 1px solid #111; 
        }

        /* Buttons & Badges */
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .btn-p { background: var(--p); color: #000; }
        .btn-edit { background: rgba(57, 255, 20, 0.1); color: var(--p); border: 1px solid var(--p); }
        .btn-danger { background: rgba(255, 0, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* Form Elements */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        .input { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: #fff; margin-top: 10px; font-size: 14px; }
        textarea.input { height: 100px; resize: none; }

        /* Tables for Users & Finance */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: right; color: var(--p); padding: 12px; border-bottom: 2px solid var(--border); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; }

        .badge { padding: 3px 8px; border-radius: 5px; font-size: 10px; }
        .bg-wait { background: rgba(255, 170, 0, 0.1); color: #ffa000; }
    </style>
</head>
<body>

    <nav class="tabs-nav">
        <div class="tab-btn active" onclick="switchTab('services', this)"><i class="fa fa-boxes"></i> الخدمات</div>
        <div class="tab-btn" onclick="switchTab('finance', this)"><i class="fa fa-wallet"></i> الشحن</div>
        <div class="tab-btn" onclick="switchTab('users', this)"><i class="fa fa-users"></i> المستخدمين</div>
    </nav>

    <div class="container">
        
        <section id="tab-services" class="tab-content active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h3>إدارة الخدمات</h3>
                <button class="btn btn-p" onclick="openSrvModal()">+ إضافة خدمة</button>
            </div>
            <div id="categories-container">
                </div>
        </section>

        <section id="tab-finance" class="tab-content">
            <h3>طلبات الشحن المعلقة</h3>
            <div class="category-group" style="padding:15px">
                <table>
                    <thead>
                        <tr>
                            <th>المستخدم</th>
                            <th>المبلغ</th>
                            <th>الوسيلة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="finance-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-users" class="tab-content">
            <h3>قاعدة بيانات المستخدمين</h3>
            <div class="category-group" style="padding:15px">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الرصيد</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="users-list"></tbody>
                </table>
            </div>
        </section>

    </div>

    <div class="modal" id="modal-srv">
        <div class="modal-content">
            <h3 id="modal-title" style="color:var(--p)">إدارة الخدمة</h3>
            <input type="hidden" id="srv-id">
            
            <label style="font-size:12px; color:var(--muted)">اسم الخدمة</label>
            <input type="text" id="srv-name" class="input">
            
            <label style="font-size:12px; color:var(--muted); margin-top:10px; display:block">القسم / التصنيف</label>
            <input type="text" id="srv-cat" class="input">

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div>
                    <label style="font-size:12px; color:var(--muted); margin-top:10px; display:block">نوع السعر</label>
                    <select id="srv-type" class="input">
                        <option value="1">ثابت (1x)</option>
                        <option value="1000">لكل 1000 وحدة</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:12px; color:var(--muted); margin-top:10px; display:block">السعر (د.ل)</label>
                    <input type="number" id="srv-price" step="0.01" class="input">
                </div>
            </div>

            <label style="font-size:12px; color:var(--muted); margin-top:10px; display:block">وصف الخدمة (يظهر للزبون)</label>
            <textarea id="srv-desc" class="input" placeholder="اكتب تفاصيل الخدمة أو شروط التنفيذ..."></textarea>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-danger" id="btn-delete-srv" style="display:none" onclick="deleteService()">حذف</button>
                <button class="btn" style="flex:1; background:#222; color:#fff" onclick="closeModal()">إلغاء</button>
                <button class="btn btn-p" style="flex:2" onclick="saveService()">حفظ البيانات</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // تبديل الأقسام
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            
            if(tabId === 'services') loadServices();
            if(tabId === 'finance') loadFinance();
            if(tabId === 'users') loadUsers();
        }

        // --- إدارة الخدمات (مع الوصف والأقسام المنسدلة) ---
        function loadServices() {
            db.collection("services").onSnapshot(snap => {
                const container = document.getElementById('categories-container');
                container.innerHTML = "";
                const cats = {};

                snap.forEach(doc => {
                    const d = doc.data();
                    const c = d.category || "غير مصنف";
                    if(!cats[c]) cats[c] = [];
                    cats[c].push({id: doc.id, ...d});
                });

                for (const name in cats) {
                    const group = document.createElement('div');
                    group.className = 'category-group';
                    group.innerHTML = `
                        <div class="category-header" onclick="toggleCat('${name}')">
                            <span style="font-weight:bold; color:var(--p)">${name}</span>
                            <button class="btn btn-edit" style="font-size:10px" onclick="event.stopPropagation(); renameCat('${name}')">تعديل الاسم</button>
                        </div>
                        <div class="services-list" id="cat-${name}">
                            ${cats[name].map(s => `
                                <div class="service-item">
                                    <div style="flex:1">
                                        <div style="font-weight:bold">${s.name}</div>
                                        <div style="font-size:10px; color:var(--muted); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${s.description || 'لا يوجد وصف'}</div>
                                    </div>
                                    <div style="color:var(--p); margin: 0 15px;">${s.finalPrice} د.ل</div>
                                    <button class="btn btn-edit" onclick="editSrv('${s.id}')">تعديل</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(group);
                }
            });
        }

        function toggleCat(name) {
            document.getElementById(`cat-${name}`).classList.toggle('active');
        }

        async function editSrv(id) {
            const doc = await db.collection("services").doc(id).get();
            const s = doc.data();
            document.getElementById('srv-id').value = id;
            document.getElementById('srv-name').value = s.name;
            document.getElementById('srv-cat').value = s.category;
            document.getElementById('srv-price').value = s.finalPrice;
            document.getElementById('srv-type').value = s.type || "1";
            document.getElementById('srv-desc').value = s.description || "";
            document.getElementById('btn-delete-srv').style.display = 'block';
            document.getElementById('modal-srv').style.display = 'flex';
        }

        function openSrvModal() {
            document.getElementById('srv-id').value = "";
            document.getElementById('srv-desc').value = "";
            document.getElementById('btn-delete-srv').style.display = 'none';
            document.getElementById('modal-srv').style.display = 'flex';
        }

        async function saveService() {
            const id = document.getElementById('srv-id').value;
            const data = {
                name: document.getElementById('srv-name').value,
                category: document.getElementById('srv-cat').value,
                finalPrice: parseFloat(document.getElementById('srv-price').value),
                type: document.getElementById('srv-type').value,
                description: document.getElementById('srv-desc').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if(id) await db.collection("services").doc(id).update(data);
            else await db.collection("services").add(data);
            closeModal();
        }

        async function deleteService() {
            const id = document.getElementById('srv-id').value;
            if(confirm("هل أنت متأكد من حذف هذه الخدمة؟")) {
                await db.collection("services").doc(id).delete();
                closeModal();
            }
        }

        // --- باقي الأقسام (شحن ومستخدمين) ---
        function loadFinance() {
            db.collection("deposits").where("status", "==", "قيد المراجعة").onSnapshot(snap => {
                const list = document.getElementById('finance-list');
                list.innerHTML = snap.empty ? "<tr><td colspan='4' style='text-align:center'>لا توجد طلبات معلقة</td></tr>" : "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<tr>
                        <td>${d.username}</td>
                        <td style="color:var(--p)">${d.amount}</td>
                        <td>${d.method}</td>
                        <td><button class="btn btn-p" onclick="approveFinance('${doc.id}','${d.uid}',${d.amount})">قبول</button></td>
                    </tr>`;
                });
            });
        }

        function loadUsers() {
            db.collection("users").limit(20).onSnapshot(snap => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    list.innerHTML += `<tr>
                        <td>${u.username}</td>
                        <td style="color:var(--p)">${u.balance || 0} د.ل</td>
                        <td><button class="btn btn-edit" onclick="topUpUser('${doc.id}')">شحن</button></td>
                    </tr>`;
                });
            });
        }

        async function renameCat(oldName) {
            const { value: newName } = await Swal.fire({ title: 'تغيير اسم القسم', input: 'text', inputValue: oldName, showCancelButton: true });
            if(newName && newName !== oldName) {
                const batch = db.batch();
                const snap = await db.collection("services").where("category", "==", oldName).get();
                snap.forEach(d => batch.update(d.ref, {category: newName}));
                await batch.commit();
            }
        }

        function closeModal() { document.getElementById('modal-srv').style.display = 'none'; }
        window.onload = loadServices;
    </script>
</body>
</html>
