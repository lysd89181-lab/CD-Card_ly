<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD Ultimate Admin | محمد</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --p: #39ff14; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
            --text: #ffffff; --muted: #888888; --danger: #ff003c; --accent: #0088ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; direction: rtl; }

        /* Navigation */
        .admin-nav {
            position: sticky; top: 0; background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px); z-index: 2000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; gap: 8px; padding: 12px; overflow-x: auto;
        }

        .nav-link {
            padding: 10px 15px; color: var(--muted); cursor: pointer; font-weight: 700;
            font-size: 13px; border-radius: 10px; transition: 0.3s; white-space: nowrap;
        }

        .nav-link.active { color: var(--p); background: rgba(57, 255, 20, 0.1); border: 1px solid rgba(57, 255, 20, 0.2); }

        .container { max-width: 1100px; margin: 25px auto; padding: 0 15px; }

        /* Sections Visibility */
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .page-head { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-right: 4px solid var(--p); padding-right: 15px;
        }

        /* Category Card Styles */
        .cat-box { 
            background: var(--card); border-radius: 12px; border: 1px solid var(--border); 
            margin-bottom: 15px; overflow: hidden; 
        }

        .cat-top { 
            padding: 12px 18px; display: flex; justify-content: space-between; 
            align-items: center; background: #0a0a0a; border-bottom: 1px solid #151515;
        }

        .cat-info-side { display: flex; align-items: center; gap: 12px; }

        .order-circle {
            background: #1a1a1a; border: 1px solid #333; color: var(--p);
            width: 35px; height: 35px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
            cursor: pointer; font-size: 14px;
        }
        .order-circle:hover { background: var(--p); color: #000; }

        .cat-title { font-size: 15px; font-weight: 700; cursor: pointer; color: #fff; }

        .cat-body { display: none; background: #070707; }
        .cat-body.open { display: block; }

        /* Service & User Row */
        .srv-row, .user-row { 
            display: flex; align-items: center; padding: 12px 18px; 
            border-bottom: 1px solid #111; justify-content: space-between; gap: 10px;
        }
        .srv-row:hover, .user-row:hover { background: #0c0c0c; }

        .srv-meta, .user-meta { display: flex; align-items: center; gap: 10px; flex: 1; }
        
        .srv-main-text b, .user-main-text b { font-size: 13px; color: #fff; display: block; }
        .srv-main-text span, .user-main-text span { color: var(--muted); font-size: 10px; display: block; }

        .srv-pricing, .user-balance { 
            background: #151515; padding: 5px 10px; border-radius: 8px; 
            border: 1px solid #222; text-align: center; min-width: 90px;
        }
        .srv-pricing b, .user-balance b { color: var(--p); font-size: 13px; }
        .user-balance b { color: #00d4ff; }
        .srv-pricing small, .user-balance small { display: block; font-size: 9px; color: #666; }

        /* UI Buttons */
        .btn {
            padding: 8px 15px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: 700; font-size: 12px; display: inline-flex; 
            align-items: center; gap: 6px; transition: 0.3s;
        }
        .btn-p { background: var(--p); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: rgba(255, 0, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-sm { padding: 5px 10px; font-size: 10px; }

        /* Inputs & Forms */
        .form-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .sw-input, .api-input {
            width: 100%; padding: 10px; background: #000; border: 1px solid #222;
            color: #fff; border-radius: 8px; margin-top: 8px; text-align: right; outline: none;
        }
        .sw-input:focus { border-color: var(--p); }

        .scroll-box { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 700px; }
        th { padding: 12px; background: #0f0f0f; color: var(--muted); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; }

        .id-badge { font-family: monospace; color: var(--accent); background: rgba(0, 136, 255, 0.1); padding: 2px 5px; border-radius: 4px; font-size: 10px; }

    </style>
</head>
<body>

    <nav class="admin-nav">
        <div class="nav-link active" onclick="showView('services', this)"><i class="fa fa-layer-group"></i> المتجر والترتيب</div>
        <div class="nav-link" onclick="showView('api', this)"><i class="fa fa-plug"></i> جلب API</div>
        <div class="nav-link" onclick="showView('notif', this)"><i class="fa fa-bell"></i> الإشعارات</div>
        <div class="nav-link" onclick="showView('orders', this)"><i class="fa fa-shopping-cart"></i> الطلبات</div>
        <div class="nav-link" onclick="showView('users', this)"><i class="fa fa-users"></i> المستخدمين</div>
    </nav>

    <div class="container">

        <section id="view-services" class="view-section active">
            <div class="page-head">
                <h2>إدارة المحتوى والترتيب</h2>
                <button class="btn btn-p" onclick="addSrvManual()">
                    <i class="fa fa-plus-circle"></i> إضافة خدمة يدوية
                </button>
            </div>
            <div id="master-services-list"></div>
        </section>

        <section id="view-api" class="view-section">
            <div class="page-head"><h2>سحب خدمات API</h2></div>
            <div class="form-card">
                <label style="font-size: 11px; color: var(--muted);">رابط المزود</label>
                <input type="text" id="api-url" class="api-input" value="https://libyaplus1.com/api/v2">
                <label style="font-size: 11px; color: var(--muted); margin-top: 10px; display: block;">API KEY</label>
                <input type="text" id="api-key" class="api-input" value="958c5695446fccb28ab7b8090d5e271a">
                <label style="font-size: 11px; color: var(--muted); margin-top: 10px; display: block;">نسبة الربح المضافة (%)</label>
                <input type="number" id="api-profit" class="api-input" value="10">
                <button class="btn btn-p" style="width:100%; margin-top:15px; height:45px;" onclick="fetchExternalAPI()">
                    <i class="fa fa-sync"></i> فحص وجلب الخدمات
                </button>
            </div>
            <div id="api-results-box"></div>
        </section>

        <section id="view-notif" class="view-section">
            <div class="page-head"><h2>إرسال إشعارات للمستخدمين</h2></div>
            <div class="form-card" style="border-right: 4px solid var(--accent);">
                <label>نص الإشعار</label>
                <textarea id="notif-text" class="sw-input" style="height:80px;" placeholder="اكتب التنبيه هنا..."></textarea>
                <button class="btn btn-p" style="width:100%; margin-top:15px;" onclick="sendGlobalNotification()">
                    <i class="fa fa-paper-plane"></i> بث الإشعار (10 ثوانٍ)
                </button>
            </div>
            <div id="notif-history"></div>
        </section>

        <section id="view-orders" class="view-section">
            <div class="page-head"><h2>سجل الطلبات</h2></div>
            <div class="scroll-box">
                <table>
                    <thead>
                        <tr>
                            <th>الخدمة</th>
                            <th>الزبون</th>
                            <th>الهدف</th>
                            <th>الحالة</th>
                            <th>تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-rows"></tbody>
                </table>
            </div>
        </section>

        <section id="view-users" class="view-section">
            <div class="page-head"><h2>إدارة المستخدمين والأرصدة</h2></div>
            <div id="users-list-area"></div>
        </section>

    </div>

    <script>
        // تكوين Firebase محمد
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // نظام التنقل
        function showView(v, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            el.classList.add('active');
            
            if(v==='services') loadMasterData();
            if(v==='orders') loadAdminOrders();
            if(v==='notif') loadNotifHistory();
            if(v==='users') loadUsersData();
        }

        /* --- نظام إدارة الخدمات والترتيب --- */
        function loadMasterData() {
            db.collection("services").onSnapshot(snap => {
                const area = document.getElementById('master-services-list');
                area.innerHTML = "";
                const cats = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    const c = d.category || "غير مصنف";
                    if(!cats[c]) cats[c] = { name: c, order: d.catOrder || 99, items: [] };
                    cats[c].items.push({id: doc.id, ...d});
                });
                const sortedCats = Object.values(cats).sort((a,b) => a.order - b.order);
                sortedCats.forEach(cat => {
                    const box = document.createElement('div');
                    box.className = 'cat-box';
                    const sortedItems = cat.items.sort((a,b) => (a.srvOrder || 0) - (b.srvOrder || 0));
                    const itemsHtml = sortedItems.map(s => `
                        <div class="srv-row">
                            <div class="srv-meta">
                                <div class="order-circle" style="width:25px; height:25px; font-size:10px;" onclick="updateSrvOrder('${s.id}', ${s.srvOrder || 0})">${s.srvOrder || 0}</div>
                                <div class="srv-main-text"><b>${s.name}</b><span>${s.description || 'لا يوجد وصف'}</span></div>
                            </div>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="srv-pricing"><b>${s.finalPrice} د.ل</b><small>${s.priceType == '1' ? 'ثابت' : 'متغير'}</small></div>
                                <button class="btn btn-outline btn-sm" onclick="fullEditService('${s.id}')"><i class="fa fa-edit"></i></button>
                                <button class="btn btn-danger btn-sm" onclick="deleteServiceDirect('${s.id}')"><i class="fa fa-trash"></i></button>
                            </div>
                        </div>`).join('');
                    box.innerHTML = `
                        <div class="cat-top">
                            <div class="cat-info-side">
                                <div class="order-circle" onclick="updateCatOrder('${cat.name}', ${cat.order})">${cat.order}</div>
                                <span class="cat-title" onclick="toggleCat(this)">${cat.name}</span>
                            </div>
                            <div class="cat-actions" style="display:flex; gap:5px;">
                                <button class="btn btn-outline btn-sm" onclick="renameCatGroup('${cat.name}')"><i class="fa fa-pen"></i> الاسم</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteCategoryGroup('${cat.name}')"><i class="fa fa-trash"></i> حذف القسم</button>
                                <button class="btn btn-outline btn-sm" onclick="toggleCat(this)"><i class="fa fa-chevron-down"></i></button>
                            </div>
                        </div>
                        <div class="cat-body">${itemsHtml}</div>`;
                    area.appendChild(box);
                });
            });
        }

        function toggleCat(el) {
            el.closest('.cat-box').querySelector('.cat-body').classList.toggle('open');
        }

        // حذف خدمة واحدة
        async function deleteServiceDirect(id) {
            const confirm = await Swal.fire({
                title: 'هل أنت متأكد؟',
                text: "سيتم حذف هذه الخدمة نهائياً!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff003c',
                cancelButtonColor: '#333',
                confirmButtonText: 'نعم، احذفها',
                cancelButtonText: 'إلغاء',
                background: '#0d0d0d', color: '#fff'
            });
            if (confirm.isConfirmed) {
                await db.collection("services").doc(id).delete();
                Swal.fire({ icon: 'success', title: 'تم الحذف', toast: true, position: 'top-end', timer: 1500, showConfirmButton: false });
            }
        }

        // حذف قسم بالكامل (حذف جماعي)
        async function deleteCategoryGroup(catName) {
            const confirm = await Swal.fire({
                title: 'حذف قسم كامل؟',
                text: `سيتم حذف قسم "${catName}" وجميع الخدمات الموجودة بداخله!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff003c',
                cancelButtonColor: '#333',
                confirmButtonText: 'نعم، حذف الكل',
                cancelButtonText: 'إلغاء',
                background: '#0d0d0d', color: '#fff'
            });

            if (confirm.isConfirmed) {
                Swal.fire({ title: 'جاري الحذف الجماعي...', didOpen: () => Swal.showLoading() });
                const batch = db.batch();
                const snap = await db.collection("services").where("category", "==", catName).get();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                Swal.fire('تم حذف القسم بنجاح', '', 'success');
            }
        }

        async function fullEditService(id) {
            const doc = await db.collection("services").doc(id).get();
            const s = doc.data();
            const { value: form } = await Swal.fire({
                title: 'تعديل الخدمة',
                background: '#0d0d0d', color: '#fff',
                html: `
                    <input id="f-name" class="sw-input" value="${s.name}" placeholder="الاسم">
                    <input id="f-cat" class="sw-input" value="${s.category}" placeholder="القسم">
                    <input id="f-price" type="number" step="0.01" class="sw-input" value="${s.finalPrice}" placeholder="السعر">
                    <select id="f-type" class="sw-input">
                        <option value="1" ${s.priceType == '1' ? 'selected' : ''}>ثابت (1)</option>
                        <option value="1000" ${s.priceType == '1000' ? 'selected' : ''}>متغير (1000)</option>
                    </select>
                    <textarea id="f-desc" class="sw-input" style="height:80px">${s.description || ''}</textarea>`,
                showConfirmButton: true, confirmButtonText: 'حفظ التعديلات'
            });
            if (form) {
                await db.collection("services").doc(id).update({
                    name: document.getElementById('f-name').value,
                    category: document.getElementById('f-cat').value,
                    finalPrice: parseFloat(document.getElementById('f-price').value),
                    priceType: document.getElementById('f-type').value,
                    description: document.getElementById('f-desc').value
                });
                Swal.fire('تم التحديث', '', 'success');
            }
        }

        async function addSrvManual() {
            const { value: res } = await Swal.fire({
                title: 'إضافة خدمة جديدة',
                background: '#0d0d0d', color: '#fff',
                html: `<input id="add-n" class="sw-input" placeholder="اسم الخدمة"><input id="add-c" class="sw-input" placeholder="اسم القسم"><input id="add-p" type="number" class="sw-input" placeholder="السعر"><select id="add-t" class="sw-input"><option value="1000">1000</option><option value="1">1</option></select><textarea id="add-d" class="sw-input" placeholder="الوصف"></textarea>`,
                preConfirm: () => ({ n: document.getElementById('add-n').value, c: document.getElementById('add-c').value, p: document.getElementById('add-p').value, t: document.getElementById('add-t').value, d: document.getElementById('add-d').value })
            });
            if(res && res.n) {
                await db.collection("services").add({ name: res.n, category: res.c, finalPrice: parseFloat(res.p), priceType: res.t, description: res.d, catOrder: 99, srvOrder: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                Swal.fire('تمت الإضافة', '', 'success');
            }
        }

        async function updateCatOrder(name, current) {
            const { value: num } = await Swal.fire({ title: 'ترتيب القسم', input: 'number', inputValue: current });
            if(num) {
                const batch = db.batch();
                const snap = await db.collection("services").where("category", "==", name).get();
                snap.forEach(doc => batch.update(doc.ref, { catOrder: parseInt(num) }));
                await batch.commit();
            }
        }

        async function updateSrvOrder(id, current) {
            const { value: num } = await Swal.fire({ title: 'ترتيب الخدمة', input: 'number', inputValue: current });
            if(num) await db.collection("services").doc(id).update({ srvOrder: parseInt(num) });
        }

        async function renameCatGroup(old) {
            const { value: n } = await Swal.fire({ title: 'إعادة تسمية القسم', input: 'text', inputValue: old });
            if(n && n !== old) {
                const batch = db.batch();
                const snap = await db.collection("services").where("category", "==", old).get();
                snap.forEach(doc => batch.update(doc.ref, { category: n }));
                await batch.commit();
            }
        }

        /* --- إدارة المستخدمين والأرصدة --- */
        function loadUsersData() {
            db.collection("users").onSnapshot(snap => {
                const area = document.getElementById('users-list-area');
                area.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    const userId = doc.id;
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div class="user-meta">
                            <div class="user-main-text">
                                <b>${u.username || 'بدون اسم'}</b>
                                <span>${u.email || 'لا يوجد بريد'}</span>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="user-balance">
                                <b>${(u.balance || 0).toFixed(2)} د.ل</b>
                                <small>الرصيد الحالي</small>
                            </div>
                            <button class="btn btn-p btn-sm" onclick="adjustBalance('${userId}', 'add')"><i class="fa fa-plus"></i></button>
                            <button class="btn btn-danger btn-sm" onclick="adjustBalance('${userId}', 'sub')"><i class="fa fa-minus"></i></button>
                        </div>
                    `;
                    area.appendChild(row);
                });
            });
        }

        async function adjustBalance(id, action) {
            const { value: amount } = await Swal.fire({
                title: action === 'add' ? 'إضافة رصيد' : 'خصم رصيد',
                input: 'number',
                inputPlaceholder: 'أدخل المبلغ...',
                background: '#0d0d0d', color: '#fff',
                showCancelButton: true
            });

            if (amount) {
                const userRef = db.collection("users").doc(id);
                const val = parseFloat(amount);
                await db.runTransaction(async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    if (!userDoc.exists) return;
                    const newBalance = action === 'add' ? (userDoc.data().balance || 0) + val : (userDoc.data().balance || 0) - val;
                    transaction.update(userRef, { balance: newBalance });
                });
                Swal.fire('تم التحديث', `الرصيد الجديد جاهز`, 'success');
            }
        }

        /* --- نظام الإشعارات --- */
        async function sendGlobalNotification() {
            const text = document.getElementById('notif-text').value;
            if(!text) return;
            await db.collection("notifications").add({ message: text, active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('notif-text').value = "";
            Swal.fire('تم البث بنجاح', '', 'success');
        }

        function loadNotifHistory() {
            db.collection("notifications").orderBy("createdAt", "desc").limit(5).onSnapshot(snap => {
                const h = document.getElementById('notif-history');
                h.innerHTML = "";
                snap.forEach(doc => {
                    const n = doc.data();
                    h.innerHTML += `<div class="form-card" style="padding:12px; margin-bottom:8px; font-size:12px;">${n.message} <button class="btn btn-danger btn-sm" style="float:left" onclick="deleteNotif('${doc.id}')"><i class="fa fa-times"></i></button></div>`;
                });
            });
        }
        async function deleteNotif(id) { await db.collection("notifications").doc(id).delete(); }

        /* --- نظام API --- */
        async function fetchExternalAPI() {
            const url = document.getElementById('api-url').value;
            const key = document.getElementById('api-key').value;
            const profit = parseFloat(document.getElementById('api-profit').value) || 0;
            Swal.fire({ title: 'جاري سحب الخدمات...', didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${url}?key=${key}&action=services`);
                const data = await res.json();
                let html = `<div class="scroll-box"><table><thead><tr><th>ID</th><th>الخدمة</th><th>السعر</th><th>إجراء</th></tr></thead><tbody>`;
                data.forEach(s => {
                    const final = (parseFloat(s.rate) + (parseFloat(s.rate) * (profit/100))).toFixed(2);
                    html += `<tr><td><span class="id-badge">${s.service}</span></td><td><b>${s.name}</b><br><small>${s.category}</small></td><td style="color:var(--p)">${final} د.ل</td><td><button class="btn btn-p btn-sm" onclick="importFromAPI('${s.service}','${s.name.replace(/'/g,"")}','${s.category.replace(/'/g,"")}',${final})">إضافة للمتجر</button></td></tr>`;
                });
                document.getElementById('api-results-box').innerHTML = html + `</tbody></table></div>`;
                Swal.close();
            } catch (e) { Swal.fire('خطأ', 'فشل الاتصال بالمزود', 'error'); }
        }

        async function importFromAPI(eid, n, c, p) {
            await db.collection("services").add({ externalId: eid, name: n, category: c, finalPrice: p, priceType: "1000", catOrder: 99, srvOrder: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            Swal.fire({ icon: 'success', title: 'تمت الإضافة', toast: true, position: 'top-end', timer: 1000, showConfirmButton: false });
        }

        /* --- الطلبات --- */
        function loadAdminOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const rows = document.getElementById('admin-orders-rows');
                rows.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    rows.innerHTML += `<tr><td><b>${o.serviceName}</b></td><td>${o.username}</td><td><span class="id-badge">${o.target}</span></td><td>${o.status || 'معلق'}</td><td><button class="btn btn-outline btn-sm" onclick="changeStatus('${doc.id}')"><i class="fa fa-sync"></i> الحالة</button></td></tr>`;
                });
            });
        }

        async function changeStatus(id) {
            const { value: st } = await Swal.fire({ title: 'تحديث حالة الطلب', input: 'select', inputOptions: { 'مكتمل': 'مكتمل', 'ملغي': 'ملغي', 'قيد التنفيذ': 'قيد التنفيذ' }, background: '#0d0d0d', color: '#fff' });
            if(st) await db.collection("orders").doc(id).update({ status: st });
        }

        window.onload = () => { loadMasterData(); loadAdminOrders(); loadNotifHistory(); loadUsersData(); };
    </script>
</body>
</html>
