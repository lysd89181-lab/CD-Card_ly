<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD PRO | الإدارة الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --p: #39ff14; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
            --text: #ffffff; --muted: #888888; --danger: #ff003c; --accent: #0088ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* Navigation */
        .admin-nav {
            position: sticky; top: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); z-index: 2000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; gap: 10px; padding: 12px;
        }
        .nav-link {
            padding: 10px 18px; color: var(--muted); cursor: pointer; font-weight: 700;
            font-size: 13px; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .nav-link.active { color: var(--p); background: rgba(57, 255, 20, 0.1); }

        .container { max-width: 1100px; margin: 25px auto; padding: 0 15px; }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Page Head */
        .page-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .page-head h2 { font-weight: 900; font-size: 22px; color: var(--p); }

        /* Buttons */
        .btn {
            padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-p { background: var(--p); color: #000; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--p); color: var(--p); }
        .btn-danger { background: rgba(255, 0, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* Accordion & Services */
        .cat-box { background: var(--card); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; }
        .cat-box.edit-mode-active { border-color: var(--accent); }
        .cat-top { padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; background: #111; cursor: pointer; }
        .cat-body { display: none; padding: 10px; background: #080808; }
        .cat-body.open { display: block; }

        .srv-row { display: flex; flex-direction: column; padding: 15px; border-bottom: 1px solid #151515; gap: 8px; }
        .srv-main { display: flex; align-items: center; gap: 15px; }
        .srv-info { flex: 1; }
        .srv-price-badge { background: #1a1a1a; padding: 4px 10px; border-radius: 6px; border: 1px solid #333; }
        .srv-price-badge b { color: var(--p); font-size: 14px; }
        .srv-price-badge span { font-size: 10px; color: #777; margin-right: 5px; }

        .srv-desc { font-size: 11px; color: #666; background: #000; padding: 8px 12px; border-radius: 8px; border-right: 3px solid var(--p); }
        .bulk-input { width: 90px; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 6px; border-radius: 8px; text-align: center; font-weight: 900; }

        /* Tables */
        .data-table-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: right; }
        th { padding: 15px; background: #111; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid #111; font-size: 13px; }

        .id-txt { font-family: monospace; color: var(--accent); background: #111; padding: 2px 5px; border-radius: 4px; font-size: 11px; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .bg-pending { background: rgba(255,180,0,0.1); color: #ffb400; }
        .bg-success { background: rgba(57,255,20,0.1); color: var(--p); }

        /* Custom Swal Inputs */
        .swal-container-custom {
            padding: 10px;
            text-align: right;
        }
        .swal-input-group {
            margin-bottom: 15px;
        }
        .swal-input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--p);
            font-weight: bold;
        }
        .swal-custom-field {
            width: 100%;
            background: #111 !important;
            border: 1px solid var(--border) !important;
            color: #fff !important;
            border-radius: 10px !important;
            padding: 12px !important;
            font-size: 14px !important;
            outline: none;
        }
        .swal-custom-field:focus {
            border-color: var(--p) !important;
            box-shadow: 0 0 5px rgba(57, 255, 20, 0.2);
        }
        .swal-row {
            display: flex;
            gap: 10px;
        }
        .swal-row > div {
            flex: 1;
        }
    </style>
</head>
<body>

    <nav class="admin-nav">
        <div class="nav-link active" onclick="showView('services', this)"><i class="fa fa-cubes"></i> الخدمات</div>
        <div class="nav-link" onclick="showView('orders', this)"><i class="fa fa-shopping-cart"></i> الطلبات</div>
        <div class="nav-link" onclick="showView('users', this)"><i class="fa fa-users"></i> المستخدمين</div>
        <div class="nav-link" onclick="showView('finance', this)"><i class="fa fa-wallet"></i> الشحن</div>
    </nav>

    <div class="container">

        <section id="view-services" class="view-section active">
            <div class="page-head">
                <h2>إدارة الخدمات والأسعار</h2>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-save" id="save-bulk-btn" style="display:none" onclick="saveBulk()">حفظ التعديلات</button>
                    <button class="btn btn-outline" onclick="toggleBulk()">تعديل الأسعار جماعياً</button>
                    <button class="btn btn-p" onclick="addSrv()">+ خدمة جديدة</button>
                </div>
            </div>
            <div id="services-list"></div>
        </section>

        <section id="view-orders" class="view-section">
            <div class="page-head"><h2>سجل الطلبات</h2></div>
            <div class="data-table-card">
                <table>
                    <thead>
                        <tr><th>الخدمة</th><th>المستخدم</th><th>الهدف</th><th>الحالة</th><th>إجراء</th></tr>
                    </thead>
                    <tbody id="orders-rows"></tbody>
                </table>
            </div>
        </section>

        <section id="view-users" class="view-section">
            <div class="page-head"><h2>إدارة الأعضاء والخصومات</h2></div>
            <div class="data-table-card">
                <table>
                    <thead>
                        <tr><th>الاسم / ID</th><th>الرصيد</th><th>الخصم %</th><th>إدارة مالية</th></tr>
                    </thead>
                    <tbody id="users-rows"></tbody>
                </table>
            </div>
        </section>

        <section id="view-finance" class="view-section">
            <div class="page-head"><h2>طلبات الشحن المعلقة</h2></div>
            <div class="data-table-card">
                <table>
                    <thead>
                        <tr><th>المستخدم</th><th>المبلغ</th><th>الهاتف</th><th>إجراء</th></tr>
                    </thead>
                    <tbody id="finance-rows"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let bulkMode = false;

        function showView(v, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            el.classList.add('active');
            if(v==='services') loadServices();
            if(v==='orders') loadOrders();
            if(v==='users') loadUsers();
            if(v==='finance') loadFinance();
        }

        function loadServices() {
            db.collection("services").onSnapshot(snap => {
                const list = document.getElementById('services-list');
                list.innerHTML = "";
                const cats = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    const c = d.category || "عام";
                    if(!cats[c]) cats[c] = [];
                    cats[c].push({id: doc.id, ...d});
                });

                Object.keys(cats).sort().forEach(cName => {
                    const card = document.createElement('div');
                    card.className = `cat-box ${bulkMode ? 'edit-mode-active' : ''}`;
                    const items = cats[cName].map(s => {
                        let unitDisplay = s.priceType === '1000' ? 'لكل 1000' : 'قطعة مقفولة';
                        
                        return `
                        <div class="srv-row">
                            <div class="srv-main">
                                <div class="srv-info"><b>${s.name}</b></div>
                                <div class="srv-price-badge">
                                    <span>${unitDisplay}</span>
                                    ${bulkMode ? 
                                        `<input type="number" step="0.01" class="bulk-input" data-id="${s.id}" value="${s.finalPrice}">` : 
                                        `<b>${s.finalPrice} د.ل</b>`
                                    }
                                </div>
                                <button class="btn btn-outline" style="padding:5px" onclick="editSrv('${s.id}')"><i class="fa fa-pen"></i></button>
                            </div>
                            ${s.description ? `<div class="srv-desc">${s.description}</div>` : ''}
                        </div>
                    `}).join('');

                    card.innerHTML = `
                        <div class="cat-top" onclick="this.nextElementSibling.classList.toggle('open')">
                            <b><i class="fa fa-folder-open" style="margin-left:8px"></i> ${cName}</b>
                            <div onclick="event.stopPropagation()">
                                <button class="btn btn-outline" style="font-size:10px; background:#000" onclick="renameCat('${cName}')">تعديل القسم</button>
                            </div>
                        </div>
                        <div class="cat-body ${bulkMode ? 'open' : ''}">${items}</div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        function toggleBulk() {
            bulkMode = !bulkMode;
            document.getElementById('save-bulk-btn').style.display = bulkMode ? 'block' : 'none';
            loadServices();
        }

        async function saveBulk() {
            const batch = db.batch();
            document.querySelectorAll('.bulk-input').forEach(i => {
                batch.update(db.collection("services").doc(i.dataset.id), { finalPrice: parseFloat(i.value) });
            });
            await batch.commit();
            toggleBulk();
            Swal.fire({
                title: "تم الحفظ",
                icon: "success",
                background: "#0d0d0d",
                color: "#fff",
                confirmButtonColor: "#39ff14"
            });
        }

        function addSrv() {
            Swal.fire({
                title: 'إضافة خدمة جديدة',
                background: '#050505',
                color: '#fff',
                html: `
                    <div class="swal-container-custom">
                        <div class="swal-input-group">
                            <label><i class="fa fa-tag"></i> اسم الخدمة</label>
                            <input id="n" class="swal-custom-field" placeholder="مثلاً: شدات ببجي">
                        </div>
                        <div class="swal-input-group">
                            <label><i class="fa fa-folder"></i> القسم</label>
                            <input id="c" class="swal-custom-field" placeholder="مثلاً: ألعاب">
                        </div>
                        <div class="swal-input-group">
                            <label><i class="fa fa-align-right"></i> وصف الخدمة</label>
                            <textarea id="d" class="swal-custom-field" rows="3" placeholder="تفاصيل الخدمة..."></textarea>
                        </div>
                        <div class="swal-row">
                            <div class="swal-input-group">
                                <label><i class="fa fa-money-bill"></i> السعر</label>
                                <input id="p" type="number" step="0.01" class="swal-custom-field">
                            </div>
                            <div class="swal-input-group">
                                <label><i class="fa fa-list-ol"></i> النوع</label>
                                <select id="t" class="swal-custom-field">
                                    <option value="fixed">مقفولة (1)</option>
                                    <option value="1000">لكل 1000</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `,
                confirmButtonText: 'إضافة الخدمة',
                confirmButtonColor: '#39ff14',
                showCancelButton: true,
                cancelButtonText: 'إلغاء',
                preConfirm: () => {
                    const n = document.getElementById('n').value;
                    const c = document.getElementById('c').value;
                    if(!n || !c) return Swal.showValidationMessage('يرجى ملء الاسم والقسم');
                    return {
                        name: n,
                        category: c,
                        description: document.getElementById('d').value,
                        finalPrice: parseFloat(document.getElementById('p').value) || 0,
                        priceType: document.getElementById('t').value,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }
                }
            }).then(r => { if(r.value) db.collection("services").add(r.value); });
        }

        async function editSrv(id) {
            const s = (await db.collection("services").doc(id).get()).data();
            Swal.fire({
                title: 'تعديل الخدمة',
                background: '#050505',
                color: '#fff',
                html: `
                    <div class="swal-container-custom">
                        <div class="swal-input-group">
                            <label><i class="fa fa-tag"></i> اسم الخدمة</label>
                            <input id="n" class="swal-custom-field" value="${s.name}">
                        </div>
                        <div class="swal-input-group">
                            <label><i class="fa fa-align-right"></i> وصف الخدمة</label>
                            <textarea id="d" class="swal-custom-field" rows="3">${s.description || ''}</textarea>
                        </div>
                        <div class="swal-row">
                            <div class="swal-input-group">
                                <label><i class="fa fa-money-bill"></i> السعر</label>
                                <input id="p" type="number" step="0.01" class="swal-custom-field" value="${s.finalPrice}">
                            </div>
                            <div class="swal-input-group">
                                <label><i class="fa fa-list-ol"></i> النوع</label>
                                <select id="t" class="swal-custom-field">
                                    <option value="fixed" ${s.priceType==='fixed'?'selected':''}>مقفولة (1)</option>
                                    <option value="1000" ${s.priceType==='1000'?'selected':''}>لكل 1000</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `,
                showDenyButton: true,
                denyButtonText: 'حذف الخدمة',
                confirmButtonText: 'حفظ التغييرات',
                confirmButtonColor: '#0088ff',
                preConfirm: () => ({
                    name: document.getElementById('n').value,
                    description: document.getElementById('d').value,
                    finalPrice: parseFloat(document.getElementById('p').value) || 0,
                    priceType: document.getElementById('t').value
                })
            }).then(r => {
                if(r.isConfirmed) db.collection("services").doc(id).update(r.value);
                else if(r.isDenied) {
                    Swal.fire({
                        title: 'هل أنت متأكد؟',
                        text: "سيتم حذف هذه الخدمة نهائياً",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#ff003c',
                        confirmButtonText: 'نعم، احذفها'
                    }).then(del => {
                        if(del.isConfirmed) db.collection("services").doc(id).delete();
                    });
                }
            });
        }

        function loadUsers() {
            db.collection("users").onSnapshot(snap => {
                const body = document.getElementById('users-rows'); body.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    body.innerHTML += `
                        <tr>
                            <td><b>${u.username}</b><br><span class="id-txt">${doc.id}</span></td>
                            <td style="color:var(--p); font-weight:bold">${(u.balance || 0).toFixed(2)} د.ل</td>
                            <td>${u.discount || 0}%</td>
                            <td>
                                <div style="display:flex; gap:5px">
                                    <button class="btn btn-p" style="padding:5px" onclick="manageBalance('${doc.id}', 'add')"><i class="fa fa-plus"></i></button>
                                    <button class="btn btn-danger" style="padding:5px" onclick="manageBalance('${doc.id}', 'sub')"><i class="fa fa-minus"></i></button>
                                    <button class="btn btn-outline" style="padding:5px" onclick="manageDiscount('${doc.id}')"><i class="fa fa-percent"></i></button>
                                </div>
                            </td>
                        </tr>`;
                });
            });
        }

        async function manageBalance(id, type) {
            const { value: amt } = await Swal.fire({ 
                title: type==='add'?'شحن رصيد':'خصم رصيد', 
                input: 'number', 
                inputAttributes: { step: '0.01' },
                background: '#0d0d0d',
                color: '#fff',
                confirmButtonColor: type==='add'?'#39ff14':'#ff003c',
                showCancelButton: true 
            });
            if(amt) {
                const ref = db.collection("users").doc(id);
                const cur = (await ref.get()).data().balance || 0;
                await ref.update({ balance: type === 'add' ? cur + parseFloat(amt) : cur - parseFloat(amt) });
            }
        }

        async function manageDiscount(id) {
            const { value: d } = await Swal.fire({ 
                title: 'نسبة الخصم %', 
                input: 'number', 
                inputAttributes: { step: '0.1' },
                background: '#0d0d0d',
                color: '#fff'
            });
            if(d !== null) await db.collection("users").doc(id).update({ discount: parseFloat(d) });
        }

        async function renameCat(old) {
            const { value: n } = await Swal.fire({ 
                title: 'اسم القسم الجديد', 
                input: 'text', 
                inputValue: old,
                background: '#0d0d0d',
                color: '#fff'
            });
            if(n && n !== old) {
                const b = db.batch();
                const snap = await db.collection("services").where("category", "==", old).get();
                snap.forEach(d => b.update(d.ref, { category: n }));
                await b.commit();
            }
        }

        function loadOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const b = document.getElementById('orders-rows'); b.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    b.innerHTML += `<tr><td><b>${o.serviceName}</b></td><td>${o.username}</td><td><code class="id-txt">${o.target}</code></td><td><span class="badge ${o.status==='مكتمل'?'bg-success':'bg-pending'}">${o.status||'انتظار'}</span></td><td><select onchange="db.collection('orders').doc('${doc.id}').update({status:this.value})" style="background:#000; color:#fff; border-radius:5px;"><option value="">تحديث</option><option value="مكتمل">مكتمل</option><option value="ملغي">ملغي</option></select></td></tr>`;
                });
            });
        }

        function loadFinance() {
            db.collection("deposits").where("status", "==", "قيد المراجعة").onSnapshot(snap => {
                const b = document.getElementById('finance-rows'); b.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    b.innerHTML += `<tr><td>${d.username}</td><td>${d.amount} د.ل</td><td>${d.senderPhone}</td><td><button class="btn btn-p" onclick="approveF('${doc.id}','${d.uid}',${d.amount})">موافقة</button></td></tr>`;
                });
            });
        }

        async function approveF(id, uid, amt) {
            const uRef = db.collection("users").doc(uid);
            await db.runTransaction(async (t) => {
                const u = await t.get(uRef);
                t.update(uRef, { balance: (u.data().balance || 0) + amt });
                t.update(db.collection("deposits").doc(id), { status: "مكتمل" });
            });
            Swal.fire("تم الشحن بنجاح");
        }

        window.onload = loadServices;
    </script>
</body>
</html>
