<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديث الخدمات | CD-CARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body style="background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 50px;">

    <h2>تحديث خدمات متجر CD-CARD 🚀</h2>
    <p>المزود: ms1.shop | الربح: 30% | نوع البيانات: Number</p>
    
    <button id="uploadBtn" style="padding: 15px 30px; background: #00ff88; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px;">
        ابدأ جلب وتحديث الخدمات الآن
    </button>

    <div id="status" style="margin-top: 25px; color: #8b949e; font-size: 14px; line-height: 1.6;"></div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = { 
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
        authDomain: "cd-card-87365.firebaseapp.com", 
        projectId: "cd-card-87365", 
        storageBucket: "cd-card-87365.firebasestorage.app", 
        messagingSenderId: "397926299412", 
        appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('uploadBtn').onclick = async () => {
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerHTML = "جاري الاتصال بالمزود عبر البروكسي...<br><small>تأكد من تفعيل CORS من الرابط المعتاد</small>";

        // بيانات المزود الخاصة بك التي أرسلتها
        const apiKey = "bc34ac73c612e956734842221d87df60";
        const apiUrl = `https://ms1.shop/api/v2?key=${apiKey}&action=services`;
        const proxy = "https://cors-anywhere.herokuapp.com/";

        try {
            const response = await fetch(proxy + apiUrl);
            const services = await response.json();
            
            if (!Array.isArray(services)) {
                throw new Error("استجابة المزود غير صحيحة، تأكد من مفتاح الـ API");
            }

            status.innerHTML = `تم جلب ${services.length} خدمة بنجاح.<br>جاري التخزين في Firebase كأرقام (Numbers)...`;

            let batch = db.batch();
            let count = 0;

            for (const s of services) {
                const serviceRef = db.collection('services').doc();
                
                // حساب السعر مع زيادة 30%
                const originalPrice = parseFloat(s.rate) || 0;
                const finalPrice = originalPrice * 1.30;

                batch.set(serviceRef, {
                    apiId: s.service,
                    name: s.name,
                    category: s.category,
                    // التخزين كـ Number حصراً لحل مشكلة السعر الحقيقي
                    min: Number(s.min) || 0,
                    max: Number(s.max) || 0,
                    originalPrice: Number(originalPrice.toFixed(4)),
                    finalPrice: Number(finalPrice.toFixed(4)),
                    type: s.type || "Default"
                });

                count++;

                // رفع الخدمات على مجموعات لتجنب ضغط الشبكة
                if (count % 400 === 0) {
                    await batch.commit();
                    batch = db.batch();
                    status.innerHTML = `تم رفع ${count} خدمة... يرجى الانتظار`;
                }
            }

            await batch.commit();
            status.innerHTML = `✅ تم بنجاح!<br>تم رفع ${count} خدمة وتحويل قيم السعر إلى Numbers حقيقية.`;
            btn.style.background = "#218bff";
            btn.innerText = "اكتمل التحديث";

        } catch (error) {
            console.error(error);
            status.innerHTML = "❌ خطأ في الجلب: " + error.message + "<br>تأكد من تفعيل <a href='https://cors-anywhere.herokuapp.com/corsdemo' target='_blank' style='color:#00ff88'>CORS Anywhere</a>";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
