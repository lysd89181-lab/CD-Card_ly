<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم CD-Card | المزامنة المحدثة</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0a0a0b; --card: #161618; --accent: #00ff88; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .admin-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); width: 90%; max-width: 400px; text-align: center; }
        .btn-sync { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 20px; font-size: 13px; color: #8e8e93; line-height: 1.5; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>إدارة محمد ستور ⚙️</h2>
    <p>تحديث الخدمات (ربح 30%)</p>
    <button class="btn-sync" onclick="syncFromProvider()">🔄 بدء التحديث الآن</button>
    <div id="status">جاهز للمزامنة...</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
      authDomain: "cd-card-87365.firebaseapp.com",
      projectId: "cd-card-87365",
      storageBucket: "cd-card-87365.firebasestorage.app",
      messagingSenderId: "397926299412",
      appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const API_KEY = "Bc34ac73c612e956734842221d87df60";
    // تم إضافة البروكسي هنا لحل مشكلة CORS
    const API_URL = "https://cors-anywhere.herokuapp.com/https://ms1.shop/api/v2";

    async function syncFromProvider() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "⏳ جاري محاولة الاتصال بالمزود...";

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: new URLSearchParams({ 'key': API_KEY, 'action': 'services' })
            });

            if (!response.ok) throw new Error('فشل الاتصال بالبروكسي');

            const services = await response.json();
            statusDiv.innerText = `✅ تم جلب ${services.length} خدمة. جاري الرفع لـ Firestore...`;

            // مسح القديم
            const oldDocs = await db.collection('services').get();
            const batch = db.batch();
            oldDocs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();

            // رفع الجديد
            for (let s of services) {
                await db.collection('services').add({
                    apiId: s.service,
                    name: s.name,
                    category: s.category,
                    originalPrice: parseFloat(s.rate),
                    finalPrice: (parseFloat(s.rate) * 1.3).toFixed(2),
                    min: s.min,
                    max: s.max,
                    type: s.type
                });
            }
            statusDiv.innerText = "✨ اكتمل التحديث بنجاح!";
            alert("تم تحديث المتجر!");

        } catch (error) {
            statusDiv.innerHTML = `<span style="color:red">❌ خطأ: لم يتم تفعيل البروكسي.</span><br>افتح الرابط التالي واضغط الزر الكبير ثم ارجع هنا:<br><a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" style="color:var(--accent)">اضغط هنا لتفعيل البروكسي</a>`;
        }
    }
</script>
</body>
</html>
