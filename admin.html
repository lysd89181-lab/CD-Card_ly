<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة CD-CARD الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --p: #39ff14; --bg: #000; --card: #0d0d0d; --border: #1a1a1a; --text: #fff; --danger: #ff003c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; line-height: 1.6; }

        /* Tabs Navigation */
        .tabs-nav { 
            position: sticky; top: 0; background: rgba(0,0,0,0.95); display: flex; 
            justify-content: space-around; padding: 15px; border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .tab-btn { color: #888; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .tab-btn.active { color: var(--p); border-bottom: 2px solid var(--p); padding-bottom: 5px; }

        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        /* Accordion & Services */
        .category-group { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); }
        .category-header { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .services-list { display: none; padding: 10px; border-top: 1px solid var(--border); }
        .services-list.open { display: block; }
        .service-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #1a1a1a; gap: 10px; }

        /* Tables */
        .table-wrap { overflow-x: auto; background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: right; color: var(--p); padding: 12px; border-bottom: 2px solid var(--border); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 13px; }

        /* Inputs & Buttons */
        .price-input { width: 70px; background: #000; border: 1px solid var(--p); color: var(--p); padding: 5px; border-radius: 5px; text-align: center; }
        .btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-p { background: var(--p); color: #000; }
        .btn-edit { background: rgba(57, 255, 20, 0.1); color: var(--p); border: 1px solid var(--p); }
        .btn-danger { background: rgba(255, 0, 60, 0.1); color: #ff003c; border: 1px solid #ff003c; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; }
        .st-pending { background: #444; }
        .st-done { background: var(--p); color: #000; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="tabs-nav">
        <div class="tab-btn active" onclick="switchTab('services', this)">الخدمات</div>
        <div class="tab-btn" onclick="switchTab('orders', this)">الطلبات</div>
        <div class="tab-btn" onclick="switchTab('users', this)">المستخدمين</div>
        <div class="tab-btn" onclick="switchTab('finance', this)">شحن الرصيد</div>
    </nav>

    <div class="container">
        
        <section id="tab-services" class="tab-content active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>إدارة الخدمات</h3>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-p" id="bulk-save-btn" style="display:none;" onclick="saveBulkPrices()">حفظ الأسعار</button>
                    <button class="btn btn-edit" onclick="toggleEditMode()">تعديل سريع للأسعار</button>
                    <button class="btn btn-p" onclick="addNewService()">+ إضافة خدمة</button>
                </div>
            </div>
            <div id="services-container"></div>
        </section>

        <section id="tab-orders" class="tab-content">
            <h3>طلبات الزبائن (الأحدث أولاً)</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>الخدمة</th><th>المستخدم</th><th>الهدف (ID/رقم)</th><th>الحالة</th><th>الإجراء</th></tr>
                    </thead>
                    <tbody id="orders-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-users" class="tab-content">
            <h3>قائمة المستخدمين و IDs</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>الاسم / ID المستخدم</th><th>الرصيد الحالي</th><th>الخصم %</th><th>التحكم</th></tr>
                    </thead>
                    <tbody id="users-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-finance" class="tab-content">
            <h3>طلبات شحن الرصيد المعلقة</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>المستخدم</th><th>المبلغ</th><th>رقم المحول</th><th>إجراء</th></tr>
                    </thead>
                    <tbody id="finance-list"></tbody>
                </table>
            </div>
        </section>

    </div>

    <script>
        // تكوين Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let editMode = false;

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            
            if(tabId === 'services') loadServices();
            if(tabId === 'orders') loadOrders();
            if(tabId === 'users') loadUsers();
            if(tabId === 'finance') loadFinance();
        }

        // --- وظائف الخدمات (Accordion + Edit) ---
        function loadServices() {
            db.collection("services").onSnapshot(snap => {
                const container = document.getElementById('services-container');
                container.innerHTML = "";
                const cats = {};
                snap.forEach(doc => {
                    const d = doc.data();
                    const c = d.category || "00- عام";
                    if(!cats[c]) cats[c] = [];
                    cats[c].push({id: doc.id, ...d});
                });

                Object.keys(cats).sort().forEach(catName => {
                    const group = document.createElement('div');
                    group.className = 'category-group';
                    const srvs = cats[catName].map((s, i) => `
                        <div class="service-row">
                            <span class="srv-num">${(i+1).toString().padStart(2,'0')}</span>
                            <span style="flex:1">${s.name}</span>
                            ${editMode ? `<input type="number" step="0.01" class="price-input" data-id="${s.id}" value="${s.finalPrice}">` : `<b style="color:var(--p)">${s.finalPrice} د.ل</b>`}
                            ${!editMode ? `<button class="btn btn-edit" onclick="editSingleSrv('${s.id}')">تعديل</button>` : ''}
                        </div>
                    `).join('');

                    group.innerHTML = `
                        <div class="category-header" onclick="this.nextElementSibling.classList.toggle('open')">
                            <span><i class="fa fa-folder-open"></i> ${catName}</span>
                            <div onclick="event.stopPropagation()">
                                <button class="btn btn-edit" style="font-size:9px" onclick="renameCat('${catName}')">تعديل القسم</button>
                            </div>
                        </div>
                        <div class="services-list">${srvs}</div>
                    `;
                    container.appendChild(group);
                });
            });
        }

        function toggleEditMode() {
            editMode = !editMode;
            document.getElementById('bulk-save-btn').style.display = editMode ? 'block' : 'none';
            loadServices();
        }

        async function saveBulkPrices() {
            const batch = db.batch();
            document.querySelectorAll('.price-input').forEach(inp => {
                batch.update(db.collection("services").doc(inp.dataset.id), { finalPrice: parseFloat(inp.value) });
            });
            await batch.commit();
            Swal.fire("تم الحفظ");
            toggleEditMode();
        }

        // --- وظائف الطلبات ---
        function loadOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('orders-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<tr>
                        <td><b>${o.serviceName}</b></td>
                        <td>${o.username}</td>
                        <td><code style="background:#111; padding:2px 5px; color:var(--p)">${o.target || 'N/A'}</code></td>
                        <td><span class="status-badge ${o.status==='مكتمل'?'st-done':'st-pending'}">${o.status || 'انتظار'}</span></td>
                        <td>
                            <select onchange="updateOrderStatus('${doc.id}', this.value)" class="btn" style="background:#111; color:#fff">
                                <option value="">تحديث</option>
                                <option value="قيد التنفيذ">تنفيذ</option>
                                <option value="مكتمل">مكتمل</option>
                                <option value="ملغي">ملغي</option>
                            </select>
                        </td>
                    </tr>`;
                });
            });
        }

        async function updateOrderStatus(id, s) { if(s) await db.collection("orders").doc(id).update({status: s}); }

        // --- وظائف المستخدمين ---
        function loadUsers() {
            db.collection("users").onSnapshot(snap => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    list.innerHTML += `<tr>
                        <td><b>${u.username}</b><br><small style="color:#555">ID: ${doc.id}</small></td>
                        <td style="color:var(--p)">${(u.balance || 0).toFixed(2)} د.ل</td>
                        <td>${u.discount || 0}%</td>
                        <td>
                            <button class="btn btn-edit" onclick="manageUser('${doc.id}')">إدارة</button>
                        </td>
                    </tr>`;
                });
            });
        }

        async function manageUser(uid) {
            const { value: type } = await Swal.fire({
                title: 'إدارة المستخدم',
                input: 'select',
                inputOptions: { 'bal': 'شحن/خصم رصيد', 'disc': 'تعديل نسبة الخصم' }
            });
            if(type === 'bal') {
                const { value: amt } = await Swal.fire({ title: 'المبلغ (+ للزيادة، - للخصم)', input: 'number' });
                if(amt) {
                    const ref = db.collection("users").doc(uid);
                    const cur = (await ref.get()).data().balance || 0;
                    await ref.update({ balance: cur + parseFloat(amt) });
                }
            } else if(type === 'disc') {
                const { value: ds } = await Swal.fire({ title: 'النسبة المئوية %', input: 'number' });
                if(ds !== null) await db.collection("users").doc(uid).update({ discount: parseFloat(ds) });
            }
        }

        // --- وظائف الشحن (Finance) ---
        function loadFinance() {
            db.collection("deposits").where("status", "==", "قيد المراجعة").onSnapshot(snap => {
                const list = document.getElementById('finance-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<tr>
                        <td>${d.username}</td>
                        <td style="color:var(--p)">${d.amount} د.ل</td>
                        <td>${d.senderPhone || '-'}</td>
                        <td>
                            <button class="btn btn-p" onclick="approveDeposit('${doc.id}','${d.uid}',${d.amount})">قبول</button>
                            <button class="btn btn-danger" onclick="db.collection('deposits').doc('${doc.id}').update({status:'ملغي'})">رفض</button>
                        </td>
                    </tr>`;
                });
            });
        }

        async function approveDeposit(id, uid, amt) {
            const userRef = db.collection("users").doc(uid);
            await db.runTransaction(async (t) => {
                const u = await t.get(userRef);
                t.update(userRef, { balance: (u.data().balance || 0) + amt });
                t.update(db.collection("deposits").doc(id), { status: "مكتمل" });
            });
            Swal.fire("تم شحن الرصيد بنجاح");
        }

        // إضافة خدمة جديدة
        function addNewService() {
            Swal.fire({
                title: 'خدمة جديدة',
                html: '<input id="n" class="swal2-input" placeholder="اسم الخدمة"><input id="c" class="swal2-input" placeholder="القسم (مثال: 01-ببجي)"><input id="p" type="number" class="swal2-input" placeholder="السعر">',
                preConfirm: () => ({
                    name: document.getElementById('n').value,
                    category: document.getElementById('c').value,
                    finalPrice: parseFloat(document.getElementById('p').value),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                })
            }).then(r => { if(r.value) db.collection("services").add(r.value); });
        }

        async function editSingleSrv(id) {
            const s = (await db.collection("services").doc(id).get()).data();
            Swal.fire({
                title: 'تعديل الخدمة',
                html: `<input id="n" class="swal2-input" value="${s.name}"><input id="p" type="number" class="swal2-input" value="${s.finalPrice}">`,
                showDenyButton: true, denyButtonText: 'حذف',
                preConfirm: () => ({ name: document.getElementById('n').value, finalPrice: parseFloat(document.getElementById('p').value) })
            }).then(r => {
                if(r.isConfirmed) db.collection("services").doc(id).update(r.value);
                else if(r.isDenied) db.collection("services").doc(id).delete();
            });
        }

        window.onload = () => loadServices();
    </script>
</body>
</html>
