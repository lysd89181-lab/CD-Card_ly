<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD | لوحة الإدارة الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* التنسيق البصري للوحة التحكم */
        :root {
            --bg-main: #050505;
            --card-bg: #0f0f0f;
            --neon-color: #39ff14;
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --danger: #ff4444;
        }

        body {
            font-family: 'Cairo', sans-serif; background: var(--bg-main); color: var(--text-main);
            margin: 0; display: flex; min-height: 100vh; overflow-x: hidden;
        }

        /*Sidebar*/
        .sidebar {
            width: 280px; background: var(--card-bg); border-left: 1px solid var(--border-color);
            position: fixed; height: 100%; right: 0; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .sidebar-header img { width: 90px; border-radius: 50%; border: 2px solid var(--neon-color); box-shadow: 0 0 15px var(--neon-color); }
        
        .nav-links { flex-grow: 1; padding: 25px 0; }
        .nav-links a {
            display: flex; align-items: center; padding: 18px 30px; color: var(--text-dim);
            text-decoration: none; transition: 0.3s; border-right: 4px solid transparent; cursor: pointer;
        }
        .nav-links a i { margin-left: 15px; font-size: 20px; width: 25px; }
        .nav-links a:hover, .nav-links a.active {
            color: var(--neon-color); background: rgba(57, 255, 20, 0.05); border-right-color: var(--neon-color);
        }

        /*Main Content*/
        .main-content { margin-right: 280px; width: calc(100% - 280px); padding: 50px; transition: 0.3s; }
        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 32px; color: var(--neon-color); margin-bottom: 40px; }

        /*Dashboard Grid*/
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .stat-card { background: var(--card-bg); padding: 35px; border-radius: 20px; border: 1px solid var(--border-color); text-align: center; }
        .stat-card h3 { font-size: 40px; margin: 15px 0; color: var(--neon-color); }
        .stat-card p { color: var(--text-dim); margin: 0; font-size: 14px; }

        /*Tables & Forms*/
        .data-box { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color); overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: #151515; padding: 20px; color: var(--neon-color); font-size: 15px; }
        td { padding: 18px; border-bottom: 1px solid #1a1a1a; font-size: 14px; color: #ddd; }
        
        .input-group { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        input, select {
            width: 100%; padding: 12px; margin-top: 10px; background: #000; border: 1px solid var(--border-color);
            color: #fff; border-radius: 10px; font-family: 'Cairo';
        }
        .btn-neon {
            background: transparent; color: var(--neon-color); border: 1px solid var(--neon-color);
            padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-neon:hover { background: var(--neon-color); color: #000; box-shadow: 0 0 20px var(--neon-color); }

        .order-input { width: 60px; text-align: center; color: var(--neon-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="cd.jpg" alt="Admin">
            <h4 style="margin: 15px 0 0;">محمد | CD-CARD</h4>
        </div>
        <div class="nav-links">
            <a onclick="showSec('dash')" id="n-dash" class="active"><i class="fa fa-home"></i> الرئيسية</a>
            <a onclick="showSec('services')" id="n-services"><i class="fa fa-list"></i> خدمات المتجر</a>
            <a onclick="showSec('api')" id="n-api"><i class="fa fa-cloud-download-alt"></i> جلب من المزود</a>
            <a onclick="showSec('users')" id="n-users"><i class="fa fa-users"></i> إدارة الزبائن</a>
            <a onclick="showSec('orders')" id="n-orders"><i class="fa fa-shopping-cart"></i> الطلبات</a>
        </div>
    </div>

    <div class="main-content">
        <div id="dash" class="section active">
            <h1>نظرة عامة</h1>
            <div class="stats-grid">
                <div class="stat-card"><p>إجمالي الزبائن</p><h3 id="st-users">0</h3></div>
                <div class="stat-card"><p>الطلبات النشطة</p><h3 id="st-orders">3</h3></div>
                <div class="stat-card"><p>الخدمات المعروضة</p><h3 id="st-serv">0</h3></div>
            </div>
        </div>

        <div id="services" class="section">
            <h1>إدارة خدماتي المعروضة</h1>
            <div class="data-box">
                <table>
                    <thead>
                        <tr>
                            <th>الترتيب</th>
                            <th>الاسم المعروض</th>
                            <th>السعر</th>
                            <th>تحديث</th>
                            <th>حذف</th>
                        </tr>
                    </thead>
                    <tbody id="my-services-list"></tbody>
                </table>
            </div>
        </div>

        <div id="api" class="section">
            <h1>الجلب من ms1.shop</h1>
            <div class="input-group">
                <button class="btn-neon" onclick="fetchAPI()">جلب القائمة المحدثة (حل CORS)</button>
                <input type="text" id="api-search" placeholder="ابحث في خدمات المزود..." style="margin-top: 15px;" onkeyup="filterAPI()">
            </div>
            <div class="data-box" style="max-height: 500px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>الخدمة</th>
                            <th>السعر</th>
                            <th>ترتيب الإضافة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="api-fetch-list"></tbody>
                </table>
            </div>
        </div>
        
        </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const SMM_KEY = "958c5695446fccb28ab7b8090d5e271a";

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById('n-' + id).classList.add('active');
        }

        // 1. Fetching logic with CORS Proxy
        async function fetchAPI() {
            const list = document.getElementById('api-fetch-list');
            list.innerHTML = "<tr><td colspan='5' style='text-align:center'>جاري الجلب عبر البروكسي...</td></tr>";
            
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://ms1.shop/api/v2?key=${SMM_KEY}&action=services`);

            try {
                const res = await fetch(proxy + target);
                const data = await res.json();
                const services = JSON.parse(data.contents);
                
                list.innerHTML = "";
                services.forEach(s => {
                    list.innerHTML += `
                        <tr class="api-row">
                            <td>${s.service}</td>
                            <td>${s.name}</td>
                            <td>${s.rate}</td>
                            <td><input type="number" id="ord-${s.service}" value="1" class="order-input"></td>
                            <td><button class="btn-neon" onclick="addService('${s.service}','${s.category}','${s.name}','${s.rate}')">إضافة</button></td>
                        </tr>
                    `;
                });
            } catch(e) { alert("خطأ في الاتصال بالمزود"); }
        }

        async function addService(id, cat, name, rate) {
            const orderNum = parseInt(document.getElementById('ord-'+id).value);
            await db.collection("services").doc(id).set({
                serviceId: id, category: cat, name: name, rate: rate, orderNum: orderNum
            });
            alert("تمت الإضافة للمتجر!");
        }

        // 2. Real-time Store Sync
        function syncStore() {
            db.collection("services").orderBy("orderNum", "asc").onSnapshot(snap => {
                document.getElementById('st-serv').innerText = snap.size;
                const list = document.getElementById('my-services-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const s = doc.data();
                    list.innerHTML += `
                        <tr>
                            <td>${s.orderNum}</td>
                            <td>${s.name}</td>
                            <td>${s.rate}</td>
                            <td><button class="btn-neon" onclick="updateServ('${doc.id}')">حفظ</button></td>
                            <td><button onclick="delServ('${doc.id}')" style="color:red; background:none; border:none; cursor:pointer;">حذف</button></td>
                        </tr>
                    `;
                });
            });

            db.collection("users").onSnapshot(snap => {
                document.getElementById('st-users').innerText = snap.size;
            });
        }

        window.onload = syncStore;
    </script>
</body>
</html>
