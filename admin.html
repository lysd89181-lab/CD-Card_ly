<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم CD-CARD | المزامنة الذكية</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0a0a0b; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #161618; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; border: 1px solid #00ff88; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; }
        button { background: #00ff88; color: #000; padding: 15px 30px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; cursor: pointer; width: 100%; margin-top: 10px; }
        .status { margin-top: 20px; color: #8e8e93; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>إدارة خدمات CD-CARD</h2>
        <p>تحديث المتجر تلقائياً من المزود</p>
        
        <label>نسبة الربح (مثلاً 1.3 تعني 30%):</label>
        <input type="number" id="profitMargin" value="1.3" step="0.1">
        
        <button onclick="syncFromProvider()">🔄 تحديث وجلب الخدمات الآن</button>
        
        <div id="status" class="status">جاهز للمزامنة...</div>
    </div>

<script>
    // استخدم نفس إعدادات Firebase الخاصة بمتجرك
    const firebaseConfig = {
      apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
      authDomain: "cd-card-87365.firebaseapp.com",
      projectId: "cd-card-87365",
      storageBucket: "cd-card-87365.firebasestorage.app",
      messagingSenderId: "397926299412",
      appId: "1:397926299412:web:efbe9ae9aae29df368f401"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const API_KEY = "Bc34ac73c612e956734842221d87df60";
    const API_URL = "https://ms1.shop/api/v2";

    async function syncFromProvider() {
        const statusDiv = document.getElementById('status');
        const profit = parseFloat(document.getElementById('profitMargin').value);
        
        statusDiv.innerText = "⏳ جاري جلب البيانات من المزود...";

        try {
            // ملاحظة: قد تحتاج لبروكسي لتجاوز CORS في المتصفح
            const response = await fetch(API_URL, {
                method: 'POST',
                body: new URLSearchParams({
                    'key': API_KEY,
                    'action': 'services'
                })
            });

            const services = await response.json();
            statusDiv.innerText = `✅ تم جلب ${services.length} خدمة. جاري التحديث في Firestore...`;

            // 1. مسح الخدمات القديمة لتجنب التكرار
            const oldDocs = await db.collection('services').get();
            const batch = db.batch();
            oldDocs.forEach(doc => batch.delete(doc.ref));
            await batch.commit();

            // 2. إضافة الخدمات الجديدة مع حساب الربح
            let count = 0;
            for (let s of services) {
                await db.collection('services').add({
                    apiId: s.service,
                    name: s.name,
                    category: s.category,
                    originalPrice: parseFloat(s.rate),
                    finalPrice: (parseFloat(s.rate) * profit).toFixed(2),
                    min: s.min,
                    max: s.max,
                    type: s.type,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                count++;
                if(count % 10 === 0) statusDiv.innerText = `⏳ جاري رفع الخدمات: ${count}...`;
            }

            statusDiv.style.color = "#00ff88";
            statusDiv.innerText = "✨ اكتمل التحديث! متجرك الآن يطابق أسعار المزود + ربحك.";
            alert("تم تحديث كافة الخدمات بنجاح!");

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#ff4444";
            statusDiv.innerText = "❌ حدث خطأ في الاتصال. تأكد من مفتاح API أو إعدادات CORS.";
        }
    }
</script>
</body>
</html>
