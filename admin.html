<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD Admin | إدارة النظام الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #050505;
            --card-bg: #0f0f0f;
            --border: #1a1a1a;
            --text-gray: #888;
            --gold: #ffcc00;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #fff;
            margin: 0; display: flex; min-height: 100vh; overflow-x: hidden;
        }

        /* Sidebar Style */
        .sidebar {
            width: 280px; background: var(--card-bg); border-left: 1px solid var(--border);
            height: 100vh; position: fixed; right: 0; top: 0; z-index: 100;
            display: flex; flex-direction: column;
        }
        .brand { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .brand img { width: 80px; border-radius: 50%; border: 2px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
        
        .nav-list { flex-grow: 1; padding: 20px 0; }
        .nav-item {
            display: flex; align-items: center; padding: 15px 25px; color: var(--text-gray);
            text-decoration: none; cursor: pointer; border-right: 4px solid transparent;
        }
        .nav-item i { margin-left: 15px; font-size: 20px; width: 25px; }
        .nav-item:hover, .nav-item.active {
            color: var(--neon-green); background: rgba(57, 255, 20, 0.05);
            border-right-color: var(--neon-green);
        }

        /* Main Content */
        .main { margin-right: 280px; width: calc(100% - 280px); padding: 40px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Stats */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .s-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border);
            text-align: center; position: relative;
        }
        .s-card h2 { font-size: 35px; color: var(--neon-green); margin: 10px 0; }
        .s-card i { position: absolute; left: 15px; top: 15px; opacity: 0.1; font-size: 30px; }

        /* Tables & UI */
        .box { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); padding: 25px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: right; padding: 15px; color: var(--neon-green); border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid #151515; font-size: 14px; }
        
        .btn {
            background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; font-weight: bold;
        }
        .btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
        .btn-del { border-color: #ff4444; color: #ff4444; }
        .btn-del:hover { background: #ff4444; color: #fff; }

        input, select, textarea {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border);
            color: #fff; border-radius: 10px; margin-top: 5px; font-family: 'Cairo';
        }

        /* Status Badges */
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 11px; }
        .badge-green { background: rgba(57,255,20,0.1); color: var(--neon-green); }

        @media (max-width: 900px) {
            .sidebar { width: 70px; }
            .sidebar span, .brand h3 { display: none; }
            .main { margin-right: 70px; width: calc(100% - 70px); padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <img src="cd.jpg" alt="Logo">
            <h3 style="color: var(--neon-green); font-size: 18px; margin-top: 10px;">CD-CARD ADMIN</h3>
        </div>
        <div class="nav-list">
            <a onclick="move('dash')" id="m-dash" class="nav-item active"><i class="fa fa-th-large"></i> <span>الرئيسية</span></a>
            <a onclick="move('store')" id="m-store" class="nav-item"><i class="fa fa-shopping-bag"></i> <span>خدمات المتجر</span></a>
            <a onclick="move('fetch')" id="m-fetch" class="nav-item"><i class="fa fa-download"></i> <span>جلب من المزود</span></a>
            <a onclick="move('users')" id="m-users" class="nav-item"><i class="fa fa-users"></i> <span>المستخدمين</span></a>
            <a onclick="move('orders')" id="m-orders" class="nav-item"><i class="fa fa-receipt"></i> <span>الطلبات</span></a>
        </div>
    </div>

    <div class="main">
        <div id="dash" class="page active">
            <div class="header-top">
                <h1>لوحة التحكم</h1>
                <div id="clock" style="color: var(--text-gray);">...</div>
            </div>
            <div class="grid-stats">
                <div class="s-card"><i>ID</i><small>إجمالي الزبائن</small><h2 id="st-u">0</h2></div>
                <div class="s-card"><i>ID</i><small>خدمات معروضة</small><h2 id="st-s">0</h2></div>
                <div class="s-card"><i>ID</i><small>طلبات اليوم</small><h2 id="st-o">0</h2></div>
            </div>
        </div>

        <div id="store" class="page">
            <h1>إدارة خدمات المتجر</h1>
            <div class="box">
                <table>
                    <thead>
                        <tr>
                            <th>الترتيب</th>
                            <th>اسم الخدمة</th>
                            <th>السعر</th>
                            <th>الفئة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="store-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="fetch" class="page">
            <h1>الجلب التلقائي (ms1.shop)</h1>
            <div class="box">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn" onclick="fetchFromSMM()">تحديث قائمة المزود (CORS Fix)</button>
                    <input type="text" id="api-search" placeholder="بحث في خدمات المزود..." onkeyup="searchAPI()">
                </div>
                <div style="max-height: 500px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>الخدمة</th>
                                <th>سعر المزود</th>
                                <th>إضافة للمتجر</th>
                            </tr>
                        </thead>
                        <tbody id="api-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="users" class="page">
            <h1>إدارة المستخدمين</h1>
            <div class="box" id="users-list"></div>
        </div>
    </div>

    <script>
        // 1. Firebase Config (بياناتك الصحيحة)
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            databaseURL: "https://cd-card-87365-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cd-card-87365",
            storageBucket: "cd-card-87365.firebasestorage.app",
            messagingSenderId: "397926299412",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const rtdb = firebase.database();
        const SMM_KEY = "958c5695446fccb28ab7b8090d5e271a";

        // 2. Navigation Logic
        function move(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('m-'+id).classList.add('active');
        }

        // 3. Fetch from API with CORS Proxy
        async function fetchFromSMM() {
            const tbody = document.getElementById('api-tbody');
            tbody.innerHTML = "<tr><td colspan='4' align='center'>جاري الاتصال بالمزود...</td></tr>";
            
            const proxy = "https://api.allorigins.win/get?url=";
            const apiUrl = encodeURIComponent(`https://ms1.shop/api/v2?key=${SMM_KEY}&action=services`);

            try {
                const response = await fetch(proxy + apiUrl);
                const json = await response.json();
                const services = JSON.parse(json.contents);
                
                tbody.innerHTML = "";
                services.forEach(s => {
                    tbody.innerHTML += `
                        <tr class="api-row">
                            <td>${s.service}</td>
                            <td style="font-size:12px"><b>${s.name}</b><br><span style="color:var(--text-gray)">${s.category}</span></td>
                            <td style="color:var(--neon-green)">${s.rate}</td>
                            <td><button class="btn" onclick="addToMyStore('${s.service}','${s.name}','${s.category}','${s.rate}')">إضافة</button></td>
                        </tr>
                    `;
                });
            } catch (e) {
                alert("فشل الجلب. تأكد من مفتاح الـ API الخاص بك.");
            }
        }

        // 4. Add Service to Firestore
        async function addToMyStore(id, name, cat, rate) {
            const myRate = prompt("أدخل السعر الذي سيظهر للزبون (لكل 1000):", rate);
            if(!myRate) return;

            try {
                await db.collection("services").doc(id).set({
                    serviceId: id,
                    name: name,
                    category: cat,
                    rate: parseFloat(myRate),
                    originalRate: rate,
                    orderNum: 1,
                    desc: "خدمة سريعة وعالية الجودة"
                });
                alert("تمت الإضافة بنجاح!");
            } catch(e) { console.error(e); }
        }

        // 5. Sync Data
        function sync() {
            // Sync Stats
            db.collection("users").onSnapshot(s => document.getElementById('st-u').innerText = s.size);
            db.collection("services").onSnapshot(s => {
                document.getElementById('st-s').innerText = s.size;
                const tbody = document.getElementById('store-tbody');
                tbody.innerHTML = "";
                s.forEach(doc => {
                    const data = doc.data();
                    tbody.innerHTML += `
                        <tr>
                            <td>${data.orderNum}</td>
                            <td>${data.name}</td>
                            <td>${data.rate} LYD</td>
                            <td><span class="badge badge-green">${data.category}</span></td>
                            <td><button class="btn btn-del" onclick="deleteService('${doc.id}')">حذف</button></td>
                        </tr>
                    `;
                });
            });
        }

        async function deleteService(id) {
            if(confirm("هل أنت متأكد من حذف هذه الخدمة؟")) {
                await db.collection("services").doc(id).delete();
            }
        }

        // Search logic
        function searchAPI() {
            let val = document.getElementById('api-search').value.toLowerCase();
            document.querySelectorAll('.api-row').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        }

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-LY');
        }, 1000);

        window.onload = sync;
    </script>
</body>
</html>
