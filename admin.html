<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD PRO | الإدارة الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --p: #39ff14; --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
            --text: #ffffff; --muted: #888888; --danger: #ff003c; --accent: #0088ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* Navigation */
        .admin-nav {
            position: sticky; top: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); z-index: 2000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; gap: 5px; padding: 12px; overflow-x: auto;
        }
        .nav-link {
            padding: 10px 15px; color: var(--muted); cursor: pointer; font-weight: 700;
            font-size: 12px; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .nav-link.active { color: var(--p); background: rgba(57, 255, 20, 0.1); }

        .container { max-width: 1100px; margin: 25px auto; padding: 0 15px; }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Page Head */
        .page-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .page-head h2 { font-weight: 900; font-size: 22px; color: var(--p); }

        /* Buttons */
        .btn {
            padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 700; font-size: 12px; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-p { background: var(--p); color: #000; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--p); color: var(--p); }
        .btn-danger { background: rgba(255, 0, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* Accordion & Services */
        .cat-box { background: var(--card); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; }
        .cat-top { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .cat-info { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
        .order-btns { display: flex; flex-direction: column; gap: 2px; }
        .order-btns button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
        .order-btns button:hover { color: var(--p); }
        
        .cat-body { display: none; padding: 10px; background: #080808; }
        .cat-body.open { display: block; }

        .srv-row { display: flex; flex-direction: column; padding: 15px; border-bottom: 1px solid #151515; gap: 8px; }
        .srv-main { display: flex; align-items: center; gap: 15px; }
        .srv-info { flex: 1; }
        .srv-price-badge { background: #1a1a1a; padding: 4px 10px; border-radius: 6px; border: 1px solid #333; }
        .srv-price-badge b { color: var(--p); font-size: 14px; }

        /* API Import Styling */
        .api-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .api-input-group { margin-bottom: 15px; }
        .api-input-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--muted); }
        .api-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }
        
        /* Table Styles */
        .data-table-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; text-align: right; }
        th { padding: 15px; background: #111; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid #111; font-size: 13px; }

        .id-txt { font-family: monospace; color: var(--accent); background: #111; padding: 2px 5px; border-radius: 4px; font-size: 11px; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .bg-pending { background: rgba(255,180,0,0.1); color: #ffb400; }
        .bg-success { background: rgba(57,255,20,0.1); color: var(--p); }

        .swal-custom-field { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; border-radius: 10px; padding: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="admin-nav">
        <div class="nav-link active" onclick="showView('services', this)"><i class="fa fa-cubes"></i> الخدمات</div>
        <div class="nav-link" onclick="showView('api', this)"><i class="fa fa-plug"></i> جلب الخدمات</div>
        <div class="nav-link" onclick="showView('orders', this)"><i class="fa fa-shopping-cart"></i> الطلبات</div>
        <div class="nav-link" onclick="showView('users', this)"><i class="fa fa-users"></i> المستخدمين</div>
        <div class="nav-link" onclick="showView('finance', this)"><i class="fa fa-wallet"></i> الشحن</div>
    </nav>

    <div class="container">

        <section id="view-services" class="view-section active">
            <div class="page-head">
                <h2>إدارة المتجر</h2>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-save" id="save-bulk-btn" style="display:none" onclick="saveBulk()">حفظ الأسعار</button>
                    <button class="btn btn-outline" onclick="toggleBulk()">تعديل الأسعار</button>
                    <button class="btn btn-p" onclick="addSrv()">+ خدمة يدوية</button>
                </div>
            </div>
            <div id="services-list"></div>
        </section>

        <section id="view-api" class="view-section">
            <div class="page-head"><h2>جلب الخدمات (API)</h2></div>
            <div class="api-card">
                <div class="api-input-group">
                    <label>رابط المزود (URL)</label>
                    <input type="text" id="api-url" class="api-input" value="https://libyaplus1.com/api/v2">
                </div>
                <div class="api-input-group">
                    <label>مفتاح الـ API (Key)</label>
                    <input type="text" id="api-key" class="api-input" value="958c5695446fccb28ab7b8090d5e271a">
                </div>
                <div class="api-input-group">
                    <label>نسبة الربح الافتراضية (%)</label>
                    <input type="number" id="profit-percent" class="api-input" value="10">
                </div>
                <button class="btn btn-p" style="width:100%; justify-content:center" onclick="fetchExternalServices()">
                    <i class="fa fa-sync"></i> جلب جميع الخدمات من المزود
                </button>
            </div>
            <div id="external-services-container"></div>
        </section>

        <section id="view-orders" class="view-section">
            <div class="page-head"><h2>سجل الطلبات</h2></div>
            <div class="data-table-card"><table><thead><tr><th>الخدمة</th><th>المستخدم</th><th>الهدف</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="orders-rows"></tbody></table></div>
        </section>

        <section id="view-users" class="view-section">
            <div class="page-head"><h2>إدارة الأعضاء</h2></div>
            <div class="data-table-card"><table><thead><tr><th>الاسم / ID</th><th>الرصيد</th><th>الخصم %</th><th>إدارة مالية</th></tr></thead><tbody id="users-rows"></tbody></table></div>
        </section>

        <section id="view-finance" class="view-section">
            <div class="page-head"><h2>طلبات الشحن المعلقة</h2></div>
            <div class="data-table-card"><table><thead><tr><th>المستخدم</th><th>المبلغ</th><th>الهاتف</th><th>إجراء</th></tr></thead><tbody id="finance-rows"></tbody></table></div>
        </section>

    </div>

    <script>
        // تكوين Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let bulkMode = false;

        function showView(v, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            el.classList.add('active');
            if(v==='services') loadServices();
            if(v==='orders') loadOrders();
            if(v==='users') loadUsers();
            if(v==='finance') loadFinance();
        }

        // جلب الخدمات من السيرفر الخارجي
        async function fetchExternalServices() {
            const url = document.getElementById('api-url').value;
            const key = document.getElementById('api-key').value;
            
            Swal.fire({ title: 'جاري التحميل...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(`${url}?key=${key}&action=services`);
                const services = await response.json();
                displayExternalServices(services);
                Swal.close();
            } catch (error) {
                Swal.fire('خطأ', 'تعذر الاتصال بالمزود، تأكد من الرابط والمفتاح', 'error');
            }
        }

        function displayExternalServices(services) {
            const container = document.getElementById('external-services-container');
            container.innerHTML = `<h3 style="margin:20px 0; color:var(--p)">الخدمات المتاحة (${services.length})</h3>`;
            
            const table = document.createElement('div');
            table.className = "data-table-card";
            let rows = services.map(s => `
                <tr>
                    <td><small class="id-txt">${s.service}</small></td>
                    <td><b>${s.name}</b><br><small style="color:#666">${s.category}</small></td>
                    <td>${s.rate} د.ل</td>
                    <td><button class="btn btn-p" onclick="importSingleService('${s.service}', '${s.name.replace(/'/g, "")}', '${s.category.replace(/'/g, "")}', ${s.rate})">إضافة</button></td>
                </tr>
            `).join('');
            
            table.innerHTML = `<table><thead><tr><th>ID</th><th>الخدمة</th><th>السعر الأصلي</th><th>إجراء</th></tr></thead><tbody>${rows}</tbody></table>`;
            container.appendChild(table);
        }

        async function importSingleService(id, name, cat, rate) {
            const profit = parseFloat(document.getElementById('profit-percent').value) || 0;
            const finalPrice = (rate + (rate * (profit / 100))).toFixed(2);

            await db.collection("services").add({
                externalId: id,
                name: name,
                category: cat,
                finalPrice: parseFloat(finalPrice),
                originalPrice: rate,
                priceType: "1000",
                order: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            Swal.fire({ title: 'تمت الإضافة', icon: 'success', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
        }

        // إدارة الخدمات وترتيب الأقسام
        function loadServices() {
            db.collection("services").onSnapshot(snap => {
                const list = document.getElementById('services-list');
                list.innerHTML = "";
                const cats = {};
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const c = d.category || "عام";
                    if(!cats[c]) cats[c] = { name: c, order: d.catOrder || 0, items: [] };
                    cats[c].items.push({id: doc.id, ...d});
                });

                // ترتيب الأقسام بناءً على الحقل catOrder
                const sortedCats = Object.values(cats).sort((a, b) => a.order - b.order);

                sortedCats.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = `cat-box`;
                    const items = cat.items.map(s => `
                        <div class="srv-row">
                            <div class="srv-main">
                                <div class="srv-info"><b>${s.name}</b></div>
                                <div class="srv-price-badge">
                                    ${bulkMode ? `<input type="number" step="0.01" class="bulk-input srv-input" data-id="${s.id}" value="${s.finalPrice}" style="width:70px; background:#000; color:var(--p); border:1px solid #333">` : `<b>${s.finalPrice} د.ل</b>`}
                                </div>
                                <button class="btn btn-outline" style="padding:5px" onclick="editSrv('${s.id}')"><i class="fa fa-pen"></i></button>
                            </div>
                        </div>
                    `).join('');

                    card.innerHTML = `
                        <div class="cat-top">
                            <div class="order-btns">
                                <button onclick="moveCat('${cat.name}', -1)"><i class="fa fa-chevron-up"></i></button>
                                <button onclick="moveCat('${cat.name}', 1)"><i class="fa fa-chevron-down"></i></button>
                            </div>
                            <div class="cat-info" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">
                                <b><i class="fa fa-folder-open" style="margin-left:8px; color:var(--p)"></i> ${cat.name}</b>
                            </div>
                            <button class="btn btn-outline" style="font-size:10px" onclick="renameCat('${cat.name}')">تسمية</button>
                        </div>
                        <div class="cat-body">${items}</div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        async function moveCat(catName, direction) {
            const snap = await db.collection("services").where("category", "==", catName).get();
            const batch = db.batch();
            snap.forEach(doc => {
                const currentOrder = doc.data().catOrder || 0;
                batch.update(doc.ref, { catOrder: currentOrder + direction });
            });
            await batch.commit();
        }

        function toggleBulk() {
            bulkMode = !bulkMode;
            document.getElementById('save-bulk-btn').style.display = bulkMode ? 'block' : 'none';
            loadServices();
        }

        async function saveBulk() {
            const batch = db.batch();
            document.querySelectorAll('.srv-input').forEach(i => {
                batch.update(db.collection("services").doc(i.dataset.id), { finalPrice: parseFloat(i.value) });
            });
            await batch.commit();
            toggleBulk();
            Swal.fire("تم الحفظ بنجاح");
        }

        // الوظائف الأساسية المتبقية
        async function addSrv() {
            const { value: formValues } = await Swal.fire({
                title: 'إضافة خدمة يدوية',
                background: '#050505', color: '#fff',
                html: `
                    <input id="swal-n" class="swal-custom-field" placeholder="اسم الخدمة">
                    <input id="swal-c" class="swal-custom-field" placeholder="القسم">
                    <input id="swal-p" type="number" class="swal-custom-field" placeholder="السعر">
                `,
                preConfirm: () => [
                    document.getElementById('swal-n').value,
                    document.getElementById('swal-c').value,
                    document.getElementById('swal-p').value
                ]
            });
            if (formValues) {
                db.collection("services").add({
                    name: formValues[0],
                    category: formValues[1],
                    finalPrice: parseFloat(formValues[2]),
                    priceType: "fixed",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        async function editSrv(id) {
            const s = (await db.collection("services").doc(id).get()).data();
            Swal.fire({
                title: 'تعديل',
                background: '#0d0d0d', color: '#fff',
                html: `<input id="en" class="swal-custom-field" value="${s.name}"><input id="ep" type="number" class="swal-custom-field" value="${s.finalPrice}">`,
                showDenyButton: true, denyButtonText: 'حذف',
                confirmButtonText: 'حفظ'
            }).then(r => {
                if(r.isConfirmed) db.collection("services").doc(id).update({ name: document.getElementById('en').value, finalPrice: parseFloat(document.getElementById('ep').value)});
                else if(r.isDenied) db.collection("services").doc(id).delete();
            });
        }

        function loadOrders() {
            db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
                const b = document.getElementById('orders-rows'); b.innerHTML = "";
                snap.forEach(doc => {
                    const o = doc.data();
                    b.innerHTML += `<tr><td><b>${o.serviceName}</b></td><td>${o.username}</td><td><code class="id-txt">${o.target}</code></td><td><span class="badge ${o.status==='مكتمل'?'bg-success':'bg-pending'}">${o.status||'انتظار'}</span></td><td><select onchange="db.collection('orders').doc('${doc.id}').update({status:this.value})" style="background:#000; color:#fff;"><option value="">تحديث</option><option value="مكتمل">مكتمل</option><option value="ملغي">ملغي</option></select></td></tr>`;
                });
            });
        }

        function loadUsers() {
            db.collection("users").onSnapshot(snap => {
                const b = document.getElementById('users-rows'); b.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    b.innerHTML += `<tr><td><b>${u.username}</b></td><td style="color:var(--p)">${(u.balance || 0).toFixed(2)} د.ل</td><td>${u.discount || 0}%</td><td><button onclick="manageBalance('${doc.id}', 'add')" class="btn btn-p" style="padding:5px">+</button></td></tr>`;
                });
            });
        }

        async function manageBalance(id, type) {
            const { value: amt } = await Swal.fire({ title: 'شحن رصيد', input: 'number', background: '#0d0d0d', color: '#fff' });
            if(amt) {
                const ref = db.collection("users").doc(id);
                const cur = (await ref.get()).data().balance || 0;
                await ref.update({ balance: cur + parseFloat(amt) });
            }
        }

        function loadFinance() {
            db.collection("deposits").where("status", "==", "قيد المراجعة").onSnapshot(snap => {
                const b = document.getElementById('finance-rows'); b.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    b.innerHTML += `<tr><td>${d.username}</td><td>${d.amount} د.ل</td><td>${d.senderPhone}</td><td><button class="btn btn-p" onclick="approveF('${doc.id}','${d.uid}',${d.amount})">موافقة</button></td></tr>`;
                });
            });
        }

        async function approveF(id, uid, amt) {
            const uRef = db.collection("users").doc(uid);
            await db.runTransaction(async (t) => {
                const u = await t.get(uRef);
                t.update(uRef, { balance: (u.data().balance || 0) + amt });
                t.update(db.collection("deposits").doc(id), { status: "مكتمل" });
            });
            Swal.fire("تم الشحن");
        }

        window.onload = loadServices;
    </script>
</body>
</html>
