<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --profit-margin: 1.3; /* نسبة الربح 30% */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }

        /* Top Header */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        .balance-card {
            background: rgba(59, 130, 246, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .action-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn i { font-size: 20px; margin-bottom: 8px; display: block; }
        .action-btn:hover { background: var(--accent-blue); }

        /* Services List */
        .section-title { padding: 15px; font-size: 1.2rem; }
        
        .service-item {
            background: var(--card-bg);
            margin: 10px 15px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .price-tag { color: #4ade80; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
        }

        .nav-item { color: #64748b; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }

        /* Modal for Manual Add */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            z-index: 100;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        input, select, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .btn-main {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div><strong>testpanel.net</strong> <i class="fas fa-edit"></i></div>
        <div class="balance-card">
            <span>$0.00</span>
            <i class="fas fa-plus-circle"></i>
        </div>
    </div>

    <div class="quick-actions">
        <div class="action-btn" onclick="openModal()">
            <i class="fas fa-plus" style="color: #3b82f6;"></i>
            <span>إضافة خدمة</span>
        </div>
        <div class="action-btn" onclick="fetchServices()">
            <i class="fas fa-file-import" style="color: #60a5fa;"></i>
            <span>جلب API</span>
        </div>
        <div class="action-btn">
            <i class="fas fa-fire" style="color: #fb923c;"></i>
            <span>المزودين</span>
        </div>
    </div>

    <div class="section-title">إدارة الخدمات</div>
    
    <div id="services-container">
        <p style="text-align: center; color: #64748b;">انقر على "جلب API" لتحديث الخدمات</p>
    </div>

    <div id="manualModal" class="modal">
        <h3>إضافة خدمة يدوية</h3>
        <input type="text" id="mName" placeholder="اسم الخدمة">
        <select id="mCat">
            <option>PUBG Mobile</option>
            <option>TikTok</option>
            <option>Free Fire</option>
        </select>
        <input type="number" id="mPrice" placeholder="السعر الأساسي بالدولار">
        <button class="btn-main" onclick="addManualService()">حفظ الخدمة</button>
        <button onclick="closeModal()" style="background:none; border:none; color:gray; margin-top:10px;">إلغاء</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><i class="fas fa-users"></i><div>Users</div></div>
        <div class="nav-item"><i class="fas fa-shopping-cart"></i><div>Orders</div></div>
        <div class="nav-item active"><i class="fas fa-layer-group"></i><div>Services</div></div>
        <div class="nav-item"><i class="fas fa-headset"></i><div>Support</div></div>
        <div class="nav-item"><i class="fas fa-bars"></i><div>Menu</div></div>
    </div>

    <script>
        const API_URL = 'https://ms1.shop/api/v2';
        const API_KEY = '17867535f955dc9d0532a0aefc809f51';
        const PROFIT = 1.3; // 30% زيادة

        async function fetchServices() {
            const container = document.getElementById('services-container');
            container.innerHTML = '<p style="text-align: center;">جاري التحميل...</p>';

            try {
                // ملاحظة: قد تحتاج إلى CORS Proxy إذا كنت تجرب الكود من المتصفح مباشرة
                const response = await fetch(`${API_URL}?key=${API_KEY}&action=services`);
                const services = await response.json();

                container.innerHTML = '';
                services.slice(0, 15).forEach(service => { // عرض أول 15 للتجربة
                    const finalPrice = (parseFloat(service.rate) * PROFIT).toFixed(2);
                    
                    const div = document.createElement('div');
                    div.className = 'service-item';
                    div.innerHTML = `
                        <div>
                            <strong>${service.name}</strong><br>
                            <small style="color:gray;">ID: ${service.service} | ${service.category}</small>
                        </div>
                        <div class="price-tag">$${finalPrice}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: red;">خطأ في الاتصال بالـ API</p>';
            }
        }

        function openModal() { document.getElementById('manualModal').style.display = 'block'; }
        function closeModal() { document.getElementById('manualModal').style.display = 'none'; }

        function addManualService() {
            const name = document.getElementById('mName').value;
            const price = document.getElementById('mPrice').value;
            const finalPrice = (parseFloat(price) * PROFIT).toFixed(2);

            const container = document.getElementById('services-container');
            const div = document.createElement('div');
            div.className = 'service-item';
            div.style.border = "1px solid #4ade80"; // تمييز اليدوي
            div.innerHTML = `
                <div>
                    <strong>${name} (يدوي)</strong><br>
                    <small style="color:gray;">خدمة مضافة يدوياً</small>
                </div>
                <div class="price-tag">$${finalPrice}</div>
            `;
            container.prepend(div);
            closeModal();
        }
    </script>
</body>
</html>
