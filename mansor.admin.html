<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CD-Card | لوحة التحكم الكاملة</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #00ff88; 
            --blue: #00bdff;
            --danger: #ff4d4d;
            --border: rgba(255, 255, 255, 0.1); 
            --text-muted: #8b949e;
        }

        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; direction: rtl; padding-bottom: 80px; }
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { margin: 0; color: var(--accent); font-size: 24px; }

        .admin-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-title { font-weight: bold; font-size: 15px; color: var(--blue); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: var(--text-muted); text-align: center; font-size: 11px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { display: block; font-size: 20px; margin-bottom: 4px; }

        .btn { padding: 10px 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; width: 100%; margin-top: 8px; }
        .btn-add { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
        
        input, select, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        label { font-size: 12px; color: var(--text-muted); display: block; margin-top: 10px; }
        
        #apiServicesList { max-height: 300px; overflow-y: auto; background: #05070a; padding: 10px; border-radius: 10px; border: 1px solid var(--blue); margin-top: 10px; }
        .api-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="adminContent">
        <div class="header">
            <h2 id="welcomeMsg">لوحة التحكم ⚙️</h2>
            <button class="btn btn-danger" style="width:auto; margin:0;" onclick="window.location.reload()">تحديث</button>
        </div>

        <div id="tab-home" class="tab-content active-tab">
            <div class="stats-grid">
                <div class="stat-card"><h3 id="statUsers">0</h3><p>المستخدمين</p></div>
                <div class="stat-card"><h3 id="statOrders">0</h3><p>الطلبات</p></div>
                <div class="stat-card"><h3 id="statPending">0</h3><p>قيد الانتظار</p></div>
                <div class="stat-card"><h3 id="statIncome">0</h3><p>الأرباح (د.ل)</p></div>
            </div>
        </div>

        <div id="tab-users" class="tab-content">
            <h3 style="color:var(--accent)">👥 إدارة المستخدمين</h3>
            <div id="usersList"></div>
        </div>

        <div id="tab-orders" class="tab-content">
            <h3 style="color:var(--blue)">📦 إدارة الطلبات</h3>
            <div id="ordersList"></div>
        </div>

        <div id="tab-services" class="tab-content">
            <h3 style="color:var(--accent)">✨ إدارة الخدمات</h3>
            
            <div class="admin-card">
                <h4 style="margin:0; color:var(--blue)">📥 جلب خدمات من ms1.shop</h4>
                <button class="btn btn-outline" onclick="fetchFromProvider()">جلب القائمة الآن 🔄</button>
                <div id="apiStatus" style="font-size:11px; margin-top:5px; color:var(--accent)"></div>
                <div id="apiServicesList" style="display:none;"></div>
            </div>

            <div class="admin-card">
                <h4 style="margin-top:0;">➕ إضافة / تعديل خدمة</h4>
                <label>القسم:</label>
                <select id="serviceCatSelect"></select>
                <input type="text" id="servName" placeholder="اسم الخدمة">
                <input type="number" id="servPrice" placeholder="السعر للزبون (د.ل)">
                <input type="hidden" id="servProviderId">
                <textarea id="servDesc" placeholder="وصف الخدمة..." rows="3"></textarea>
                <button class="btn btn-add" onclick="addService()">نشر الخدمة ✅</button>
            </div>

            <div id="servicesListView"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><span>🏠</span>الرئيسية</div>
        <div class="nav-item" onclick="switchTab('users', this)"><span>👥</span>المستخدمين</div>
        <div class="nav-item" onclick="switchTab('orders', this)"><span>📦</span>الطلبات</div>
        <div class="nav-item" onclick="switchTab('services', this)"><span>✨</span>الخدمات</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
            authDomain: "cd-card-87365.firebaseapp.com", 
            projectId: "cd-card-87365", 
            storageBucket: "cd-card-87365.firebasestorage.app", 
            messagingSenderId: "397926299412", 
            appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const API_KEY = "17867535f955dc9d0532a0aefc809f51";
        const PROXY = "https://api.allorigins.win/get?url=";

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            el.classList.add('active');
            if(tabId === 'services') { loadCategories(); loadServices(); }
        }

        // --- جلب من المزود ---
        async function fetchFromProvider() {
            const listDiv = document.getElementById('apiServicesList');
            const status = document.getElementById('apiStatus');
            status.innerText = "⏳ جاري الجلب...";
            try {
                const target = `https://ms1.shop/api/v2?key=${API_KEY}&action=services`;
                const res = await fetch(PROXY + encodeURIComponent(target));
                const json = await res.json();
                const data = JSON.parse(json.contents);
                
                listDiv.innerHTML = '';
                data.forEach(s => {
                    listDiv.innerHTML += `
                        <div class="api-item">
                            <span style="font-size:11px;">${s.name} (${s.rate}$)</span>
                            <button class="btn btn-add" style="width:auto; padding:3px 8px;" onclick="fillForm('${s.service}', '${s.name.replace(/'/g,"")}', ${s.rate})">تجهيز</button>
                        </div>`;
                });
                listDiv.style.display = 'block';
                status.innerText = "✅ تم جلب " + data.length + " خدمة.";
            } catch(e) { status.innerText = "❌ خطأ في الاتصال."; }
        }

        function fillForm(id, name, rate) {
            const dollar = 7.0; // سعر الصرف الافتراضي
            document.getElementById('servProviderId').value = id;
            document.getElementById('servName').value = name;
            document.getElementById('servPrice').value = (rate * dollar * 1.3).toFixed(2);
            document.getElementById('servDesc').value = "خدمة سريعة من CD-CARD";
            alert("تم التجهيز! اختر القسم ثم اضغط نشر.");
        }

        async function addService() {
            const name = document.getElementById('servName').value;
            const price = parseFloat(document.getElementById('servPrice').value);
            const cat = document.getElementById('serviceCatSelect').value;
            if(!name || !price) return alert("البيانات ناقصة");

            await db.collection('services').add({
                name, price, categoryId: cat,
                providerId: document.getElementById('servProviderId').value || 'manual',
                description: document.getElementById('servDesc').value,
                date: new Date().toLocaleString('ar-LY')
            });
            alert("تم النشر ✅");
        }

        function loadCategories() {
            db.collection('categories').onSnapshot(snap => {
                const sel = document.getElementById('serviceCatSelect');
                sel.innerHTML = '';
                snap.forEach(doc => sel.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
            });
        }

        function loadServices() {
            db.collection('services').onSnapshot(snap => {
                const view = document.getElementById('servicesListView');
                view.innerHTML = '<h4 style="margin-top:20px;">📋 الخدمات المنشورة:</h4>';
                snap.forEach(doc => {
                    const s = doc.data();
                    view.innerHTML += `<div class="admin-card">${s.name} - ${s.price} د.ل <button onclick="db.collection('services').doc('${doc.id}').delete()" style="color:red; background:none; border:none; float:left;">حذف</button></div>`;
                });
            });
        }

        // تشغيل الإحصائيات عند الفتح
        db.collection('users').onSnapshot(snap => document.getElementById('statUsers').innerText = snap.size);
        db.collection('orders').onSnapshot(snap => document.getElementById('statOrders').innerText = snap.size);
    </script>
</body>
</html>
