<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-CARD VIP | لوحة التحكم الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0b0f19; --card: #161b2c; --blue: #3b82f6; --text: #f1f5f9; --border: #2d3748; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* الهيدر والإحصائيات */
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .stats-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .stat-box { background: var(--bg); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); min-width: 120px; text-align: center; }
        .stat-box small { color: #94a3b8; font-size: 11px; }
        .stat-box div { font-weight: bold; color: var(--blue); }

        /* نظام الفئات (Tabs) مثل Socpanel */
        .category-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; background: var(--card); border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .tab { padding: 8px 20px; border-radius: 20px; background: #1e293b; color: #94a3b8; white-space: nowrap; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
        .tab.active { background: rgba(59, 130, 246, 0.1); color: var(--blue); border-color: var(--blue); }

        .main { padding: 15px; max-width: 600px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* قائمة الخدمات والطلبات */
        .item-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .item-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #2d3748; }
        .item-text b { display: block; font-size: 15px; margin-bottom: 2px; }
        .item-text span { font-size: 12px; color: #94a3b8; }

        /* الأزرار */
        .btn { border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-outline { background: #334155; color: white; }

        /* النوافذ المنبثقة (Modals) */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; padding: 15px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; }

        /* شريط التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; height: 70px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stats-row">
            <div class="stat-box"><small>المستخدمين</small><div id="stat-users">0</div></div>
            <div class="stat-box"><small>طلبات اليوم</small><div id="stat-orders">0</div></div>
            <div class="stat-box"><small>الخدمات</small><div id="stat-services">0</div></div>
        </div>
    </div>

    <div id="category-bar" class="category-tabs">
        <div class="tab active" onclick="filterServices('الكل', this)">الكل</div>
        <div class="tab" onclick="filterServices('TikTok', this)">TikTok</div>
        <div class="tab" onclick="filterServices('Instagram', this)">Instagram</div>
        <div class="tab" onclick="filterServices('Facebook', this)">Facebook</div>
        <div class="tab" onclick="filterServices('USDT', this)">USDT</div>
    </div>

    <div class="main">
        <div id="services-sec" class="section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0">الخدمات</h3>
                <button class="btn btn-blue" onclick="openServiceModal('add')">إضافة <i class="fas fa-plus"></i></button>
            </div>
            <div id="services-list"></div>
        </div>

        <div id="orders-sec" class="section">
            <h3 style="margin-bottom:15px;">الطلبات الواردة</h3>
            <div id="orders-list"></div>
        </div>

        <div id="users-sec" class="section">
            <h3 style="margin-bottom:15px;">إدارة المشتركين</h3>
            <div id="users-list"></div>
        </div>
    </div>

    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>إدارة الخدمة</h3><i class="fas fa-times" onclick="closeM()"></i></div>
            <input type="hidden" id="s-id">
            <input type="text" id="s-name" placeholder="اسم الخدمة">
            <input type="number" id="s-price" placeholder="السعر د.ل">
            <select id="s-cat">
                <option value="TikTok">TikTok</option>
                <option value="Instagram">Instagram</option>
                <option value="Facebook">Facebook</option>
                <option value="USDT">USDT</option>
            </select>
            <input type="text" id="s-api" placeholder="رقم الخدمة عند المزود (ID)">
            <label style="font-size:12px; color:#94a3b8">أيقونة الخدمة:</label>
            <input type="file" id="s-file" accept="image/*">
            <button class="btn btn-blue" style="width:100%; padding:15px; margin-top:10px;" onclick="saveService()">حفظ الخدمة</button>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content" id="u-detail"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showSec('services-sec', this)"><i class="fas fa-grid-2"></i><span>الخدمات</span></div>
        <div class="nav-item" onclick="showSec('orders-sec', this)"><i class="fas fa-shopping-bag"></i><span>الطلبات</span></div>
        <div class="nav-item" onclick="showSec('users-sec', this)"><i class="fas fa-user-friends"></i><span>المستخدمين</span></div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y",
            authDomain: "cd-card-87365.firebaseapp.com",
            projectId: "cd-card-87365",
            storageBucket: "cd-card-87365.firebasestorage.app",
            messagingSenderId: "397926299412",
            appId: "1:397926299412:web:efbe9ae9aae29df368f401"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const api = { key: "17867535f955dc9d0532a0aefc809f51", url: "https://ms1.shop/api/v2" };

        // --- جلب البيانات وعرضها ---
        db.collection("services").onSnapshot(snap => {
            document.getElementById('stat-services').innerText = snap.size;
            renderServices(snap);
        });

        db.collection("users").onSnapshot(snap => {
            document.getElementById('stat-users').innerText = snap.size;
            let h = "";
            snap.forEach(doc => {
                let u = doc.data();
                h += `
                <div class="item-card" onclick="viewUser('${doc.id}')">
                    <div class="item-info">
                        <div class="item-text"><b>${u.name}</b><span>الرصيد: ${u.balance || 0} د.ل</span></div>
                    </div>
                    <i class="fas fa-chevron-left" style="color:#4b5563"></i>
                </div>`;
            });
            document.getElementById("users-list").innerHTML = h;
        });

        db.collection("orders").onSnapshot(snap => {
            document.getElementById('stat-orders').innerText = snap.size;
            let h = "";
            snap.forEach(doc => {
                let o = doc.data();
                h += `
                <div class="item-card">
                    <div class="item-text">
                        <b style="color:var(--blue)">طلب #${doc.id.slice(0,5)}</b>
                        <span>الخدمة: ${o.service}</span>
                        <div style="font-size:11px; margin-top:5px; color:#ef4444">${o.status}</div>
                    </div>
                    <button class="btn btn-blue btn-small" onclick="sendToApi('${doc.id}','${o.service_id}','${o.target}','${o.qty}')">API <i class="fas fa-robot"></i></button>
                </div>`;
            });
            document.getElementById("orders-list").innerHTML = h;
        });

        // --- وظائف الخدمات ---
        function renderServices(snap, filter = 'الكل') {
            let h = "";
            snap.forEach(doc => {
                let s = doc.data();
                if(filter === 'الكل' || s.category === filter) {
                    h += `
                    <div class="item-card">
                        <div class="item-info">
                            <img src="${s.icon || ''}" class="item-img">
                            <div class="item-text"><b>${s.name}</b><span>${s.price} د.ل | ${s.category}</span></div>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn btn-outline" onclick="openServiceModal('edit', '${doc.id}', '${s.name}', '${s.price}', '${s.category}', '${s.service_id}')"><i class="fas fa-pen"></i></button>
                            <button class="btn" style="background:var(--red)" onclick="del('services','${doc.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById("services-list").innerHTML = h;
        }

        async function saveService() {
            const id = document.getElementById('s-id').value;
            const file = document.getElementById('s-file').files[0];
            let iconUrl = "";

            if(file) {
                const ref = storage.ref('icons/' + Date.now());
                await ref.put(file);
                iconUrl = await ref.getDownloadURL();
            }

            const data = {
                name: document.getElementById('s-name').value,
                price: document.getElementById('s-price').value,
                category: document.getElementById('s-cat').value,
                service_id: document.getElementById('s-api').value,
                ...(iconUrl && {icon: iconUrl})
            };

            if(id) await db.collection("services").doc(id).update(data);
            else await db.collection("services").add(data);
            
            alert("تم الحفظ!"); closeM();
        }

        // --- وظائف الواجهة ---
        function showSec(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function filterServices(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            db.collection("services").get().then(snap => renderServices(snap, cat));
        }

        function openServiceModal(type, id, name, price, cat, sid) {
            document.getElementById('s-id').value = id || "";
            document.getElementById('s-name').value = name || "";
            document.getElementById('s-price').value = price || "";
            document.getElementById('s-cat').value = cat || "TikTok";
            document.getElementById('s-api').value = sid || "";
            document.getElementById('serviceModal').style.display = 'flex';
        }

        async function viewUser(id) {
            const doc = await db.collection("users").doc(id).get();
            const u = doc.data();
            document.getElementById('u-detail').innerHTML = `
                <h3>${u.name}</h3>
                <label>تعديل الرصيد:</label>
                <input type="number" id="newBal" value="${u.balance || 0}">
                <button class="btn btn-blue" style="width:100%; margin-top:10px;" onclick="updateBal('${id}')">تحديث الرصيد</button>
                <button class="btn" style="width:100%; margin-top:10px; background:var(--red); color:white" onclick="toggleBlock('${id}','${u.status}')">${u.status === 'محظور' ? 'فك الحظر' : 'حظر المستخدم'}</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeM()">إغلاق</button>
            `;
            document.getElementById('userModal').style.display = 'flex';
        }

        function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function del(c,i) { if(confirm("حذف؟")) db.collection(c).doc(i).delete(); }
    </script>
</body>
</html>
