<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة خدمات CD-CARD | اختيار يدوي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .service-item { background: #161b22; border: 1px solid #30363d; margin: 5px; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; text-align: right; }
        .controls { position: sticky; top: 0; background: #0d1117; padding: 20px; border-bottom: 2px solid #00ff88; z-index: 100; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-fetch { background: #218bff; color: white; }
        .btn-save { background: #00ff88; color: black; }
        .badge { background: #30363d; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <img src="cd.jpg" style="width: 50px; border-radius: 50%; vertical-align: middle;">
        <h2 style="display:inline; margin: 0 15px;">اختيار خدمات CD-CARD يدوياً 🛠️</h2>
        <br><br>
        <button class="btn-fetch" id="fetchBtn">1. جلب القائمة من المزود</button>
        <button class="btn-save" id="saveBtn" style="display:none;">2. حفظ الخدمات المختارة في Firebase</button>
        <div id="status" style="margin-top:10px; font-size:14px; color:#8b949e;"></div>
    </div>

    <div id="servicesList" style="margin-top:20px; max-width: 800px; margin-left: auto; margin-right: auto;">
        </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
        authDomain: "cd-card-87365.firebaseapp.com", 
        projectId: "cd-card-87365", 
        storageBucket: "cd-card-87365.firebasestorage.app", 
        messagingSenderId: "397926299412", 
        appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let fetchedServices = [];

    // 1. جلب الخدمات من المزود وعرضها للاختيار
    document.getElementById('fetchBtn').onclick = async () => {
        const status = document.getElementById('status');
        status.innerHTML = "جاري الاتصال بالمزود... (تأكد من تفعيل CORS)";
        
        try {
            const apiKey = "bc34ac73c612e956734842221d87df60";
            const proxy = "https://cors-anywhere.herokuapp.com/";
            const response = await fetch(proxy + `https://ms1.shop/api/v2?key=${apiKey}&action=services`);
            fetchedServices = await response.json();

            let html = "";
            fetchedServices.forEach(s => {
                html += `
                <div class="service-item">
                    <div style="flex:1">
                        <span class="badge">${s.service}</span>
                        <strong>${s.category}</strong> - ${s.name}
                        <div style="font-size:11px; color:#8b949e;">السعر الأصلي: ${s.rate} | النوع: ${s.type}</div>
                    </div>
                    <input type="checkbox" class="service-check" value="${s.service}" style="width:20px; height:20px;">
                </div>`;
            });
            document.getElementById('servicesList').innerHTML = html;
            document.getElementById('saveBtn').style.display = "inline-block";
            status.innerHTML = `تم جلب ${fetchedServices.length} خدمة. اختر ما تريد رفعه للمتجر.`;
        } catch (e) {
            status.innerHTML = "خطأ في الجلب: " + e.message;
        }
    };

    // 2. حفظ المختار فقط في Firebase
    document.getElementById('saveBtn').onclick = async () => {
        const selectedIds = Array.from(document.querySelectorAll('.service-check:checked')).map(cb => cb.value);
        if (selectedIds.length === 0) return alert("يرجى اختيار خدمة واحدة على الأقل!");

        const status = document.getElementById('status');
        status.innerHTML = `جاري رفع ${selectedIds.length} خدمة مختارة...`;
        
        const batch = db.batch();
        
        selectedIds.forEach(id => {
            const s = fetchedServices.find(item => item.service == id);
            // تسمية مختصرة ونظيفة كما طلبت
            let shortName = s.name.substring(0, 40).replace(/[\/\\#$.,\[\]*?]/g, '-');
            let docId = `(${s.service}) ${shortName}`;
            
            const ref = db.collection('services').doc(docId);
            batch.set(ref, {
                apiId: s.service,
                name: s.name,
                category: s.category,
                min: Number(s.min),
                max: Number(s.max),
                finalPrice: Number((parseFloat(s.rate) * 1.30).toFixed(4)),
                originalPrice: parseFloat(s.rate),
                description: s.description || "خدمة ممتازة وسريعة من CD-CARD",
                type: s.type
            });
        });

        await batch.commit();
        status.innerHTML = `✅ تم حفظ ${selectedIds.length} خدمة في قاعدة البيانات بنجاح!`;
        alert("اكتمل الرفع!");
    };
</script>
</body>
</html>
